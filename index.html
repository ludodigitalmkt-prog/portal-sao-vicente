                                <span className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-red-500"></div> Ausente</span>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                            {Object.keys(setores).map(setor => (
                                <div key={setor} className="bg-gray-50 dark:bg-slate-900 rounded-[2rem] p-5 md:p-6 shadow-inner border border-gray-100 dark:border-slate-700 flex flex-col">
                                    <h4 className="font-black text-gray-500 dark:text-slate-400 uppercase tracking-widest text-sm mb-4 px-2">{setor}</h4>
                                    <div className="space-y-4">
                                        {setores[setor].map((esc, i) => {
                                            let isFimExpediente = false;
                                            let userHoraFim = '';
                                            const profData = usuarios.find(u => u && u['Nome Completo'] === esc.Nome_Profissional) || corpoClinico.find(c => c && c.Médico === esc.Nome_Profissional);
                                            if (profData && profData['Hora Fim']) userHoraFim = profData['Hora Fim'];
                                            else userHoraFim = esc.Horario;

                                            if (isPastEnd(userHoraFim)) isFimExpediente = true;

                                            const status = isFimExpediente ? 'Ausente (Fim Expediente)' : (safeString(esc.Status_Turno) || 'Trabalhando');
                                            const isIntervalo = status === 'Intervalo';
                                            const isAusente = status.includes('Ausente') || status === 'Folga' || status === 'Falta';
                                            
                                            let bgCard = isIntervalo ? 'bg-orange-50 dark:bg-orange-900/30 border-orange-200' : isAusente ? 'bg-red-50 dark:bg-red-900/30 border-red-200 opacity-60' : 'bg-white dark:bg-slate-800 border-gray-100 dark:border-slate-600';
                                            
                                            // CONTROLE UNIMED
                                            const cUnimed = controleUnimed.find(a => a && safeString(a.Profissional) === safeString(esc.Nome_Profissional));
                                            let uPulseClass = '';
                                            if (cUnimed) {
                                                const q = Number(cUnimed.Qtd_Atual||0); const m = Number(cUnimed.Limite_Max||1);
                                                if (m > 0 && m - q <= 5) uPulseClass = 'animate-pulse bg-red-500 text-white border-red-600';
                                                else if (m > 0 && q/m >= 0.8) uPulseClass = 'animate-pulse bg-green-500 text-white border-green-600';
                                                else uPulseClass = 'bg-blue-100 text-blue-800 border-blue-200';
                                            }

                                            return (
                                                <div key={i} onClick={()=>(canEdit || isColab) && setSelectedPerson(esc)} className={`p-5 rounded-[1.5rem] border-2 shadow-sm cursor-pointer hover:shadow-md hover:border-primary transition relative flex flex-col gap-2 ${bgCard}`}>
                                                    {isIntervalo && <div className="absolute -top-3 -right-3 w-10 h-10 bg-orange-500 text-white rounded-full flex items-center justify-center text-xl animate-bounce-slight shadow-lg border-2 border-white dark:border-slate-800 z-10">🥪</div>}
                                                    
                                                    <div className="flex justify-between items-start">
                                                        <div>
                                                            <span className={`font-black text-lg ${isAusente ? 'text-red-900 dark:text-red-400' : 'text-gray-900 dark:text-white'} block pr-4`}>{safeString(esc.Nome_Profissional)}</span>
                                                            <p className="text-xs font-bold text-gray-500 dark:text-slate-400 mt-1"><i className="ph-fill ph-clock"></i> {safeString(esc.Horario)}</p>
                                                        </div>
                                                        {isAusente && <span className="text-[10px] uppercase font-black tracking-widest text-red-600 bg-red-100 px-2 py-1 rounded">Ausente</span>}
                                                    </div>

                                                    {esc.Substituindo && <p className="text-[10px] font-black text-primary bg-blue-50 dark:bg-blue-900/50 px-2 py-1 rounded mt-1 uppercase w-max">Cobrindo: {safeString(esc.Substituindo)}</p>}
                                                    
                                                    {cUnimed && (
                                                        <div className={`mt-2 flex flex-col md:flex-row justify-between items-center p-3 rounded-xl border gap-2 ${uPulseClass || 'border-blue-200 bg-blue-50/50 dark:bg-blue-900/20 dark:border-blue-800'}`} onClick={(e)=>e.stopPropagation()}>
                                                            <span className="text-[10px] font-black uppercase tracking-widest">Guia Unimed</span>
                                                            <div className="flex items-center gap-4">
                                                                <button onClick={()=>handleUnimedUpdate(cUnimed, -1)} className="w-8 h-8 bg-white/50 hover:bg-white rounded-full flex items-center justify-center font-black text-black shadow-sm text-lg">-</button>
                                                                <span className="font-black text-lg w-16 text-center">{cUnimed.Qtd_Atual} <span className="opacity-50 text-xs">/ {cUnimed.Limite_Max}</span></span>
                                                                <button onClick={()=>handleUnimedUpdate(cUnimed, 1)} className="w-8 h-8 bg-white/50 hover:bg-white rounded-full flex items-center justify-center font-black text-black shadow-sm text-lg">+</button>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            ))}
                            {Object.keys(setores).length === 0 && <div className="col-span-full text-center p-10 md:p-20 text-gray-400 font-black text-xl md:text-2xl border-2 border-dashed border-gray-200 dark:border-slate-700 rounded-3xl">Ninguém escalado hoje.</div>}
                        </div>
                    </div>
                )
            };

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="bg-white dark:bg-slate-800 rounded-custom p-4 shadow-sm border border-gray-100 dark:border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex bg-gray-50 dark:bg-slate-900 p-2 rounded-2xl gap-2 overflow-x-auto hide-scroll w-full md:w-auto">
                            {['Painel Hoje', 'Calendário Médicos', 'Calendário Equipe', 'Mapa'].map(tab => (
                                <button key={tab} onClick={() => setActiveSubTab(tab)} className={`px-4 md:px-6 py-3 rounded-xl font-black text-sm md:text-base transition-all whitespace-nowrap ${activeSubTab === tab ? 'bg-white dark:bg-slate-800 text-primary shadow-md' : 'text-gray-500 hover:bg-gray-200 dark:hover:bg-slate-800'}`}>{tab}</button>
                            ))}
                        </div>
                        {canEdit && activeSubTab !== 'Mapa' && <button onClick={() => { setFormData({ ID: '', Tipo_Profissional: activeSubTab === 'Calendário Médicos' ? 'Médico' : 'Colaborador', Nome_Profissional: '', Turno: 'Manhã', Horario: '', Unidade: '', Setor_Consultorio: '', Status_Turno: 'Trabalhando', Substituindo: '' }); setDatesToSave([]); setIsModalOpen(true); }} className="bg-primary text-white w-full md:w-auto font-black px-8 py-4 rounded-custom shadow-lg hover:-translate-y-1 transition shrink-0 flex justify-center items-center gap-2"><i className="ph-bold ph-calendar-plus text-xl"></i> Lançar</button>}
                    </div>

                    {activeSubTab === 'Painel Hoje' ? <PainelDoDia /> : activeSubTab === 'Mapa' ? <MapaSalasView escalas={escalas} /> : (
                        <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] shadow-sm border border-gray-100 dark:border-slate-700 p-4 md:p-8 relative overflow-hidden">
                            <div className="flex justify-between items-center mb-6 md:mb-10">
                                <button onClick={()=>setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth()-1, 1))} className="w-10 h-10 md:w-14 md:h-14 bg-gray-50 dark:bg-slate-900 rounded-xl md:rounded-2xl"><i className="ph-bold ph-caret-left"></i></button>
                                <h2 className="text-2xl md:text-4xl font-black capitalize text-gray-900 dark:text-white text-center">{currentMonth.toLocaleString('pt-BR', { month: 'long', year: 'numeric' })}</h2>
                                <button onClick={()=>setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth()+1, 1))} className="w-10 h-10 md:w-14 md:h-14 bg-gray-50 dark:bg-slate-900 rounded-xl md:rounded-2xl"><i className="ph-bold ph-caret-right"></i></button>
                            </div>
                            <div className="grid grid-cols-7 gap-2 md:gap-4 mb-4 text-center"><div className="font-black text-gray-400 text-xs md:text-base">D</div><div className="font-black text-gray-400 text-xs md:text-base">S</div><div className="font-black text-gray-400 text-xs md:text-base">T</div><div className="font-black text-gray-400 text-xs md:text-base">Q</div><div className="font-black text-gray-400 text-xs md:text-base">Q</div><div className="font-black text-gray-400 text-xs md:text-base">S</div><div className="font-black text-gray-400 text-xs md:text-base">S</div></div>
                            <div className="grid grid-cols-7 gap-2 md:gap-4 relative z-10">
                                {Array(firstDayOfMonth).fill(null).map((_, i) => <div key={`e-${i}`} className="aspect-square opacity-20 bg-gray-50 dark:bg-slate-900 rounded-xl md:rounded-3xl" />)}
                                {Array(daysInMonth).fill(null).map((_, i) => {
                                    const day = i + 1; const dateStrCompleto = `${String(day).padStart(2, '0')}/${String(currentMonth.getMonth() + 1).padStart(2, '0')}/${currentMonth.getFullYear()}`;
                                    const pessoasNoDia = filteredEscalas.filter(e => e && (safeString(e.Data).includes(dateStrCompleto) || safeString(e.Data).includes(`${String(day).padStart(2, '0')}/${String(currentMonth.getMonth() + 1).padStart(2, '0')}/${String(currentMonth.getFullYear()).slice(2)}`)));
                                    const isToday = dateStrCompleto === todayStr;
                                    return (
                                        <div key={day} onClick={() => setSelectedDate(dateStrCompleto)} className={`aspect-square rounded-xl md:rounded-[2rem] border-2 p-2 md:p-4 flex flex-col cursor-pointer transition-all ${isToday ? 'border-primary bg-blue-50/50 dark:bg-blue-900/20 shadow-md' : 'border-gray-100 dark:border-slate-700 hover:border-primary/50 bg-white dark:bg-slate-800'}`}>
                                            <span className={`text-base md:text-2xl font-black ${isToday ? 'text-primary' : 'text-gray-900 dark:text-white'}`}>{day}</span>
                                            <div className="mt-auto w-full space-y-1">{pessoasNoDia.length > 0 && <div className={`w-full text-center text-[8px] md:text-xs font-black py-1 md:py-2 rounded-lg md:rounded-xl shadow-sm ${activeSubTab.includes('Médicos') ? 'bg-primary text-white' : 'bg-secondary text-white'}`}>{pessoasNoDia.length} <span className="hidden md:inline">Plantão</span></div>}</div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    )}
                    
                    {selectedDate && !selectedPerson && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 glass-modal" onClick={() => setSelectedDate(null)}>
                            <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] w-full max-w-5xl p-6 md:p-10 shadow-2xl animate-pop-in relative border border-gray-100 dark:border-slate-700 flex flex-col max-h-[90vh]" onClick={e => e.stopPropagation()}>
                                <button onClick={()=>setSelectedDate(null)} className="absolute top-4 right-4 md:top-8 md:right-8 w-10 h-10 md:w-12 md:h-12 bg-gray-100 dark:bg-slate-700 hover:bg-red-500 hover:text-white rounded-full transition"><i className="ph-bold ph-x"></i></button>
                                <h3 className="text-2xl md:text-4xl font-black mb-6 md:mb-10 flex items-center gap-4 text-gray-900 dark:text-white">Plantão {selectedDate}</h3>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 overflow-y-auto custom-scrollbar flex-1 pb-4 pr-2">
                                    {filteredEscalas.filter(e => e && (safeString(e.Data).includes(selectedDate) || safeString(e.Data).includes(selectedDate.substring(0,6) + selectedDate.substring(8,10)))).map((esc, i) => (
                                        <div key={i} onClick={() => (canEdit || isColab) && setSelectedPerson(esc)} className="bg-white dark:bg-slate-900 border-2 border-gray-100 dark:border-slate-700 rounded-2xl md:rounded-3xl p-5 md:p-6 cursor-pointer card-hover hover:border-primary flex flex-col">
                                            <h4 className="font-black text-lg md:text-xl mb-2 md:mb-3 text-gray-900 dark:text-white">{safeString(esc.Nome_Profissional)}</h4>
                                            <p className="text-xs md:text-sm font-black bg-gray-50 dark:bg-slate-800 px-3 py-1.5 rounded-xl mb-4 text-gray-600 dark:text-slate-300 w-max">{safeString(esc.Turno)} • {safeString(esc.Horario)}</p>
                                            <div className="mt-auto flex justify-between items-center"><span className="text-[10px] font-black uppercase px-3 py-1.5 rounded-full bg-green-100 text-green-800">{safeString(esc.Status_Turno)||'Ativo'}</span><span className="text-primary text-xs font-black bg-blue-50 dark:bg-blue-900/30 px-3 py-1.5 rounded-lg">Abrir Card</span></div>
                                        </div>
                                    ))}
                                    {filteredEscalas.filter(e => e && safeString(e.Data).includes(selectedDate)).length === 0 && <div className="col-span-full text-center text-gray-400 font-black text-xl p-10">Ninguém escalado.</div>}
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {selectedPerson && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 backdrop-blur-xl bg-gray-900/60 animate-fade-in" onClick={() => {setSelectedPerson(null); setShowSwapSugg(false)}}>
                            <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] w-full max-w-lg p-6 md:p-8 shadow-2xl relative border border-white dark:border-slate-700 max-h-[90vh] overflow-y-auto custom-scrollbar" onClick={e => e.stopPropagation()}>
                                <button onClick={()=>{setSelectedPerson(null); setShowSwapSugg(false)}} className="absolute top-4 right-4 md:top-6 md:right-6 w-10 h-10 bg-gray-100 dark:bg-slate-700 hover:bg-gray-200 dark:hover:bg-slate-600 rounded-full flex justify-center items-center transition"><i className="ph-bold ph-x"></i></button>
                                
                                <h2 className="text-2xl font-black mb-1 text-gray-900 dark:text-white pr-8">{safeString(selectedPerson.Nome_Profissional)}</h2>
                                <p className="text-sm font-bold text-gray-400 mb-6 md:mb-8">{safeString(selectedPerson.Setor_Consultorio)} • {safeString(selectedPerson.Horario)}</p>

                                <div className="space-y-4 mb-6 md:mb-8">
                                    <h4 className="text-[10px] md:text-xs font-black uppercase text-gray-400 tracking-widest">Avisar Sistema:</h4>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={()=>{handleStatusChange(selectedPerson, 'Trabalhando'); setSelectedPerson(null);}} className="p-3 md:p-4 rounded-xl md:rounded-2xl border-2 hover:border-green-500 bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800 text-green-700 dark:text-green-400 font-black flex items-center justify-center gap-2 transition text-sm md:text-base"><i className="ph-fill ph-check-circle text-xl md:text-2xl"></i> Voltei</button>
                                        <button onClick={()=>{handleStatusChange(selectedPerson, 'Intervalo'); setSelectedPerson(null);}} className="p-3 md:p-4 rounded-xl md:rounded-2xl border-2 hover:border-orange-500 bg-orange-50 dark:bg-orange-900/20 border-orange-200 dark:border-orange-800 text-orange-700 dark:text-orange-400 font-black flex items-center justify-center gap-2 transition text-sm md:text-base"><i className="ph-fill ph-coffee text-xl md:text-2xl"></i> Fui Lanchar</button>
                                    </div>
                                </div>

                                {canEdit && (
                                    <div className="border-t border-gray-100 dark:border-slate-700 pt-6 space-y-3">
                                        <h4 className="text-[10px] md:text-xs font-black uppercase text-gray-400 tracking-widest mb-2">Ações Administrativas:</h4>
                                        <button onClick={()=>setShowSwapSugg(!showSwapSugg)} className="w-full py-3 md:py-4 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-xl md:rounded-2xl font-black shadow flex justify-center items-center gap-2 hover:scale-[1.02] transition"><i className="ph-bold ph-arrows-left-right"></i> Sugerir Substituto (Trocar)</button>
                                        <button onClick={async()=>{if(confirm('Excluir plantão permanentemente?')){ await api.deleteRecord('ESCALAS', selectedPerson.ID); onRefresh('ESCALAS'); setSelectedPerson(null); setSelectedDate(null); }}} className="w-full py-3 md:py-4 bg-red-50 dark:bg-red-900/20 text-red-600 border border-red-100 dark:border-red-900 rounded-xl md:rounded-2xl font-black transition flex justify-center items-center gap-2 hover:bg-red-600 hover:text-white"><i className="ph-bold ph-trash"></i> Excluir Plantão</button>
                                    </div>
                                )}

                                {showSwapSugg && canEdit && (
                                    <div className="mt-4 bg-gray-50 dark:bg-slate-900 rounded-2xl p-4 border border-gray-100 dark:border-slate-700 animate-fade-in">
                                        <h4 className="text-[10px] md:text-xs font-black uppercase text-gray-500 mb-3">Colaboradores com as mesmas Competências:</h4>
                                        <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar pr-2">
                                            {findSubstitutes(selectedPerson.Nome_Profissional).map((sub, idx) => (
                                                <div key={idx} className="bg-white dark:bg-slate-800 p-3 md:p-4 rounded-xl border border-gray-100 dark:border-slate-600 flex justify-between items-center shadow-sm">
                                                    <div>
                                                        <p className="font-black text-sm text-gray-900 dark:text-white">{safeString(sub['Nome Completo'])}</p>
                                                        <p className="text-[10px] font-bold text-gray-400 mt-0.5" title={safeString(sub['Horários Flexíveis'])}>Disponível • {safeString(sub['Horários Flexíveis']).substring(0,25)}</p>
                                                    </div>
                                                    <button onClick={async()=>{ 
                                                        await api.saveRecord('ESCALAS', { ...selectedPerson, ID: '', Nome_Profissional: safeString(sub['Nome Completo']), Substituindo: safeString(selectedPerson.Nome_Profissional) }, false);
                                                        showToast(`Substituto acionado: ${sub['Nome Completo']}.`); 
                                                        setSelectedPerson(null); setShowSwapSugg(false); 
                                                        onRefresh('ESCALAS');
                                                    }} className="bg-primary text-white text-[10px] md:text-xs font-black px-3 py-2 md:px-4 md:py-2.5 rounded-lg hover:bg-blue-700 transition shadow-md">Acionar</button>
                                                </div>
                                            ))}
                                            {findSubstitutes(selectedPerson.Nome_Profissional).length === 0 && <p className="text-sm font-bold text-gray-400 text-center py-6 border-2 border-dashed rounded-xl border-gray-200 dark:border-slate-700">Nenhum compatível livre hoje.</p>}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                    
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 glass-modal" onMouseDown={()=>setIsModalOpen(false)}>
                            <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] w-full max-w-6xl max-h-[90vh] flex flex-col shadow-2xl animate-pop-in border border-gray-100 dark:border-slate-700" onMouseDown={e=>e.stopPropagation()}>
                                <div className="p-6 md:p-8 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center bg-gray-50/50 dark:bg-slate-900 shrink-0">
                                    <h3 className="text-xl md:text-3xl font-black text-gray-900 dark:text-white">Lançamento em Lote</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="w-10 h-10 md:w-12 h-12 bg-white dark:bg-slate-700 rounded-full hover:bg-red-500 hover:text-white shadow-sm text-xl transition flex justify-center items-center"><i className="ph-bold ph-x"></i></button>
                                </div>
                                <div className="p-6 md:p-8 flex flex-col lg:flex-row gap-8 md:gap-12 overflow-y-auto custom-scrollbar">
                                    <div className="lg:w-1/2">
                                        <h4 className="font-black mb-4 md:mb-6 text-lg md:text-xl text-gray-900 dark:text-white">1. Selecione as Datas</h4>
                                        <div className="grid grid-cols-7 gap-2">
                                            {Array(firstDayOfMonth).fill(null).map((_, i) => <div key={`empty-${i}`} />)}
                                            {Array(daysInMonth).fill(null).map((_, i) => {
                                                const day = i + 1; const dStr = `${String(day).padStart(2, '0')}/${String(currentMonth.getMonth() + 1).padStart(2, '0')}/${currentMonth.getFullYear()}`; const sel = datesToSave.includes(dStr);
                                                return <button type="button" key={day} onClick={() => { if(sel) setDatesToSave(datesToSave.filter(x => x !== dStr)); else setDatesToSave([...datesToSave, dStr]); }} className={`w-full aspect-square rounded-xl md:rounded-2xl font-black text-sm md:text-lg transition-all ${sel ? 'bg-primary text-white shadow-xl scale-110' : 'bg-white dark:bg-slate-800 border-2 border-gray-100 dark:border-slate-700 hover:border-primary shadow-sm text-gray-800 dark:text-white'}`}>{day}</button>
                                            })}
                                        </div>
                                    </div>
                                    <div className="lg:w-1/2">
                                        <h4 className="font-black mb-4 md:mb-6 text-lg md:text-xl text-gray-900 dark:text-white">2. Dados do Plantão</h4>
                                        <form id="esc-form" onSubmit={handleSaveBatch} className="space-y-4 md:space-y-6">
                                            <div><label className="block text-[10px] md:text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">Profissional</label><select className="w-full px-4 md:px-5 py-3 md:py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl md:rounded-custom outline-none focus:ring-2 focus:ring-primary font-black text-gray-900 dark:text-white" value={safeString(formData.Nome_Profissional)} onChange={e => {
                                                const nome = e.target.value;
                                                const refObj = activeSubTab.includes('Médicos') ? corpoClinico.find(c => c && c.Médico === nome) : usuarios.find(u => u && u['Nome Completo'] === nome);
                                                const hInicio = refObj ? safeString(refObj['Hora Início']) : ''; const hFim = refObj ? safeString(refObj['Hora Fim']) : '';
                                                const autoHorario = hInicio && hFim ? `${hInicio} às ${hFim}` : formData.Horario;
                                                setFormData({...formData, Nome_Profissional: nome, Horario: autoHorario});
                                            }} required><option value="">Selecione...</option>{activeSubTab.includes('Médicos') ? corpoClinico.map((m,i) => m && <option key={i} value={safeString(m.Médico)}>{safeString(m.Médico)}</option>) : usuarios.map((u,i) => u && <option key={i} value={safeString(u['Nome Completo'])}>{safeString(u['Nome Completo'])}</option>)}</select></div>
                                            <div className="grid grid-cols-2 gap-4 md:gap-6">
                                                <div><label className="block text-[10px] md:text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">Turno</label><select className="w-full px-4 md:px-5 py-3 md:py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl md:rounded-custom outline-none font-bold text-gray-900 dark:text-white" value={safeString(formData.Turno)} onChange={e => setFormData({...formData, Turno: e.target.value})}><option value="Manhã">Manhã</option><option value="Tarde">Tarde</option><option value="Noite">Noite</option></select></div>
                                                <div><label className="block text-[10px] md:text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">Horário</label><input type="text" className="w-full px-4 md:px-5 py-3 md:py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl md:rounded-custom outline-none font-bold text-gray-900 dark:text-white" value={safeString(formData.Horario)} onChange={e => setFormData({...formData, Horario: e.target.value})} placeholder="Ex: 08:00 às 18:00" /></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 md:gap-6">
                                                <div><label className="block text-[10px] md:text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">Unidade</label><input type="text" className="w-full px-4 md:px-5 py-3 md:py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl md:rounded-custom outline-none font-bold text-gray-900 dark:text-white" value={safeString(formData.Unidade)} onChange={e => setFormData({...formData, Unidade: e.target.value})} placeholder="Sede" /></div>
                                                <div><label className="block text-[10px] md:text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">Setor / Consultório</label><input type="text" className="w-full px-4 md:px-5 py-3 md:py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl md:rounded-custom outline-none font-bold text-gray-900 dark:text-white" value={safeString(formData.Setor_Consultorio)} onChange={e => setFormData({...formData, Setor_Consultorio: e.target.value})} placeholder="Recepção 1" /></div>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                                <div className="p-6 border-t border-gray-100 dark:border-slate-700 flex justify-end gap-4 bg-gray-50/50 dark:bg-slate-900 shrink-0"><button onClick={() => setIsModalOpen(false)} className="px-10 py-4 font-black text-gray-500 hover:text-gray-800 dark:hover:text-white transition">Cancelar</button><button type="submit" form="esc-form" disabled={loadingAction} className="px-12 py-4 bg-primary text-white font-black rounded-custom shadow-xl hover:-translate-y-1 transition">{loadingAction?'Gravando...':'Gravar Múltiplos'}</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const DesignInterfacePanel = ({ sheetData, onRefresh, showToast }) => {
            const configs = Array.isArray(sheetData['CONFIGURACOES']) ? sheetData['CONFIGURACOES'] : [];
            const getConfig = (chave, def) => { const item = configs.find(c => c && c.Chave === chave); return item ? item.Valor : def; };

            const [primary, setPrimary] = useState(getConfig('cor_primaria', '#1E40AF'));
            const [secondary, setSecondary] = useState(getConfig('cor_secundaria', '#F97316'));
            const [bg, setBg] = useState(getConfig('cor_fundo', '#F8FAFC'));
            const [logo, setLogo] = useState(getConfig('logo_url', ''));
            const [fontFamily, setFontFamily] = useState(getConfig('font_family', 'Inter'));
            const [borderRadius, setBorderRadius] = useState(getConfig('border_radius', '1.5rem'));
            const [saving, setSaving] = useState(false);

            const handleSaveDesign = async (e) => {
                e.preventDefault(); setSaving(true);
                const settingsToSave = [ { key: 'cor_primaria', val: primary }, { key: 'cor_secundaria', val: secondary }, { key: 'cor_fundo', val: bg }, { key: 'logo_url', val: logo }, { key: 'font_family', val: fontFamily }, { key: 'border_radius', val: borderRadius } ];
                for (let setting of settingsToSave) {
                    const existing = configs.find(c => c && c.Chave === setting.key);
                    await api.saveRecord('CONFIGURACOES', { 'ID': existing ? existing.ID : '', 'Chave': setting.key, 'Valor': setting.val }, !!existing);
                }
                await onRefresh('CONFIGURACOES'); setSaving(false); showToast("Design atualizado!", "success");
            };

            return (
                <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-custom shadow-sm border border-gray-100 dark:border-slate-700 p-6 md:p-8 max-w-5xl mx-auto animate-fade-in">
                    <h2 className="text-2xl md:text-3xl font-black mb-6 md:mb-8 flex items-center gap-3"><i className="ph-fill ph-magic-wand text-primary"></i> Estilo do Portal</h2>
                    <form onSubmit={handleSaveDesign} className="space-y-6 md:space-y-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
                            <div className="bg-gray-50 dark:bg-slate-900 p-5 md:p-6 rounded-xl md:rounded-custom border border-gray-100 dark:border-slate-700 space-y-4 shadow-inner">
                                <h3 className="font-black text-gray-800 dark:text-white flex items-center gap-2"><i className="ph-fill ph-palette text-gray-400"></i> Cores</h3>
                                <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Primária</label><input type="color" value={primary} onChange={(e) => setPrimary(e.target.value)} className="w-full h-12 rounded-lg cursor-pointer border-0 bg-transparent" /></div>
                                <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Secundária</label><input type="color" value={secondary} onChange={(e) => setSecondary(e.target.value)} className="w-full h-12 rounded-lg cursor-pointer border-0 bg-transparent" /></div>
                                <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Fundo Claro</label><input type="color" value={bg} onChange={(e) => setBg(e.target.value)} className="w-full h-12 rounded-lg cursor-pointer border-0 bg-transparent" /></div>
                            </div>
                            <div className="bg-gray-50 dark:bg-slate-900 p-5 md:p-6 rounded-xl md:rounded-custom border border-gray-100 dark:border-slate-700 space-y-4 shadow-inner">
                                <h3 className="font-black text-gray-800 dark:text-white flex items-center gap-2"><i className="ph-fill ph-shapes text-gray-400"></i> Formatos</h3>
                                <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Bordas</label><select className="w-full p-4 rounded-xl border border-gray-200 dark:border-slate-600 dark:bg-slate-800 font-bold outline-none focus:ring-2 focus:ring-primary" value={borderRadius} onChange={e=>setBorderRadius(e.target.value)}><option value="0px">Reto (Clássico)</option><option value="0.5rem">Suave</option><option value="1.5rem">Moderno (Redondo)</option></select></div>
                                <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Fonte</label><select className="w-full p-4 rounded-xl border border-gray-200 dark:border-slate-600 dark:bg-slate-800 font-bold outline-none focus:ring-2 focus:ring-primary" value={fontFamily} onChange={e=>setFontFamily(e.target.value)}><option value="Inter">Inter (Limpa)</option><option value="Roboto">Roboto</option></select></div>
                            </div>
                            <div className="bg-gray-50 dark:bg-slate-900 p-5 md:p-6 rounded-xl md:rounded-custom border border-gray-100 dark:border-slate-700 space-y-4 shadow-inner">
                                <h3 className="font-black text-gray-800 dark:text-white flex items-center gap-2"><i className="ph-fill ph-image text-gray-400"></i> Logo do Portal</h3>
                                <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">URL (Drive ou Site)</label><input type="url" value={logo} onChange={e=>setLogo(e.target.value)} className="w-full p-4 rounded-xl border border-gray-200 dark:border-slate-600 dark:bg-slate-800 text-xs font-bold outline-none focus:ring-2 focus:ring-primary" placeholder="https://..." /></div>
                            </div>
                        </div>
                        <div className="flex justify-end border-t border-gray-100 dark:border-slate-700 pt-6">
                            <button type="submit" disabled={saving} className="bg-primary hover:opacity-90 text-white font-black py-4 px-12 rounded-xl md:rounded-full shadow-xl hover:-translate-y-1 transition w-full md:w-auto flex items-center justify-center gap-2">
                                {saving ? <i className="ph animate-spin ph-spinner text-xl"></i> : <i className="ph-bold ph-floppy-disk text-xl"></i>} {saving ? 'Salvando...' : 'Aplicar Design'}
                            </button>
                        </div>
                    </form>
                </div>
            )
        };

        const DefaultTableView = ({ title, schema, filteredData, canEdit, openModal, handleDelete, search, setSearch }) => {
            return (
                <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-custom shadow-sm border border-gray-100 dark:border-slate-700 overflow-hidden animate-fade-in">
                    <div className="p-6 md:p-8 border-b border-gray-50 dark:border-slate-700 flex flex-col md:flex-row justify-between items-center gap-6 bg-gray-50/50 dark:bg-slate-900/50">
                        <h2 className="text-2xl md:text-3xl font-black tracking-tight flex items-center gap-3 text-gray-900 dark:text-white w-full md:w-auto"><div className="w-2 md:w-3 h-6 md:h-8 bg-primary rounded-full"></div> {title}</h2>
                        <div className="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                            <div className="relative flex-1 sm:w-80 md:w-96"><i className="ph-bold ph-magnifying-glass absolute left-5 top-4 text-gray-400 text-xl"></i><input type="text" placeholder="Pesquisar..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full pl-14 pr-6 py-4 bg-white dark:bg-slate-900 shadow-sm border border-gray-200 dark:border-slate-700 rounded-xl md:rounded-full outline-none focus:ring-2 focus:ring-primary font-bold transition text-gray-800 dark:text-white" /></div>
                            {canEdit && <button onClick={() => openModal(null, schema)} className="bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-black px-8 py-4 rounded-xl md:rounded-full shadow-xl hover:-translate-y-1 transition flex items-center justify-center gap-2 shrink-0"><i className="ph-bold ph-plus text-xl"></i> Novo</button>}
                        </div>
                    </div>
                    <div className="overflow-x-auto p-2 md:p-4 custom-scrollbar">
                        <table className="w-full text-left border-collapse min-w-[800px]">
                            <thead>
                                <tr className="text-gray-400 text-[10px] uppercase tracking-widest border-b-2 border-gray-100 dark:border-slate-700">
                                    {schema.filter(c=>safeString(c)!=='ID').map((col, i) => <th key={`th-${i}`} className="p-4 md:p-6 font-black">{safeString(col)}</th>)}
                                    {canEdit && <th className="p-4 md:p-6 font-black text-right">Ações</th>}
                                </tr>
                            </thead>
                            <tbody className="text-xs md:text-sm font-bold text-gray-800 dark:text-slate-200">
                                {filteredData.length === 0 ? <tr><td colSpan="100%" className="text-center p-10 md:p-20 text-gray-400 font-black text-lg md:text-xl border-2 border-dashed border-gray-200 dark:border-slate-700 rounded-3xl m-4 block">Nenhum dado cadastrado.</td></tr> : 
                                filteredData.map((row, i) => (
                                    <tr key={`tr-${i}`} className="hover:bg-blue-50/30 dark:hover:bg-slate-700/30 border-b border-gray-50 dark:border-slate-700 transition group">
                                        {schema.filter(c=>safeString(c)!=='ID').map((col, j) => {
                                            const val = safeString(row[col]);
                                            const cLower = safeString(col).toLowerCase();
                                            return (
                                            <td key={`td-${i}-${j}`} className="p-4 md:p-6 whitespace-nowrap">
                                                {cLower.includes('url') || cLower.includes('foto') || cLower.includes('imagem') ? (val ? <img src={formatImageUrl(val)} className="h-10 w-10 md:h-14 md:w-14 object-cover rounded-xl md:rounded-2xl shadow-sm border border-gray-200 dark:border-slate-600" /> : <div className="h-10 w-10 md:h-14 md:w-14 bg-gray-100 dark:bg-slate-700 rounded-xl md:rounded-2xl flex items-center justify-center text-gray-300"><i className="ph-fill ph-image text-lg md:text-xl"></i></div>) :
                                                 cLower.includes('senha') ? '••••••••' :
                                                 val === 'Sim' || val === 'Ativo' ? <span className="bg-green-100 dark:bg-green-900/30 border border-green-200 dark:border-green-800 text-green-800 dark:text-green-300 px-3 py-1.5 md:px-4 md:py-2 rounded-lg md:rounded-xl text-[10px] md:text-xs font-black uppercase tracking-wider">{val}</span> :
                                                 val === 'Não' || val === 'Inativo' ? <span className="bg-red-100 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-800 dark:text-red-300 px-3 py-1.5 md:px-4 md:py-2 rounded-lg md:rounded-xl text-[10px] md:text-xs font-black uppercase tracking-wider">{val}</span> :
                                                 val || '-'}
                                            </td>
                                        )})}
                                        {canEdit && (
                                            <td className="p-4 md:p-6 flex justify-end gap-2 md:opacity-50 md:group-hover:opacity-100 transition">
                                                <button onClick={()=>openModal(row, schema)} className="text-blue-600 bg-blue-50 dark:bg-blue-900/30 hover:bg-blue-600 hover:text-white p-2.5 md:p-3 rounded-lg md:rounded-xl transition shadow-sm"><i className="ph-bold ph-pencil-simple text-lg md:text-xl"></i></button>
                                                <button onClick={()=>handleDelete(row.ID)} className="text-red-600 bg-red-50 dark:bg-red-900/30 hover:bg-red-600 hover:text-white p-2.5 md:p-3 rounded-lg md:rounded-xl transition shadow-sm"><i className="ph-bold ph-trash text-lg md:text-xl"></i></button>
                                            </td>
                                        )}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('Home');
            const [sheetData, setSheetData] = useState({});
            const [darkMode, setDarkMode] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            
            const [loginView, setLoginView] = useState('selecao'); 
            const [loginErrorMsg, setLoginErrorMsg] = useState('');
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [isSharedAuth, setIsSharedAuth] = useState(localStorage.getItem('shared_auth') === 'true');

            // ⚠️ SENHA DE ACESSO GERAL PARA COLABORADORES
            const SENHA_ACESSO_GERAL = "Csv@123"; 

            const userFoto = user?.Foto_Perfil_URL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            const userName = user?.['Nome Completo'] || (isSharedAuth ? 'Equipe São Vicente' : 'Usuário');
            const [logoUrl, setLogoUrl] = useState(''); // Logo Dinâmica

            const nivelKey = user && typeof user === 'object' ? Object.keys(user).find(k => safeString(k).toLowerCase().includes('acesso')) : null;
            const isAdmin = user && nivelKey && ['admin', 'supervisor', 'supervisão'].some(role => safeString(user[nivelKey]).toLowerCase().includes(role));

            useEffect(() => {
                const handleOnline = () => { setIsOffline(false); showToast('Conexão restabelecida! Sincronizando...', 'success'); };
                const handleOffline = () => { setIsOffline(true); showToast('Rede perdida. Modo offline ativado.', 'warning'); };
                window.addEventListener('online', handleOnline); window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); }
            }, []);

            useEffect(() => {
                const unsub = auth?.onAuthStateChanged(async (u) => {
                    if (u && !isSharedAuth) {
                        try {
                            const userDoc = await db.collection('USUARIOS').where('E-mail', '==', u.email).get();
                            if (!userDoc.empty) setUser({ ID: userDoc.docs[0].id, ...userDoc.docs[0].data() });
                            else setUser({ 'E-mail': u.email, 'Nome Completo': u.email.split('@')[0], 'Nível de Acesso': 'Colaborador' });
                        } catch (err) {
                            setUser({ 'E-mail': u.email, 'Nome Completo': u.email.split('@')[0], 'Nível de Acesso': 'Colaborador' });
                        }
                    } else {
                        if(isSharedAuth) setUser({ 'Nome Completo': 'Equipe São Vicente', 'Nível de Acesso': 'Colaborador' });
                        else setUser(null);
                    }
                    setLoading(false);
                });
                return () => unsub && unsub();
            }, [isSharedAuth]);
                    
            const showToast = (msg, type = 'success') => { setToast({ show: true, message: msg, type }); setTimeout(() => setToast(p => ({ ...p, show: false })), 3500); };

            useEffect(() => {
                if (darkMode) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } 
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            }, [darkMode]);

            useEffect(() => {
                const init = async () => {
                    if(!isFirebaseConfigured) return;
                    const allData = await api.fetchAll(); 
                    if(allData && Object.keys(allData).length > 0) {
                        setSheetData(allData);
                        const conf = allData['CONFIGURACOES'] || [];
                        conf.forEach(c => {
                            if(!c) return;
                            if(c.Chave === 'cor_primaria') document.documentElement.style.setProperty('--color-primary', c.Valor);
                            if(c.Chave === 'cor_secundaria') document.documentElement.style.setProperty('--color-secondary', c.Valor);
                            if(c.Chave === 'cor_fundo') document.documentElement.style.setProperty('--color-bg', c.Valor);
                            if(c.Chave === 'logo_url') setLogoUrl(c.Valor); // Puxando a logo
                        });
                    }
                }; init();
            }, []);

            // Toda vez que as configurações atualizarem (Admin salvar o painel), atualiza a logo.
            useEffect(() => {
                const conf = sheetData['CONFIGURACOES'] || [];
                conf.forEach(c => {
                    if(!c) return;
                    if(c.Chave === 'logo_url') setLogoUrl(c.Valor);
                });
            }, [sheetData]);

            const loadData = async (tab) => {
                setLoading(true);
                if (tab === 'Home') {
                    const [news, atend, lembretes, mural] = await Promise.all([api.fetch('NOVIDADES_E_EVENTOS'), api.fetch('CONTROLE_ATENDIMENTOS'), api.fetch('LEMBRETES_HORA'), api.fetch('MURAL_AVISOS')]);
                    setSheetData(prev => ({ ...prev, 'NOVIDADES_E_EVENTOS': news, 'CONTROLE_ATENDIMENTOS': atend, 'LEMBRETES_HORA': lembretes, 'MURAL_AVISOS': mural }));
                } else if (tab === 'ESCALAS') {
                    const [escala, medicos, u, cont] = await Promise.all([api.fetch('ESCALAS'), api.fetch('CORPO CLINICO'), api.fetch('USUARIOS'), api.fetch('CONTROLE_ATENDIMENTOS')]);
                    setSheetData(prev => ({ ...prev, 'ESCALAS': escala, 'CORPO CLINICO': medicos, 'USUARIOS': u, 'CONTROLE_ATENDIMENTOS': cont }));
                } else {
                    const data = await api.fetch(tab); setSheetData(prev => ({ ...prev, [tab]: data }));
                }
                setLoading(false);
            };

            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            if (!user) {
                const handleFirebaseLogin = async (e) => {
                    e.preventDefault(); setLoading(true); setLoginErrorMsg('');
                    localStorage.setItem('shared_auth', 'false'); setIsSharedAuth(false);
                    const res = await api.login(e.target.email.value, e.target.password.value);
                    if (res && res.success) { setUser(res.user); loadData('Home'); } 
                    else { setLoginErrorMsg(res?.message || 'Erro ao conectar com o servidor.'); }
                    setLoading(false);
                };

                const handleSharedLogin = (e) => {
                    e.preventDefault(); setLoginErrorMsg('');
                    if (e.target.shared_password.value === SENHA_ACESSO_GERAL) {
                        auth?.signOut(); // FORÇA LOGOUT DO ADMIN FANTASMA
                        localStorage.setItem('shared_auth', 'true');
                        setIsSharedAuth(true);
                        setUser({ 'Nome Completo': 'Equipe São Vicente', 'Nível de Acesso': 'Colaborador' });
                        loadData('Home');
                    } else { setLoginErrorMsg('Senha de acesso geral incorreta.'); }
                };

                return (
                    <div className="min-h-screen bg-medical dark:bg-slate-900 flex flex-col items-center justify-center p-4">
                        {isOffline && <div className="mb-6 bg-red-600 text-white px-6 py-2 rounded-full font-bold shadow-lg animate-pulse flex items-center gap-2 text-sm"><i className="ph-bold ph-wifi-slash"></i> Sem Internet. O login pode falhar se não estiver em cache.</div>}
                        <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col md:flex-row animate-fade-in border border-gray-100 dark:border-slate-700">
                            <div className="md:w-5/12 bg-gradient-to-br from-primary to-blue-800 text-white p-10 md:p-12 flex flex-col justify-center relative">
                                <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                                <div className="relative z-10 text-center">
                                    {logoUrl ? (
                                        <img src={formatImageUrl(logoUrl)} className="w-24 h-24 md:w-32 md:h-32 mx-auto object-contain mb-6 drop-shadow-xl" alt="Logo" />
                                    ) : (
                                        <div className="w-24 h-24 md:w-28 md:h-28 mx-auto bg-white/10 rounded-[2rem] flex items-center justify-center mb-6 backdrop-blur-sm shadow-xl"><i className="ph-fill ph-heartbeat text-6xl md:text-7xl"></i></div>
                                    )}
                                    <h1 className="text-3xl md:text-4xl font-black mb-4">São Vicente</h1>
                                    <p className="text-blue-100 font-medium text-xs md:text-sm">Portal interno de comunicação, escalas e processos da clínica.</p>
                                </div>
                            </div>
                            <div className="md:w-7/12 p-8 md:p-12 bg-white dark:bg-slate-800 flex flex-col justify-center">
                                {loginErrorMsg && <div className="mb-6 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 p-4 rounded-xl flex gap-3 items-start animate-pop-in"><i className="ph-fill ph-warning-circle text-red-600 dark:text-red-400 text-xl shrink-0 mt-0.5"></i><p className="text-sm font-bold text-red-800 dark:text-red-200 leading-tight">{loginErrorMsg}</p></div>}
                                
                                {loginView === 'selecao' && (
                                    <div className="space-y-4 md:space-y-6 animate-fade-in">
                                        <h2 className="text-xl md:text-2xl font-black text-gray-800 dark:text-white mb-6 md:mb-8 text-center md:text-left">Selecione seu acesso:</h2>
                                        
                                        <button onClick={()=>setLoginView('geral')} className="w-full bg-blue-50 hover:bg-primary dark:bg-slate-700 dark:hover:bg-primary group p-5 md:p-6 rounded-[1.5rem] md:rounded-2xl border-2 border-blue-100 dark:border-slate-600 hover:border-primary transition flex items-center gap-4 md:gap-6 text-left">
                                            <div className="w-14 h-14 md:w-16 md:h-16 rounded-xl bg-white dark:bg-slate-800 text-primary flex justify-center items-center shrink-0 shadow-sm"><i className="ph-fill ph-users text-2xl md:text-3xl"></i></div>
                                            <div><h3 className="font-black text-lg md:text-xl text-gray-900 dark:text-white group-hover:text-white transition">Acesso Colaboradores</h3><p className="text-xs md:text-sm text-gray-500 dark:text-gray-400 group-hover:text-blue-100 transition mt-1">Visualização de escalas, ramais e consultas.</p></div>
                                        </button>

                                        <button onClick={()=>setLoginView('supervisor')} className="w-full bg-orange-50 hover:bg-secondary dark:bg-slate-700 dark:hover:bg-secondary group p-5 md:p-6 rounded-[1.5rem] md:rounded-2xl border-2 border-orange-100 dark:border-slate-600 hover:border-secondary transition flex items-center gap-4 md:gap-6 text-left">
                                            <div className="w-14 h-14 md:w-16 md:h-16 rounded-xl bg-white dark:bg-slate-800 text-secondary flex justify-center items-center shrink-0 shadow-sm"><i className="ph-fill ph-shield-star text-2xl md:text-3xl"></i></div>
                                            <div><h3 className="font-black text-lg md:text-xl text-gray-900 dark:text-white group-hover:text-white transition">Acesso Gestão</h3><p className="text-xs md:text-sm text-gray-500 dark:text-gray-400 group-hover:text-orange-100 transition mt-1">Edição de dados e controle de escalas.</p></div>
                                        </button>

                                        <div className="pt-6 text-center">
                                            <button onClick={()=>setLoginView('admin')} className="text-xs font-bold text-gray-400 hover:text-primary transition underline decoration-dashed underline-offset-4">Acesso Administrador Restrito</button>
                                        </div>
                                    </div>
                                )}
                                
                                {loginView === 'geral' && (
                                    <form onSubmit={handleSharedLogin} className="space-y-6 animate-fade-in">
                                        <button type="button" onClick={()=>{setLoginView('selecao'); setLoginErrorMsg('');}} className="text-gray-400 hover:text-primary flex items-center gap-2 mb-4 md:mb-6 font-bold text-sm"><i className="ph-bold ph-arrow-left"></i> Voltar</button>
                                        <h2 className="text-xl md:text-2xl font-black text-gray-800 dark:text-white mb-1 md:mb-2">Acesso da Equipe</h2>
                                        <p className="text-xs md:text-sm text-gray-500 mb-6 md:mb-8">Digite a senha geral fornecida pela coordenação.</p>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Senha de Acesso Único</label><div className="relative"><i className="ph-fill ph-lock-key absolute left-5 top-4 text-gray-400 text-xl"></i><input name="shared_password" type="password" className="w-full pl-14 pr-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-100 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-900 dark:text-white transition" placeholder="Sua senha..." required /></div></div>
                                        <button type="submit" disabled={loading} className="w-full bg-primary hover:opacity-90 text-white font-black py-4 md:py-5 rounded-xl shadow-xl shadow-primary/30 transition transform hover:-translate-y-1">{loading?'Entrando...':'Entrar no Portal'}</button>
                                    </form>
                                )}

                                {(loginView === 'supervisor' || loginView === 'admin') && (
                                    <form onSubmit={handleFirebaseLogin} className="space-y-6 animate-fade-in">
                                        <button type="button" onClick={()=>{setLoginView('selecao'); setLoginErrorMsg('');}} className="text-gray-400 hover:text-primary flex items-center gap-2 mb-4 md:mb-6 font-bold text-sm"><i className="ph-bold ph-arrow-left"></i> Voltar</button>
                                        <h2 className="text-xl md:text-2xl font-black text-gray-800 dark:text-white mb-1 md:mb-2">Acesso {loginView === 'admin' ? 'Administrador' : 'Gestão'}</h2>
                                        <p className="text-xs md:text-sm text-gray-500 mb-6 md:mb-8">Faça login com suas credenciais do painel.</p>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">E-mail</label><div className="relative"><i className="ph-fill ph-user absolute left-5 top-4 text-gray-400 text-xl"></i><input name="email" type="email" className="w-full pl-14 pr-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-100 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-900 dark:text-white transition" required /></div></div>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Senha</label><div className="relative"><i className="ph-fill ph-lock-key absolute left-5 top-4 text-gray-400 text-xl"></i><input name="password" type="password" className="w-full pl-14 pr-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-100 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-900 dark:text-white transition" required /></div></div>
                                        <button type="submit" disabled={loading} className={`w-full ${loginView === 'admin' ? 'bg-gray-900 dark:bg-white dark:text-gray-900 shadow-gray-900/30' : 'bg-secondary shadow-secondary/30'} hover:opacity-90 text-white font-black py-4 md:py-5 rounded-xl shadow-xl transition transform hover:-translate-y-1`}>{loading ? 'Conectando...' : 'Acessar'}</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            const menus = [
                { id: 'Home', icon: 'ph-house', label: 'Dashboard Inicial' },
                { id: 'MURAL_AVISOS', icon: 'ph-presentation-chart', label: 'Mural de Avisos' },
                { id: 'BOLETINS_INFORMATIVOS', icon: 'ph-newspaper', label: 'Boletins e Mídia' },
                { id: 'ESCALAS', icon: 'ph-calendar-check', label: 'Escalas e Plantões' },
                { id: 'CONVÊNIOS', icon: 'ph-file-text', label: 'Matriz de Convênios' },
                { id: 'CORPO CLINICO', icon: 'ph-stethoscope', label: 'Corpo Clínico' },
                { id: 'CONTATOS', icon: 'ph-address-book', label: 'Contatos Rápidos' },
                { id: 'CHAT_MENSAGENS', icon: 'ph-chat-circle-dots', label: 'Chat Interno' },
                { id: 'EXAMES DE IMAGEM', icon: 'ph-bone', label: 'Exames de Imagem' },
                { id: 'EXAMES DE IMAGEM E OUTROS', icon: 'ph-files', label: 'Exames e Laudos' },
                { id: 'CONSULTA E PROCEDIMENTOS', icon: 'ph-first-aid-kit', label: 'Consultas' },
                { id: 'EXAMES LABORATORIAIS', icon: 'ph-flask', label: 'Laboratório' },
                { id: 'INSTITUTOS', icon: 'ph-buildings', label: 'Institutos' },
                { id: 'REMOÇÕES', icon: 'ph-car', label: 'Remoções' },
                { id: 'SENHAS E LOGINS GERAIS', icon: 'ph-lock-key', label: 'Senhas de Sistemas' }
            ];
            const adminMenus = [ { id: 'CONTROLE_ATENDIMENTOS', icon: 'ph-chart-line-up', label: 'Metas Unimed' }, { id: 'USUARIOS', icon: 'ph-users', label: 'Colaboradores' }, { id: 'DESIGN_INTERFACE', icon: 'ph-magic-wand', label: 'Design de Interface' }, { id: 'LEMBRETES_HORA', icon: 'ph-clock', label: 'Avisos do Relógio' } ];

            const foundMenu = menus.concat(adminMenus).find(m => m.id === activeTab);
            const titleTab = foundMenu ? foundMenu.label : activeTab;

            return (
                <div className="min-h-screen flex flex-col md:flex-row overflow-hidden relative selection:bg-primary selection:text-white bg-medical dark:bg-slate-900">
                    
                    {isOffline && <div className="absolute top-0 inset-x-0 z-[99999] bg-red-600 text-white text-[10px] md:text-xs font-black py-2 md:py-1.5 flex justify-center items-center gap-2 shadow-md animate-fade-in"><i className="ph-bold ph-wifi-slash text-sm md:text-base"></i> Sem Conexão: Operando com dados salvos em cache local.</div>}
                    
                    {toast.show && <div className={`fixed bottom-4 md:bottom-8 right-4 md:right-8 z-[9999] px-6 md:px-8 py-4 md:py-5 rounded-xl md:rounded-custom shadow-2xl text-white font-black text-sm md:text-lg animate-slide-up bg-green-500`}><i className="ph-bold ph-check-circle text-xl md:text-2xl"></i> {toast.message}</div>}

                    <div className="md:hidden bg-primary text-white p-4 flex justify-between items-center z-40 shadow-lg relative">
                        <div className="flex items-center gap-3 font-black text-xl">
                            {logoUrl ? <img src={formatImageUrl(logoUrl)} className="h-8 object-contain" alt="Logo" /> : <i className="ph-fill ph-heartbeat text-2xl"></i>}
                            Portal SV
                        </div>
                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-3xl p-1 bg-white/10 rounded-lg"><i className={`ph-bold ${isMobileMenuOpen ? 'ph-x' : 'ph-list'}`}></i></button>
                    </div>

                    {isMobileMenuOpen && <div className="fixed inset-0 bg-black/60 z-40 md:hidden backdrop-blur-sm" onClick={() => setIsMobileMenuOpen(false)}></div>}

                    <aside className={`fixed inset-y-0 left-0 w-72 md:w-80 bg-white dark:bg-slate-800 border-r border-gray-100 dark:border-slate-700 flex flex-col h-screen shrink-0 shadow-2xl z-50 transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 transition-transform duration-300 ease-in-out`}>
                        <div className="p-6 md:p-8 flex items-center border-b border-gray-100 dark:border-slate-700 bg-gray-50/50 dark:bg-slate-900/50 cursor-pointer" onClick={()=>{setActiveTab('Home'); loadData('Home'); setIsMobileMenuOpen(false);}}>
                            {logoUrl ? (
                                <img src={formatImageUrl(logoUrl)} className="w-12 h-12 md:w-16 md:h-16 object-contain mr-3" alt="Logo" />
                            ) : (
                                <div className="bg-primary text-white p-2 md:p-3 rounded-xl md:rounded-2xl mr-3 shadow-md"><i className="ph-fill ph-heartbeat text-2xl md:text-3xl"></i></div>
                            )}
                            <div><h1 className="text-xl md:text-2xl font-black leading-none text-gray-900 dark:text-white">Portal</h1><span className="text-[10px] font-black text-primary uppercase tracking-widest">São Vicente</span></div>
                        </div>
                        <div className="p-5 md:p-6 border-b border-gray-50 dark:border-slate-700 flex items-center gap-4">
                            {userFoto ? <img src={formatImageUrl(userFoto)} className="w-12 h-12 md:w-14 md:h-14 rounded-xl md:rounded-custom object-cover shadow-md shrink-0 border-2 border-white dark:border-slate-700" alt="Avatar" /> : <div className="w-12 h-12 md:w-14 md:h-14 rounded-xl md:rounded-custom bg-gradient-to-tr from-secondary to-orange-400 flex items-center justify-center text-white font-black text-xl md:text-2xl shadow-md shrink-0">{safeString(userName || 'U').charAt(0).toUpperCase()}</div>}
                            <div className="flex-1 overflow-hidden">
                                <p className="text-sm md:text-base font-black truncate text-gray-900 dark:text-white">{userName}</p>
                                <p className="text-[9px] md:text-[10px] font-black text-primary bg-primary/10 px-2 py-1 rounded-md inline-block mt-1 uppercase tracking-widest">{isAdmin?'Gestão/Admin':'Equipe'}</p>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-3 md:p-4 space-y-1 custom-scrollbar pb-8 mt-4 md:mt-0">
                            <div className="px-3 md:px-4 mb-2 mt-2 text-[9px] md:text-[10px] font-black text-gray-400 uppercase tracking-widest">Menu Principal</div>
                            {menus.map(m => <button key={m.id} onClick={()=>{setActiveTab(m.id); loadData(m.id); setIsMobileMenuOpen(false);}} className={`w-full flex items-center gap-3 md:gap-4 px-4 md:px-5 py-3 rounded-xl md:rounded-custom text-xs md:text-sm font-bold transition-all ${activeTab===m.id?'bg-primary text-white shadow-xl md:scale-[1.02]':'text-gray-500 hover:bg-gray-100 dark:hover:bg-slate-700'}`}><i className={`ph-fill ${m.icon} text-lg md:text-xl`}></i> {m.label}</button>)}
                            
                            {isAdmin && (
                                <>
                                    <div className="px-3 md:px-4 mt-6 mb-2 text-[9px] md:text-[10px] font-black text-gray-400 uppercase tracking-widest">Gestão Avançada</div>
                                    {adminMenus.map(m => <button key={m.id} onClick={()=>{setActiveTab(m.id); loadData(m.id); setIsMobileMenuOpen(false);}} className={`w-full flex items-center gap-3 md:gap-4 px-4 md:px-5 py-3 rounded-xl md:rounded-custom text-xs md:text-sm font-bold transition-all ${activeTab===m.id?'bg-gray-900 dark:bg-white text-white dark:text-gray-900 shadow-xl md:scale-[1.02]':'text-gray-500 hover:bg-gray-100 dark:hover:bg-slate-700'}`}><i className={`ph-fill ${m.icon} text-lg md:text-xl`}></i> {m.label}</button>)}
                                </>
                            )}
                            <button onClick={()=>{auth?.signOut(); localStorage.removeItem('shared_auth'); setIsSharedAuth(false); setUser(null);}} className="w-full flex items-center gap-3 md:gap-4 px-4 md:px-5 py-3 rounded-xl md:rounded-custom text-xs md:text-sm font-bold text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 mt-8 transition"><i className="ph-fill ph-sign-out text-lg md:text-xl"></i> Sair do Sistema</button>
                        </div>
                    </aside>

                    <main className="flex-1 h-[calc(100vh-76px)] md:h-screen overflow-y-auto relative custom-scrollbar p-4 md:p-10 pt-6 md:pt-10">
                        <ErrorBoundary>
                            {loading && <div className="fixed inset-0 bg-white/70 dark:bg-slate-900/70 backdrop-blur z-40 flex items-center justify-center"><div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin shadow-lg"></div></div>}

                            {activeTab === 'Home' && !loading && (
                                <div className="space-y-8 md:space-y-12 animate-fade-in max-w-[1400px] mx-auto">
                                    <ClockWidget lembretesData={sheetData['LEMBRETES_HORA']} />
                                    
                                    {Array.isArray(sheetData['CONTROLE_ATENDIMENTOS']) && sheetData['CONTROLE_ATENDIMENTOS'].filter(a => Number(a.Limite_Max||0) > 0 && (Number(a.Qtd_Atual||0)/Number(a.Limite_Max||1)) >= 0.9).length > 0 && (
                                        <div>
                                            <h3 className="text-xl md:text-2xl font-black text-red-600 flex items-center gap-3 mb-4 md:mb-6 px-2"><i className="ph-fill ph-warning-circle animate-pulse"></i> Alertas Unimed</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                {sheetData['CONTROLE_ATENDIMENTOS'].filter(a => Number(a.Limite_Max||0) > 0 && (Number(a.Qtd_Atual||0)/Number(a.Limite_Max||1)) >= 0.9).map((a, i) => {
                                                    const qtd = Number(a.Qtd_Atual || 0); const max = Number(a.Limite_Max || 1);
                                                    const perc = (qtd / max) * 100; const isCritico = perc >= 100;
                                                    return (
                                                        <div key={i} className={`p-6 md:p-8 rounded-[2rem] md:rounded-[2.5rem] shadow-xl border-4 ${isCritico ? 'bg-red-600 border-red-800 text-white' : 'bg-orange-50 border-orange-200 text-orange-900'}`}>
                                                            <div className="flex justify-between items-center mb-4 md:mb-6"><span className="font-black text-xl md:text-2xl">{safeString(a.Profissional)}</span></div>
                                                            <div className="w-full bg-black/10 rounded-full h-3 md:h-4 mb-4"><div className={`h-3 md:h-4 rounded-full ${isCritico ? 'bg-white' : 'bg-orange-500'}`} style={{width: `${Math.min(perc, 100)}%`}}></div></div>
                                                            <p className="text-4xl md:text-5xl font-black leading-none">{qtd} <span className="text-lg md:text-xl opacity-60">/ {max}</span></p>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                    )}

                                    <div>
                                        <h3 className="text-xl md:text-3xl font-black mb-6 md:mb-8 text-gray-900 dark:text-white px-2">Acesso Rápido</h3>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4 md:gap-6">
                                            {[ { l: 'Mural', i: 'ph-presentation-chart', bg:'bg-blue-50 dark:bg-blue-900/30', c:'text-blue-600 dark:text-blue-400', t: 'MURAL_AVISOS' }, { l: 'Painel', i: 'ph-kanban', bg:'bg-orange-50 dark:bg-orange-900/30', c:'text-orange-600 dark:text-orange-400', t: 'ESCALAS' }, { l: 'Boletins', i: 'ph-newspaper', bg:'bg-purple-50 dark:bg-purple-900/30', c:'text-purple-600 dark:text-purple-400', t: 'BOLETINS_INFORMATIVOS' }, { l: 'Consultas', i: 'ph-stethoscope', bg:'bg-blue-50 dark:bg-blue-900/30', c:'text-blue-600 dark:text-blue-400', t: 'CONSULTA E PROCEDIMENTOS' }, { l: 'Imagem', i: 'ph-bone', bg:'bg-green-50 dark:bg-green-900/30', c:'text-green-600 dark:text-green-400', t: 'EXAMES DE IMAGEM' }, { l: 'Senhas', i: 'ph-lock-key', bg:'bg-red-50 dark:bg-red-900/30', c:'text-red-600 dark:text-red-400', t: 'SENHAS E LOGINS GERAIS' } ].map((d, i) => (
                                                <button key={i} onClick={()=>{setActiveTab(d.t);loadData(d.t)}} className={`${d.bg} ${d.c} p-4 md:p-6 rounded-[1.5rem] md:rounded-[2rem] flex flex-col items-center justify-center gap-3 md:gap-4 card-hover shadow-sm border border-transparent dark:border-slate-700`}>
                                                    <i className={`ph-fill ${d.i} text-3xl md:text-4xl`}></i><span className="font-black text-[10px] md:text-xs text-center uppercase tracking-widest">{d.l}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'CHAT_MENSAGENS' && !loading && <ChatModerno chatData={sheetData['CHAT_MENSAGENS']} user={user} onSaveChat={api.saveRecord} onRefresh={()=>loadData('CHAT_MENSAGENS')} />}
                            {activeTab === 'ESCALAS' && !loading && <EscalasContainer sheetData={sheetData} user={user} onRefresh={()=>loadData('ESCALAS')} showToast={showToast} />}
                            {activeTab === 'DESIGN_INTERFACE' && !loading && <DesignInterfacePanel sheetData={sheetData} onRefresh={()=>loadData('CONFIGURACOES')} showToast={showToast} />}

                            {activeTab !== 'Home' && activeTab !== 'CHAT_MENSAGENS' && activeTab !== 'ESCALAS' && activeTab !== 'DESIGN_INTERFACE' && !loading && (
                                <DataTableGeneric title={titleTab} tabName={activeTab} data={sheetData[activeTab] || []} user={user} onRefresh={()=>loadData(activeTab)} showToast={showToast} />
                            )}
                        </ErrorBoundary>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
