<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1E40AF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Portal SV">
    
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">

    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        const VERSAO_ATUAL = "8.5.0"; // Versão Limpa, sem Design Dinâmico, Auth Corrigida e com Dark Mode
        if (window.location.search.indexOf('v=' + VERSAO_ATUAL) === -1) {
            localStorage.clear(); sessionStorage.clear();
            window.location.replace(window.location.pathname + (window.location.pathname.indexOf('?') === -1 ? '?' : '&') + 'v=' + VERSAO_ATUAL);
        }
    </script>

    <title>Portal São Vicente</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: { extend: { colors: { primary: '#1E40AF', secondary: '#F97316', medical: '#E0F2FE' }, fontFamily: { sans: ['Inter', 'sans-serif'] }, borderRadius: { 'custom': '1.5rem' }, animation: { 'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite', 'fade-in': 'fadeIn 0.3s ease-out', 'pop-in': 'popIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards', 'bounce-slight': 'bounceSlight 2s infinite ease-in-out' }, keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }, popIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } }, bounceSlight: { '0%, 100%': { transform: 'translateY(-10%)' }, '50%': { transform: 'translateY(0)' } } } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; transition: background-color 0.3s ease, color 0.3s ease; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        body.dark { background-color: #0f172a; } 
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .card-hover { transition: all 0.3s ease; border-radius: 1.5rem; cursor: pointer; }
        .card-hover:hover { transform: translateY(-5px) scale(1.02); z-index: 10; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border-color: #1E40AF; }
        .glass-modal { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); }
        .dark .glass-modal { background: rgba(15, 23, 42, 0.85); }
        .rounded-custom { border-radius: 1.5rem !important; }
        .custom-scrollbar { overflow-y: auto; }
        .matrix-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .matrix-table th { padding: 1rem; color: white; font-weight: 800; text-transform: uppercase; font-size: 0.85rem; text-align: center; border: none; }
        .matrix-table th:first-child { border-radius: 1rem 0 0 1rem; background-color: #1e293b; text-align: left; position: sticky; left: 0; z-index: 30; }
        .matrix-table th:last-child { border-radius: 0 1rem 1rem 0; }
        .matrix-row { background-color: #ffffff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: transform 0.2s, box-shadow 0.2s; position: relative; }
        .matrix-row:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgba(0,0,0,0.1); z-index: 20; }
        .dark .matrix-row { background-color: #1e293b; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        .matrix-row td { padding: 1rem; text-align: center; vertical-align: middle; border: none; }
        .matrix-row td:first-child { background-color: #1e293b; color: white; font-weight: bold; border-radius: 1rem 0 0 1rem; text-align: left; position: sticky; left: 0; z-index: 20; border-left: 6px solid #1E40AF; }
        .matrix-row td:last-child { border-radius: 0 1rem 1rem 0; }
    </style>
</head>
<body class="text-gray-800 dark:text-slate-100">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useRef, Component } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyArUJk5o90YfmMqRZl2kBaFfvRXFZcW3cE",
            authDomain: "portal-sao-vicente.firebaseapp.com",
            projectId: "portal-sao-vicente",
            storageBucket: "portal-sao-vicente.firebasestorage.app",
            messagingSenderId: "52988900084",
            appId: "1:52988900084:web:9f5f2d494c22b10eb2a4a1"
        };

        let db = null; let auth = null;
        if (firebaseConfig.apiKey !== "" && !firebaseConfig.apiKey.includes("AIzaSySuaChave")) {
            try {
                if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
                db = firebase.firestore();
                auth = firebase.auth();
            } catch (error) { console.error("Erro Firebase:", error); }
        }

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, erroInfo: "" }; }
            static getDerivedStateFromError(error) { return { hasError: true, erroInfo: String(error) }; }
            render() {
                if (this.state.hasError) return (
                    <div className="p-10 text-center flex flex-col items-center justify-center min-h-screen bg-gray-50">
                        <i className="ph-fill ph-warning-circle text-6xl text-red-500 mb-4"></i>
                        <h2 className="text-3xl font-black text-gray-800 mb-2">Aviso do Sistema</h2>
                        <p className="text-gray-500 mb-6 max-w-md">Ocorreu um erro ao processar a tela.</p>
                        <button onClick={()=>window.location.reload()} className="bg-primary text-white px-10 py-4 rounded-xl font-black shadow-lg">Recarregar Portal</button>
                    </div>
                );
                return this.props.children; 
            }
        }

        const safeString = (val) => (val === null || val === undefined) ? '' : String(val);
        const formatDateForInput = (val) => { const s = safeString(val).trim(); if (s.includes('/')) { const parts = s.split('/'); if (parts.length === 3 && parts[2].length === 4) return `${parts[2]}-${parts[1]}-${parts[0]}`; } return s; };
        const formatImageUrl = (url) => { const str = safeString(url).trim(); if (!str) return ''; if (str.includes('drive.google.com')) { const match = str.match(/\/d\/([a-zA-Z0-9_-]+)/) || str.match(/id=([a-zA-Z0-9_-]+)/) || str.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if (match && match[1]) return `https://drive.google.com/uc?export=view&id=${match[1]}`; } return str; };
        const getEmbedUrl = (url) => { const str = safeString(url).trim(); if (str.includes('youtube.com/watch')) return str.replace('watch?v=', 'embed/'); if (str.includes('youtu.be/')) return str.replace('youtu.be/', 'youtube.com/embed/'); if (str.includes('drive.google.com')) { const match = str.match(/\/d\/([a-zA-Z0-9_-]+)/) || str.match(/id=([a-zA-Z0-9_-]+)/) || str.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if (match && match[1]) return `https://drive.google.com/file/d/${match[1]}/preview`; } return str; };
        
        const isPastEnd = (horaFimStr) => {
            const str = safeString(horaFimStr); if(!str) return false;
            const match = str.match(/(\d{2}):(\d{2})/g);
            if (match && match.length > 0) {
                const endTime = match[match.length - 1]; const [hours, mins] = endTime.split(':').map(Number); const now = new Date();
                if (now.getHours() > hours || (now.getHours() === hours && now.getMinutes() >= mins)) return true;
            }
            return false;
        };

        const tabSchemas = {
            'CONVÊNIOS': ['ID', 'Código', 'Procedimento'], 
            'CORPO CLINICO': ['ID', 'Médico', 'Especialidade', 'Segmento', 'Código UNIMED', 'CRM', 'CBO', 'Cor_Selo', 'Foto_URL'], 
            'EXAMES DE IMAGEM': ['ID', 'Categoria', 'Código', 'Nome do Exame', 'Profissionais', 'Idade Permitida', 'Observações', 'Imagem_URL'],
            'EXAMES DE IMAGEM E OUTROS': ['ID', 'Código', 'Descrição', 'Valor', 'Prazo de Laudo', 'Onde Encontrar', 'Imagem_URL'],
            'CONSULTA E PROCEDIMENTOS': ['ID', 'Código', 'Consulta/Procedimento', 'Descrição', 'Preparo', 'Material Utilizado', 'Valor Particular', 'Imagem_URL'],
            'EXAMES LABORATORIAIS': ['ID', 'Código', 'Procedimento', 'Valor', 'Prazo de Liberação', 'Preparo', 'Motivo_Indicacao'],
            'CONTATOS': ['ID', 'Tipo', 'Local_Setor', 'Nome_Contato', 'Valor_Contato', 'Anotacoes'], 
            'SENHAS E LOGINS GERAIS': ['ID', 'Nome do Sistema', 'Link do Sistema', 'Login', 'Senha', 'Observações'],
            'REMOÇÕES': ['ID', 'Nome do Hospital/Clínica', 'Contato', 'Local', 'Informações Importantes', 'Convênios Atendidos', 'Imagem_URL'],
            'INSTITUTOS': ['ID', 'Tabela_Instituto', 'Profissional', 'Especialidade', 'CRM_URA', 'Valores'],
            'NOVIDADES_E_EVENTOS': ['ID', 'Tipo', 'Título', 'Mensagem', 'Data de Publicação', 'Imagem_URL'],
            'BOLETINS_INFORMATIVOS': ['ID', 'Título', 'Descrição', 'Tipo_Midia', 'Link_Arquivo', 'Data_Publicacao'],
            'CONTROLE_ATENDIMENTOS': ['ID', 'Profissional', 'Convênio', 'Qtd_Atual', 'Limite_Max'],
            'USUARIOS': ['ID', 'Nome Completo', 'E-mail', 'Nível de Acesso', 'Data de Nascimento', 'Foto_Perfil_URL', 'Status', 'Competências', 'Hora Início', 'Hora Fim', 'Horários Flexíveis', 'Formato Contratação'],
            'ESCALAS': ['ID', 'Tipo_Profissional', 'Nome_Profissional', 'Data', 'Turno', 'Horario', 'Unidade', 'Setor_Consultorio', 'Status_Turno', 'Substituindo'],
            'CHAT_MENSAGENS': ['ID', 'Data_Hora', 'Nome', 'Mensagem', 'Destinatario'],
            'LEMBRETES_HORA': ['ID', 'Hora', 'Mensagem'],
            'MURAL_AVISOS': ['ID', 'Layout', 'Título', 'Subtítulo', 'Imagem_URL', 'Link', 'Ativo']
        };

        const api = {
            fetch: async (colName) => {
                if(!db) return [];
                try { const snap = await db.collection(colName).get(); return snap.docs.map(doc => ({ ID: doc.id, ...doc.data() })); } catch (e) { return []; }
            },
            fetchAll: async () => {
                if(!db) return {}; let allData = {};
                for (let c of Object.keys(tabSchemas)) { try { const snap = await db.collection(c).get(); allData[c] = snap.docs.map(doc => ({ ID: doc.id, ...doc.data() })); } catch(e) {} }
                return allData;
            },
            login: async (rawEmail, password) => {
                if(!auth) return { success: false, message: 'As chaves não estão configuradas.' };
                try {
                    const email = rawEmail.trim(); await auth.signInWithEmailAndPassword(email, password);
                    const userDoc = await db.collection('USUARIOS').where('E-mail', '==', email).get();
                    let userData = { 'E-mail': email, 'Nome Completo': email.split('@')[0], 'Nível de Acesso': 'Admin' };
                    if (!userDoc.empty) {
                        userData = { ID: userDoc.docs[0].id, ...userDoc.docs[0].data() };
                        if (userData.Status && String(userData.Status).toLowerCase() === 'inativo') { await auth.signOut(); return { success: false, message: 'Conta inativa.' }; }
                    }
                    return { success: true, user: userData };
                } catch (error) { return { success: false, message: "E-mail ou senha incorretos." }; }
            },
            saveRecord: async (colName, data, isEdit) => {
                if(!db) return { success: false };
                try {
                    let docData = { ...data };
                    Object.keys(docData).forEach(k => { if(typeof docData[k] === 'string') docData[k] = docData[k].trim(); });
                    let id = docData.ID; delete docData.ID;
                    Object.keys(docData).forEach(key => docData[key] === undefined && delete docData[key]);
                    if (isEdit && id) await db.collection(colName).doc(id).update(docData); else await db.collection(colName).add(docData);
                    return { success: true };
                } catch (e) { return { success: false }; }
            },
            deleteRecord: async (colName, id) => {
                if(!db) return { success: false };
                try { await db.collection(colName).doc(id).delete(); return { success: true }; } catch (e) { return { success: false }; }
            }
        };

        const ClockWidget = ({ lembretesData }) => {
            const [time, setTime] = useState(new Date());
            useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);
            const hour = time.getHours();
            let periodStr = 'Bom dia'; let icon = 'ph-sun'; let bgClass = 'bg-blue-50 text-blue-800 dark:bg-blue-900/30 dark:text-blue-200';
            if (hour >= 12 && hour < 18) { periodStr = 'Boa tarde'; icon = 'ph-cloud-sun'; bgClass = 'bg-orange-50 text-orange-800 dark:bg-orange-900/30 dark:text-orange-200'; }
            else if (hour >= 18 || hour < 6) { periodStr = 'Boa noite'; icon = 'ph-moon-stars'; bgClass = 'bg-indigo-900 text-indigo-100 dark:bg-slate-800 dark:text-indigo-200'; }
            const lembretes = Array.isArray(lembretesData) ? lembretesData : [];
            const lembreteAtual = lembretes.find(l => l && typeof l === 'object' && parseInt(safeString(l.Hora) || -1) === hour);
            const msg = lembreteAtual ? safeString(lembreteAtual.Mensagem) : 'Tenha um excelente turno de trabalho!';

            return (
                <div className={`p-6 rounded-custom shadow-sm flex items-center justify-between transition-colors duration-1000 ${bgClass}`}>
                    <div className="flex items-center gap-5">
                        <div className="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur flex items-center justify-center shadow-inner"><i className={`ph-fill ${icon} text-4xl animate-spin-slow`}></i></div>
                        <div><h2 className="text-3xl md:text-4xl font-black tracking-tighter">{time.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit', second:'2-digit'})}</h2><p className="text-xs md:text-sm font-bold uppercase tracking-widest opacity-80 mt-1">{periodStr}</p></div>
                    </div>
                    <div className="hidden md:flex flex-col items-end max-w-xs text-right border-l-2 border-white/20 pl-6">
                        <span className="text-[10px] font-black uppercase tracking-widest opacity-60 mb-1 flex items-center gap-1"><i className="ph-fill ph-bell-ringing animate-pulse"></i> Lembrete da Hora</span>
                        <p className="text-base font-bold leading-tight">{msg}</p>
                    </div>
                </div>
            )
        };

        const ModalForm = ({ title, schema, formData, setFormData, onSave, onClose, loading }) => {
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 glass-modal animate-fade-in overflow-y-auto" onMouseDown={onClose}>
                    <div className="bg-white dark:bg-slate-800 rounded-custom w-full max-w-3xl max-h-[90vh] flex flex-col shadow-2xl animate-pop-in overflow-hidden border border-gray-100 dark:border-slate-700 m-auto mt-4 mb-4" onMouseDown={e => e.stopPropagation()}>
                        <div className="p-6 bg-gray-50 dark:bg-slate-900 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center shrink-0">
                            <h3 className="text-xl md:text-2xl font-black flex items-center gap-3 text-gray-900 dark:text-white"><div className="w-10 h-10 rounded-full bg-primary/10 text-primary flex items-center justify-center"><i className={`ph-bold ${formData?.ID ? 'ph-pencil-simple' : 'ph-plus'}`}></i></div> {formData?.ID ? 'Editar' : 'Novo'} {title}</h3>
                            <button type="button" onClick={onClose} className="w-10 h-10 rounded-full bg-gray-200 dark:bg-slate-700 hover:bg-red-500 hover:text-white transition flex items-center justify-center"><i className="ph-bold ph-x text-lg"></i></button>
                        </div>
                        <div className="p-6 md:p-8 overflow-y-auto flex-1 custom-scrollbar">
                            <form id="gen-form" onSubmit={onSave} className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {(schema || []).filter(col => safeString(col) !== 'ID').map((col, idx) => {
                                    const colName = safeString(col); const cLower = colName.toLowerCase();
                                    const isLong = cLower.includes('descrição') || cLower.includes('anotações') || cLower.includes('mensagem') || cLower.includes('preparo') || cLower.includes('url') || cLower.includes('site') || cLower.includes('motivo') || cLower.includes('competências') || cLower.includes('dias de trabalho') || cLower.includes('horários flexíveis');
                                    
                                    return (
                                        <div key={idx} className={isLong ? 'md:col-span-2' : ''}>
                                            <label className="block text-[10px] md:text-xs font-black text-gray-400 dark:text-slate-400 mb-2 uppercase tracking-widest">{colName}</label>
                                            
                                            {colName === 'Layout' && title.includes('Aviso') ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="Padrão">Padrão</option><option value="Imagem Grande">Imagem Grande (Banner)</option><option value="Só Texto">Só Texto</option>
                                                </select>
                                            ) : colName === 'Tipo_Midia' ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={e => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="Documento PDF">Documento (Drive PDF)</option><option value="Apresentação">Apresentação (Slides Drive)</option><option value="Vídeo">Vídeo (YouTube/Drive)</option><option value="Imagem">Imagem Externa</option><option value="Outro">Outro Formato</option>
                                                </select>
                                            ) : colName === 'Tipo' && title.includes('Contato') ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="Ramal">Ramal Interno</option><option value="Email">E-mail</option><option value="Telefone">Telefone Externo</option>
                                                </select>
                                            ) : colName.includes('?') || colName === 'Status' || colName === 'Ativo' ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="">Selecione...</option><option value="Sim">Sim</option><option value="Não">Não</option><option value="Ativo">Ativo</option><option value="Inativo">Inativo</option>
                                                </select>
                                            ) : colName === 'Nível de Acesso' ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="">Selecione...</option><option value="Colaborador">Colaborador</option><option value="Supervisor">Supervisor</option><option value="Admin">Admin</option>
                                                </select>
                                            ) : colName.includes('Cor') ? (
                                                <div className="flex items-center gap-3 bg-gray-50 dark:bg-slate-900 p-3 rounded-xl border border-gray-200 dark:border-slate-700">
                                                    <input type="color" className="w-10 h-10 rounded-xl cursor-pointer border-0 bg-transparent" value={safeString(formData[colName]) || '#1E40AF'} onChange={(e) => setFormData({...formData, [colName]: e.target.value})} />
                                                    <span className="font-mono text-sm font-bold text-gray-500">{safeString(formData[colName]) || 'Cor Padrão'}</span>
                                                </div>
                                            ) : isLong && !cLower.includes('url') && !cLower.includes('site') && !cLower.includes('link') ? (
                                                <textarea className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary min-h-[100px] font-medium text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})} placeholder={cLower.includes('competências') ? 'Ex: Recepção, Triagem' : cLower.includes('dias') ? 'Ex: Seg, Ter, Qua' : `Detalhes...`}></textarea>
                                            ) : cLower.includes('data') ? (
                                                <input type="date" className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={formatDateForInput(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})} />
                                            ) : cLower.includes('hora') || cLower.includes('início') || cLower.includes('fim') ? (
                                                <input type="time" className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})} />
                                            ) : (
                                                <input type={cLower.includes('senha') ? 'password' : 'text'} className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})} placeholder={`Preencha ${cLower}`} />
                                            )}
                                        </div>
                                    )
                                })}
                            </form>
                        </div>

                                {item.Imagem_URL && <img src={formatImageUrl(item.Imagem_URL)} className="w-full h-32 object-cover rounded-xl mb-4 border" />}

                                <p className="text-xs font-bold text-gray-400 uppercase">{groupedByTabela[tab].length} Profissionais</p>

            safeData.forEach(row => { if(row && typeof row === 'object') Object.keys(row).forEach(k => { if(k !== 'ID' && k !== 'Código' && k !== 'Procedimento') dynamicCols.add(k); }); });
            let insurances = Array.from(dynamicCols);

            let allKeys = ['ID', 'Código', 'Procedimento', ...insurances];
            let procColName = 'Procedimento';

            const filteredData = safeData.filter(row => row && typeof row === 'object' && (safeString(row.Procedimento).toLowerCase().includes(search.toLowerCase()) || safeString(row['Código']).toLowerCase().includes(search.toLowerCase())));
            const headerColors = ['#2563eb', '#0ea5e9', '#0d9488', '#10b981', '#8b5cf6', '#d946ef', '#f43f5e', '#f97316'];

                                                        </td>
                                                    );
                                                })}

                        {canEdit && <button onClick={()=>openModal({Tipo: activeTab}, schema)} className="bg-primary text-white w-full md:w-auto font-black px-6 py-3.5 rounded-xl shadow-md hover:-translate-y-1 transition flex justify-center items-center gap-2 shrink-0"><i className="ph-bold ph-plus"></i> Novo Contato</button>}

                                        <button onClick={()=>{if(confirm('Excluir?')) handleDelete(item.ID)}} className="p-2 text-red-600 bg-white shadow rounded-lg hover:bg-red-600 hover:text-white"><i className="ph-bold ph-trash"></i></button>

                        ))}
                        {filtered.length === 0 && <div className="col-span-full p-20 text-center text-gray-400 font-bold border-2 border-dashed rounded-3xl dark:border-slate-700">Nenhum {activeTab} cadastrado.</div>}

        };

        const ChatModerno = ({ chatData, user, onSaveChat, onRefresh }) => {
            const [msg, setMsg] = useState('');
            const [activeRoom, setActiveRoom] = useState('Geral'); 
            const isAdmin = user && typeof user === 'object' && ['admin', 'supervisor'].some(r => { const nk = Object.keys(user).find(k => safeString(k).toLowerCase().includes('acesso')); return nk ? safeString(user[nk]).toLowerCase().includes(r) : false; });
            const myName = safeString(user && user['Nome Completo'] ? user['Nome Completo'] : 'Usuário');
            const chatLog = Array.isArray(chatData) ? chatData : [];
            const isGeral = activeRoom === 'Geral';
            
            const mensagensRoom = chatLog.filter(m => {
                if(!m) return false;
                if(isGeral) return safeString(m.Destinatario) === 'Geral';
                return (safeString(m.Nome) === myName && safeString(m.Destinatario) === activeRoom) || (safeString(m.Nome) === activeRoom && safeString(m.Destinatario) === myName);
            }).sort((a,b) => new Date(a.Data_Hora) - new Date(b.Data_Hora));

            const handleSend = async (e) => {
                e.preventDefault(); if(!msg)return;
                let dest = activeRoom;
                if(!isAdmin && activeRoom === 'Supervisão') dest = 'Supervisão';
                await onSaveChat('CHAT_MENSAGENS', {ID:'', Data_Hora:new Date().toISOString(), Nome:myName, Mensagem:msg, Destinatario:dest}, false);
                setMsg(''); onRefresh();
            };

            return (
                <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] shadow-xl border border-gray-100 dark:border-slate-700 h-[75vh] md:h-[80vh] flex flex-col md:flex-row overflow-hidden animate-fade-in">
                    <div className="md:w-1/3 border-b md:border-r border-gray-100 dark:border-slate-700 bg-gray-50/50 dark:bg-slate-900/50 flex flex-col shrink-0">
                        <div className="p-4 md:p-6 border-b border-gray-100 dark:border-slate-700 bg-white dark:bg-slate-800"><h2 className="text-xl md:text-2xl font-black flex items-center gap-3"><i className="ph-fill ph-chats-circle text-primary"></i> Comunicação</h2></div>
                        <div className="p-3 md:p-4 space-y-2 overflow-y-auto flex md:flex-col gap-2 md:gap-0 hide-scroll">
                            <div onClick={()=>setActiveRoom('Geral')} className={`p-3 md:p-4 rounded-2xl cursor-pointer font-bold flex items-center gap-3 transition whitespace-nowrap md:whitespace-normal shrink-0 ${activeRoom==='Geral'?'bg-primary text-white shadow-md':'hover:bg-gray-100 dark:hover:bg-slate-800 text-gray-700 dark:text-gray-300'}`}><div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-white/20 flex items-center justify-center"><i className="ph-fill ph-users text-lg md:text-xl"></i></div> Fórum da Equipe</div>
                            <div onClick={()=>setActiveRoom(isAdmin?'Caixa de Entrada':'Supervisão')} className={`p-3 md:p-4 rounded-2xl cursor-pointer font-bold flex items-center justify-between transition whitespace-nowrap md:whitespace-normal shrink-0 ${activeRoom!=='Geral'?'bg-gray-900 dark:bg-white text-white dark:text-gray-900 shadow-md':'hover:bg-gray-100 dark:hover:bg-slate-800 text-gray-700 dark:text-gray-300'}`}><div className="flex items-center gap-3"><div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-white/20 dark:bg-black/10 flex items-center justify-center"><i className="ph-fill ph-shield-star text-lg md:text-xl"></i></div> {isAdmin?'Caixa Inbox':'Falar c/ Supervisão'}</div></div>
                        </div>
                    </div>
                    <div className="md:w-2/3 flex flex-col bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-gray-50 dark:bg-slate-900 flex-1 relative">

                        </div>
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-4 md:space-y-6 flex flex-col custom-scrollbar">
                            {mensagensRoom.length === 0 && <div className="m-auto text-gray-400 font-bold bg-white dark:bg-slate-800 p-4 md:p-6 rounded-2xl shadow-sm text-center text-sm md:text-base">Nenhuma mensagem neste canal.</div>}
                            {mensagensRoom.map((m, i) => {
                                const isMe = safeString(m.Nome) === myName;
                                return (
                                    <div key={i} className={`flex flex-col gap-1 max-w-[85%] md:max-w-[70%] ${isMe ? 'self-end items-end' : 'self-start items-start'} animate-fade-in`}>
                                        <span className="text-[9px] md:text-[10px] font-black text-gray-400 uppercase tracking-widest mx-2">{safeString(m.Nome)}</span>
                                        <div className={`p-4 md:p-5 rounded-2xl shadow-md text-sm font-medium ${isMe ? 'bg-primary text-white rounded-tr-none' : 'bg-white dark:bg-slate-800 border border-gray-100 dark:border-slate-700 rounded-tl-none text-gray-800 dark:text-gray-200'}`}>{safeString(m.Mensagem)}</div>
                                    </div>
                                )
                            })}
                        </div>
                        <form onSubmit={handleSend} className="p-4 md:p-5 bg-white dark:bg-slate-800 border-t border-gray-100 dark:border-slate-700 flex gap-3 md:gap-4 shrink-0 z-10">
                            <input type="text" value={msg} onChange={e=>setMsg(e.target.value)} placeholder="Escreva a sua mensagem..." className="flex-1 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-full px-4 md:px-6 py-3 md:py-4 outline-none focus:ring-2 focus:ring-primary font-bold transition text-gray-800 dark:text-white text-sm md:text-base" />
                            <button type="submit" className="w-12 h-12 md:w-14 md:h-14 rounded-full bg-primary text-white flex items-center justify-center shadow-lg hover:scale-105 transition transform shrink-0"><i className="ph-fill ph-paper-plane-tilt text-lg md:text-xl"></i></button>
                        </form>
                    </div>
                </div>
            )
        };

        const DataTableGeneric = ({ title, tabName, data, user, onRefresh, showToast }) => {
            const safeData = Array.isArray(data) ? data : [];
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({});
            const [loading, setLoading] = useState(false);
            const [search, setSearch] = useState('');
            const [currentSchema, setCurrentSchema] = useState([]);
            
            let dynamicKeys = ['ID'];
            if (safeData.length > 0 && typeof safeData[0] === 'object' && safeData[0] !== null) dynamicKeys = Object.keys(safeData[0]);
            
            const schema = tabSchemas[tabName] || dynamicKeys || ['ID'];
            const nivelKey = user && typeof user === 'object' ? Object.keys(user).find(k => safeString(k).toLowerCase().includes('acesso')) : null;
            const canEdit = nivelKey && ['admin', 'supervisor', 'supervisão'].some(role => safeString(user[nivelKey]).toLowerCase().includes(role));

            const filteredData = safeData.filter(row => row && typeof row === 'object' && Object.values(row).some(val => safeString(val).toLowerCase().includes(search.toLowerCase())));

            const openModal = (row = null, customSchema = null) => {
                let initial = {}; const s = customSchema || schema;
                s.forEach(col => initial[col] = row ? safeString(row[col]) : '');
                setFormData(initial); setCurrentSchema(s); setIsModalOpen(true);
            };

            const handleSave = async (e) => {
                e.preventDefault(); setLoading(true);
                const res = await api.saveRecord(tabName, formData, !!formData.ID);
                setLoading(false);
                if (res && res.success) { setIsModalOpen(false); onRefresh(tabName); showToast('Salvo com sucesso!'); } else showToast('Erro ao salvar.', 'error');
            };

            const handleDelete = async (id) => {
                if(confirm('Excluir este item permanentemente?')) {
                    const res = await api.deleteRecord(tabName, id);
                    if (res && res.success) { onRefresh(tabName); showToast('Excluído com sucesso!'); }
                }
            };

            if(tabName === 'CONVÊNIOS') return <><ConveniosMatrixView data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} schema={schema} /> {isModalOpen && <ModalForm title="Regra de Convênio" schema={currentSchema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'CORPO CLINICO') return <><CorpoClinicoCards data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} openLancarEscala={()=>{}} /> {isModalOpen && <ModalForm title="Médico" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'CONTATOS') return <><ContatosViewTabs data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} schema={schema} /> {isModalOpen && <ModalForm title="Contato" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'MURAL_AVISOS') return <><MuralAvisosView data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} /> {isModalOpen && <ModalForm title="Aviso" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'BOLETINS_INFORMATIVOS') return <><BoletinsView data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} /> {isModalOpen && <ModalForm title="Mídia/Informativo" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'SENHAS E LOGINS GERAIS') return <><SenhasView data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} schema={schema} /> {isModalOpen && <ModalForm title="Acesso" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;

            return (
                <>
                    <DefaultTableView title={title} schema={schema} filteredData={filteredData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} search={search} setSearch={setSearch} />
                    {isModalOpen && <ModalForm title={title} schema={currentSchema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}
                </>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('Home');
            const [sheetData, setSheetData] = useState({});
            const [darkMode, setDarkMode] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            
            const [loginView, setLoginView] = useState('selecao'); 
            const [loginErrorMsg, setLoginErrorMsg] = useState('');
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [isSharedAuth, setIsSharedAuth] = useState(localStorage.getItem('shared_auth') === 'true');

            // ⚠️ SENHA DE ACESSO GERAL PARA COLABORADORES
            const SENHA_ACESSO_GERAL = "Csv@123"; 

            const userFoto = user?.Foto_Perfil_URL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            const userName = user?.['Nome Completo'] || (isSharedAuth ? 'Equipe São Vicente' : 'Usuário');

            const nivelKey = user && typeof user === 'object' ? Object.keys(user).find(k => safeString(k).toLowerCase().includes('acesso')) : null;
            const isAdmin = user && nivelKey && ['admin', 'supervisor', 'supervisão'].some(role => safeString(user[nivelKey]).toLowerCase().includes(role));

            useEffect(() => {
                const handleOnline = () => { setIsOffline(false); showToast('Conexão restabelecida!', 'success'); };
                const handleOffline = () => { setIsOffline(true); showToast('Rede perdida. Usando cache.', 'warning'); };
                window.addEventListener('online', handleOnline); window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); }
            }, []);

            useEffect(() => {
                const unsub = auth?.onAuthStateChanged(async (u) => {
                    if (u && !isSharedAuth) {
                        try {
                            const userDoc = await db.collection('USUARIOS').where('E-mail', '==', u.email).get();
                            if (!userDoc.empty) setUser({ ID: userDoc.docs[0].id, ...userDoc.docs[0].data() });
                            else setUser({ 'E-mail': u.email, 'Nome Completo': u.email.split('@')[0], 'Nível de Acesso': 'Colaborador' });
                        } catch (err) {
                            setUser({ 'E-mail': u.email, 'Nome Completo': u.email.split('@')[0], 'Nível de Acesso': 'Colaborador' });
                        }
                    } else {
                        if(isSharedAuth) setUser({ 'Nome Completo': 'Equipe São Vicente', 'Nível de Acesso': 'Colaborador' });
                        else setUser(null);
                    }
                    setLoading(false);
                });
                return () => unsub && unsub();
            }, [isSharedAuth]);
                    
            const showToast = (msg, type = 'success') => { setToast({ show: true, message: msg, type }); setTimeout(() => setToast(p => ({ ...p, show: false })), 3500); };

            useEffect(() => {
                if (darkMode) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } 
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            }, [darkMode]);

            useEffect(() => {
                const init = async () => {
                    if(!isFirebaseConfigured) return;
                    const allData = await api.fetchAll(); 
                    if(allData && Object.keys(allData).length > 0) setSheetData(allData);
                }; init();
            }, []);

            const loadData = async (tab) => {
                setLoading(true);
                if (tab === 'Home') {
                    const [news, atend, lembretes, mural] = await Promise.all([api.fetch('NOVIDADES_E_EVENTOS'), api.fetch('CONTROLE_ATENDIMENTOS'), api.fetch('LEMBRETES_HORA'), api.fetch('MURAL_AVISOS')]);
                    setSheetData(prev => ({ ...prev, 'NOVIDADES_E_EVENTOS': news, 'CONTROLE_ATENDIMENTOS': atend, 'LEMBRETES_HORA': lembretes, 'MURAL_AVISOS': mural }));
                } else if (tab === 'ESCALAS') {
                    const [escala, medicos, u, cont] = await Promise.all([api.fetch('ESCALAS'), api.fetch('CORPO CLINICO'), api.fetch('USUARIOS'), api.fetch('CONTROLE_ATENDIMENTOS')]);
                    setSheetData(prev => ({ ...prev, 'ESCALAS': escala, 'CORPO CLINICO': medicos, 'USUARIOS': u, 'CONTROLE_ATENDIMENTOS': cont }));
                } else {
                    const data = await api.fetch(tab); setSheetData(prev => ({ ...prev, [tab]: data }));
                }
                setLoading(false);
            };

            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            if (!user) {
                const handleFirebaseLogin = async (e) => {
                    e.preventDefault(); setLoading(true); setLoginErrorMsg('');
                    localStorage.removeItem('shared_auth'); setIsSharedAuth(false);
                    const res = await api.login(e.target.email.value, e.target.password.value);
                    if (res && res.success) { setUser(res.user); loadData('Home'); } 
                    else { setLoginErrorMsg(res?.message || 'Erro ao conectar.'); }
                    setLoading(false);
                };

                const handleSharedLogin = (e) => {
                    e.preventDefault(); setLoginErrorMsg('');
                    if (e.target.shared_password.value === SENHA_ACESSO_GERAL) {
                        auth?.signOut(); 
                        localStorage.setItem('shared_auth', 'true');
                        setIsSharedAuth(true);
                        setUser({ 'Nome Completo': 'Equipe São Vicente', 'Nível de Acesso': 'Colaborador' });
                        loadData('Home');
                    } else { setLoginErrorMsg('Senha incorreta.'); }
                };

                return (
                    <div className="min-h-screen bg-medical flex flex-col items-center justify-center p-4">
                        {isOffline && <div className="mb-6 bg-red-600 text-white px-6 py-2 rounded-full font-bold shadow-lg flex items-center gap-2 text-sm"><i className="ph-bold ph-wifi-slash"></i> Sem Internet. O login pode falhar.</div>}
                        <div className="bg-white rounded-[2rem] md:rounded-[3rem] shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col md:flex-row animate-fade-in border">
                            <div className="md:w-5/12 bg-gradient-to-br from-primary to-blue-800 text-white p-10 md:p-12 flex flex-col justify-center relative">
                                <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                                <div className="relative z-10 text-center">
                                    <div className="w-24 h-24 md:w-28 md:h-28 mx-auto bg-white/10 rounded-[2rem] flex items-center justify-center mb-6 backdrop-blur-sm shadow-xl"><i className="ph-fill ph-heartbeat text-6xl md:text-7xl"></i></div>
                                    <h1 className="text-3xl md:text-4xl font-black mb-4">São Vicente</h1>
                                    <p className="text-blue-100 font-medium text-xs md:text-sm">Portal interno de comunicação, escalas e processos da clínica.</p>
                                </div>
                            </div>
                            <div className="md:w-7/12 p-8 md:p-12 bg-white flex flex-col justify-center">
                                {loginErrorMsg && <div className="mb-6 bg-red-50 border border-red-200 p-4 rounded-xl flex gap-3 items-start animate-pop-in"><i className="ph-fill ph-warning-circle text-red-600 text-xl shrink-0 mt-0.5"></i><p className="text-sm font-bold text-red-800 leading-tight">{loginErrorMsg}</p></div>}
                                
                                {loginView === 'selecao' && (
                                    <div className="space-y-4 md:space-y-6 animate-fade-in">
                                        <h2 className="text-xl md:text-2xl font-black text-gray-800 mb-6 md:mb-8 text-center md:text-left">Selecione seu acesso:</h2>
                                        <button onClick={()=>setLoginView('geral')} className="w-full bg-blue-50 hover:bg-primary group p-5 md:p-6 rounded-[1.5rem] md:rounded-2xl border-2 border-blue-100 hover:border-primary transition flex items-center gap-4 md:gap-6 text-left">
                                            <div className="w-14 h-14 md:w-16 md:h-16 rounded-xl bg-white text-primary flex justify-center items-center shrink-0 shadow-sm"><i className="ph-fill ph-users text-2xl md:text-3xl"></i></div>
                                            <div><h3 className="font-black text-lg md:text-xl text-gray-900 group-hover:text-white transition">Acesso Colaboradores</h3><p className="text-xs md:text-sm text-gray-500 group-hover:text-blue-100 transition mt-1">Escalas, ramais, guias e consultas.</p></div>
                                        </button>
                                        <button onClick={()=>setLoginView('supervisor')} className="w-full bg-orange-50 hover:bg-secondary group p-5 md:p-6 rounded-[1.5rem] md:rounded-2xl border-2 border-orange-100 hover:border-secondary transition flex items-center gap-4 md:gap-6 text-left">
                                            <div className="w-14 h-14 md:w-16 md:h-16 rounded-xl bg-white text-secondary flex justify-center items-center shrink-0 shadow-sm"><i className="ph-fill ph-shield-star text-2xl md:text-3xl"></i></div>
                                            <div><h3 className="font-black text-lg md:text-xl text-gray-900 group-hover:text-white transition">Acesso Gestão</h3><p className="text-xs md:text-sm text-gray-500 group-hover:text-orange-100 transition mt-1">Edição de dados e controle da clínica.</p></div>
                                        </button>
                                        <div className="pt-6 text-center"><button onClick={()=>setLoginView('admin')} className="text-xs font-bold text-gray-400 hover:text-primary transition underline decoration-dashed underline-offset-4">Acesso Administrador Restrito</button></div>
                                    </div>
                                )}
                                
                                {loginView === 'geral' && (
                                    <form onSubmit={handleSharedLogin} className="space-y-6 animate-fade-in">
                                        <button type="button" onClick={()=>{setLoginView('selecao'); setLoginErrorMsg('');}} className="text-gray-400 hover:text-primary flex items-center gap-2 mb-4 md:mb-6 font-bold text-sm"><i className="ph-bold ph-arrow-left"></i> Voltar</button>
                                        <h2 className="text-xl md:text-2xl font-black text-gray-800 mb-1 md:mb-2">Acesso da Equipe</h2>
                                        <p className="text-xs md:text-sm text-gray-500 mb-6 md:mb-8">Digite a senha geral fornecida pela coordenação.</p>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Senha de Acesso Único</label><div className="relative"><i className="ph-fill ph-lock-key absolute left-5 top-4 text-gray-400 text-xl"></i><input name="shared_password" type="password" className="w-full pl-14 pr-5 py-4 bg-gray-50 border rounded-xl outline-none focus:border-primary font-bold text-gray-900 transition" placeholder="Sua senha..." required /></div></div>
                                        <button type="submit" disabled={loading} className="w-full bg-primary text-white font-black py-4 md:py-5 rounded-xl shadow-xl hover:-translate-y-1 transition transform">{loading?'Entrando...':'Entrar no Portal'}</button>
                                    </form>
                                )}

                                {(loginView === 'supervisor' || loginView === 'admin') && (
                                    <form onSubmit={handleFirebaseLogin} className="space-y-6 animate-fade-in">
                                        <button type="button" onClick={()=>{setLoginView('selecao'); setLoginErrorMsg('');}} className="text-gray-400 hover:text-primary flex items-center gap-2 mb-4 md:mb-6 font-bold text-sm"><i className="ph-bold ph-arrow-left"></i> Voltar</button>
                                        <h2 className="text-xl md:text-2xl font-black text-gray-800 mb-1 md:mb-2">Acesso {loginView === 'admin' ? 'Administrador' : 'Gestão'}</h2>
                                        <p className="text-xs md:text-sm text-gray-500 mb-6 md:mb-8">Faça login com suas credenciais do painel.</p>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">E-mail</label><div className="relative"><i className="ph-fill ph-user absolute left-5 top-4 text-gray-400 text-xl"></i><input name="email" type="email" className="w-full pl-14 pr-5 py-4 bg-gray-50 border rounded-xl outline-none focus:border-primary font-bold text-gray-900 transition" required /></div></div>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Senha</label><div className="relative"><i className="ph-fill ph-lock-key absolute left-5 top-4 text-gray-400 text-xl"></i><input name="password" type="password" className="w-full pl-14 pr-5 py-4 bg-gray-50 border rounded-xl outline-none focus:border-primary font-bold text-gray-900 transition" required /></div></div>
                                        <button type="submit" disabled={loading} className={`w-full ${loginView === 'admin' ? 'bg-gray-900' : 'bg-secondary'} text-white font-black py-4 md:py-5 rounded-xl shadow-xl hover:-translate-y-1 transition transform`}>{loading ? 'Conectando...' : 'Acessar'}</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            const menus = [
                { id: 'Home', icon: 'ph-house', label: 'Dashboard Inicial' },
                { id: 'MURAL_AVISOS', icon: 'ph-presentation-chart', label: 'Mural de Avisos' },
                { id: 'BOLETINS_INFORMATIVOS', icon: 'ph-newspaper', label: 'Boletins e Mídia' },
                { id: 'ESCALAS', icon: 'ph-calendar-check', label: 'Escalas e Plantões' },
                { id: 'CONVÊNIOS', icon: 'ph-file-text', label: 'Matriz de Convênios' },
                { id: 'CORPO CLINICO', icon: 'ph-stethoscope', label: 'Corpo Clínico' },
                { id: 'CONTATOS', icon: 'ph-address-book', label: 'Contatos Rápidos' },
                { id: 'CHAT_MENSAGENS', icon: 'ph-chat-circle-dots', label: 'Chat Interno' },
                { id: 'EXAMES DE IMAGEM', icon: 'ph-bone', label: 'Exames de Imagem' },
                { id: 'EXAMES DE IMAGEM E OUTROS', icon: 'ph-files', label: 'Exames e Laudos' },
                { id: 'CONSULTA E PROCEDIMENTOS', icon: 'ph-first-aid-kit', label: 'Consultas' },
                { id: 'EXAMES LABORATORIAIS', icon: 'ph-flask', label: 'Laboratório' },
                { id: 'INSTITUTOS', icon: 'ph-buildings', label: 'Institutos' },
                { id: 'REMOÇÕES', icon: 'ph-car', label: 'Remoções' },
                { id: 'SENHAS E LOGINS GERAIS', icon: 'ph-lock-key', label: 'Senhas de Sistemas' }
            ];
            const adminMenus = [ { id: 'CONTROLE_ATENDIMENTOS', icon: 'ph-chart-line-up', label: 'Metas Unimed' }, { id: 'USUARIOS', icon: 'ph-users', label: 'Colaboradores' }, { id: 'LEMBRETES_HORA', icon: 'ph-clock', label: 'Avisos do Relógio' } ];

            const foundMenu = menus.concat(adminMenus).find(m => m.id === activeTab);
            const titleTab = foundMenu ? foundMenu.label : activeTab;

            return (
                <div className={`min-h-screen flex flex-col md:flex-row overflow-hidden relative selection:bg-primary selection:text-white ${darkMode ? 'dark bg-slate-900 text-slate-100' : 'bg-medical'}`}>
                    
                    {isOffline && <div className="absolute top-0 inset-x-0 z-[99999] bg-red-600 text-white text-[10px] md:text-xs font-black py-2 md:py-1.5 flex justify-center items-center gap-2 shadow-md animate-fade-in"><i className="ph-bold ph-wifi-slash text-sm md:text-base"></i> Sem Conexão: Operando com dados salvos em cache.</div>}
                    {toast.show && <div className={`fixed bottom-4 md:bottom-8 right-4 md:right-8 z-[9999] px-6 md:px-8 py-4 md:py-5 rounded-xl md:rounded-custom shadow-2xl text-white font-black text-sm md:text-lg animate-slide-up bg-green-500`}><i className="ph-bold ph-check-circle text-xl md:text-2xl"></i> {toast.message}</div>}

                    <div className="md:hidden bg-primary text-white p-4 flex justify-between items-center z-40 shadow-lg relative">
                        <div className="flex items-center gap-3 font-black text-xl"><i className="ph-fill ph-heartbeat text-2xl"></i> Portal SV</div>
                        <div className="flex gap-2">
                            <button onClick={()=>setDarkMode(!darkMode)} className="text-2xl p-1 bg-white/10 rounded-lg"><i className={`ph-fill ${darkMode ? 'ph-sun' : 'ph-moon'}`}></i></button>
                            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-2xl p-1 bg-white/10 rounded-lg"><i className={`ph-bold ${isMobileMenuOpen ? 'ph-x' : 'ph-list'}`}></i></button>
                        </div>
                    </div>

                    {isMobileMenuOpen && <div className="fixed inset-0 bg-black/60 z-40 md:hidden backdrop-blur-sm" onClick={() => setIsMobileMenuOpen(false)}></div>}

                    <aside className={`fixed inset-y-0 left-0 w-72 md:w-80 bg-white dark:bg-slate-800 border-r border-gray-100 dark:border-slate-700 flex flex-col h-screen shrink-0 shadow-2xl z-50 transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 transition-transform duration-300 ease-in-out`}>
                        <div className="p-6 md:p-8 flex items-center justify-between border-b border-gray-100 dark:border-slate-700 bg-gray-50/50 dark:bg-slate-900/50 cursor-pointer" onClick={()=>{setActiveTab('Home'); setIsMobileMenuOpen(false);}}>
                            <div className="flex items-center">
                                <div className="bg-primary text-white p-2 md:p-3 rounded-xl md:rounded-2xl mr-3 shadow-md"><i className="ph-fill ph-heartbeat text-2xl md:text-3xl"></i></div>
                                <div><h1 className="text-xl md:text-2xl font-black leading-none text-gray-900 dark:text-white">Portal</h1><span className="text-[10px] font-black text-primary uppercase tracking-widest">São Vicente</span></div>
                            </div>
                            <button onClick={(e)=>{e.stopPropagation(); setDarkMode(!darkMode)}} className="hidden md:flex text-gray-400 hover:text-primary text-2xl bg-gray-100 dark:bg-slate-700 p-2 rounded-xl transition"><i className={`ph-fill ${darkMode ? 'ph-sun' : 'ph-moon'}`}></i></button>
                        </div>
                        <div className="p-5 md:p-6 border-b border-gray-50 dark:border-slate-700 flex items-center gap-4">
                            {userFoto ? <img src={formatImageUrl(userFoto)} className="w-12 h-12 md:w-14 md:h-14 rounded-xl md:rounded-custom object-cover shadow-md shrink-0 border-2 border-white dark:border-slate-700" alt="Avatar" /> : <div className="w-12 h-12 md:w-14 md:h-14 rounded-xl md:rounded-custom bg-gradient-to-tr from-secondary to-orange-400 flex items-center justify-center text-white font-black text-xl md:text-2xl shadow-md shrink-0">{safeString(userName || 'U').charAt(0).toUpperCase()}</div>}
                            <div className="flex-1 overflow-hidden">
                                <p className="text-sm md:text-base font-black truncate text-gray-900 dark:text-white">{userName}</p>
                                <p className="text-[9px] md:text-[10px] font-black text-primary bg-primary/10 px-2 py-1 rounded-md inline-block mt-1 uppercase tracking-widest">{isAdmin?'Gestão/Admin':'Equipe'}</p>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-3 md:p-4 space-y-1 custom-scrollbar pb-8 mt-4 md:mt-0">
                            <div className="px-3 md:px-4 mb-2 mt-2 text-[9px] md:text-[10px] font-black text-gray-400 uppercase tracking-widest">Menu Principal</div>
                            {menus.map(m => <button key={m.id} onClick={()=>{setActiveTab(m.id); loadData(m.id); setIsMobileMenuOpen(false);}} className={`w-full flex items-center gap-3 md:gap-4 px-4 md:px-5 py-3 rounded-xl md:rounded-custom text-xs md:text-sm font-bold transition-all ${activeTab===m.id?'bg-primary text-white shadow-xl md:scale-[1.02]':'text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700'}`}><i className={`ph-fill ${m.icon} text-lg md:text-xl`}></i> {m.label}</button>)}
                            
                            {isAdmin && (
                                <>
                                    <div className="px-3 md:px-4 mt-6 mb-2 text-[9px] md:text-[10px] font-black text-gray-400 uppercase tracking-widest">Gestão Avançada</div>
                                    {adminMenus.map(m => <button key={m.id} onClick={()=>{setActiveTab(m.id); loadData(m.id); setIsMobileMenuOpen(false);}} className={`w-full flex items-center gap-3 md:gap-4 px-4 md:px-5 py-3 rounded-xl md:rounded-custom text-xs md:text-sm font-bold transition-all ${activeTab===m.id?'bg-gray-900 dark:bg-white text-white dark:text-gray-900 shadow-xl md:scale-[1.02]':'text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700'}`}><i className={`ph-fill ${m.icon} text-lg md:text-xl`}></i> {m.label}</button>)}
                                </>
                            )}
                            <button onClick={()=>{auth?.signOut(); localStorage.removeItem('shared_auth'); setIsSharedAuth(false); setUser(null);}} className="w-full flex items-center gap-3 md:gap-4 px-4 md:px-5 py-3 rounded-xl md:rounded-custom text-xs md:text-sm font-bold text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 mt-8 transition"><i className="ph-fill ph-sign-out text-lg md:text-xl"></i> Sair do Sistema</button>
                        </div>
                    </aside>

                    <main className="flex-1 h-[calc(100vh-76px)] md:h-screen overflow-y-auto relative custom-scrollbar p-4 md:p-10 pt-6 md:pt-10">
                        <ErrorBoundary>
                            {loading && <div className="fixed inset-0 bg-white/70 dark:bg-slate-900/70 backdrop-blur z-40 flex items-center justify-center"><div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin shadow-lg"></div></div>}

                            {activeTab === 'Home' && !loading && (
                                <div className="space-y-8 md:space-y-12 animate-fade-in max-w-[1400px] mx-auto">
                                    <ClockWidget lembretesData={sheetData['LEMBRETES_HORA']} />
                                    
                                    {Array.isArray(sheetData['CONTROLE_ATENDIMENTOS']) && sheetData['CONTROLE_ATENDIMENTOS'].filter(a => Number(a.Limite_Max||0) > 0 && (Number(a.Qtd_Atual||0)/Number(a.Limite_Max||1)) >= 0.9).length > 0 && (
                                        <div>
                                            <h3 className="text-xl md:text-2xl font-black text-red-600 flex items-center gap-3 mb-4 md:mb-6 px-2"><i className="ph-fill ph-warning-circle animate-pulse"></i> Alertas Unimed</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                {sheetData['CONTROLE_ATENDIMENTOS'].filter(a => Number(a.Limite_Max||0) > 0 && (Number(a.Qtd_Atual||0)/Number(a.Limite_Max||1)) >= 0.9).map((a, i) => {
                                                    const qtd = Number(a.Qtd_Atual || 0); const max = Number(a.Limite_Max || 1);
                                                    const perc = (qtd / max) * 100; const isCritico = perc >= 100;
                                                    return (
                                                        <div key={i} className={`p-6 md:p-8 rounded-[2rem] md:rounded-[2.5rem] shadow-xl border-4 ${isCritico ? 'bg-red-600 border-red-800 text-white' : 'bg-orange-50 border-orange-200 text-orange-900'}`}>
                                                            <div className="flex justify-between items-center mb-4 md:mb-6"><span className="font-black text-xl md:text-2xl">{safeString(a.Profissional)}</span></div>
                                                            <div className="w-full bg-black/10 rounded-full h-3 md:h-4 mb-4"><div className={`h-3 md:h-4 rounded-full ${isCritico ? 'bg-white' : 'bg-orange-500'}`} style={{width: `${Math.min(perc, 100)}%`}}></div></div>
                                                            <p className="text-4xl md:text-5xl font-black leading-none">{qtd} <span className="text-lg md:text-xl opacity-60">/ {max}</span></p>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                    )}

                                    <div>
                                        <h3 className="text-xl md:text-3xl font-black mb-6 md:mb-8 text-gray-900 dark:text-white px-2">Acesso Rápido</h3>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4 md:gap-6">
                                            {[ { l: 'Mural', i: 'ph-presentation-chart', bg:'bg-blue-50 dark:bg-blue-900/30', c:'text-blue-600 dark:text-blue-400', t: 'MURAL_AVISOS' }, { l: 'Painel', i: 'ph-kanban', bg:'bg-orange-50 dark:bg-orange-900/30', c:'text-orange-600 dark:text-orange-400', t: 'ESCALAS' }, { l: 'Boletins', i: 'ph-newspaper', bg:'bg-purple-50 dark:bg-purple-900/30', c:'text-purple-600 dark:text-purple-400', t: 'BOLETINS_INFORMATIVOS' }, { l: 'Consultas', i: 'ph-stethoscope', bg:'bg-blue-50 dark:bg-blue-900/30', c:'text-blue-600 dark:text-blue-400', t: 'CONSULTA E PROCEDIMENTOS' }, { l: 'Imagem', i: 'ph-bone', bg:'bg-green-50 dark:bg-green-900/30', c:'text-green-600 dark:text-green-400', t: 'EXAMES DE IMAGEM' }, { l: 'Senhas', i: 'ph-lock-key', bg:'bg-red-50 dark:bg-red-900/30', c:'text-red-600 dark:text-red-400', t: 'SENHAS E LOGINS GERAIS' } ].map((d, i) => (
                                                <button key={i} onClick={()=>{setActiveTab(d.t);loadData(d.t)}} className={`${d.bg} ${d.c} p-4 md:p-6 rounded-[1.5rem] md:rounded-[2rem] flex flex-col items-center justify-center gap-3 md:gap-4 card-hover shadow-sm border border-transparent dark:border-slate-700`}>
                                                    <i className={`ph-fill ${d.i} text-3xl md:text-4xl`}></i><span className="font-black text-[10px] md:text-xs text-center uppercase tracking-widest">{d.l}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'EXAMES DE IMAGEM' && !loading && <GenericCardView data={sheetData['EXAMES DE IMAGEM']} canEdit={canEdit} openModal={(row, s)=>setSheetData(p=>({...p, __modal: {tab: activeTab, row: row, sch: s}}))} handleDelete={(id)=>api.deleteRecord(activeTab, id)} schema={tabSchemas[activeTab]} titleField="Nome do Exame" descField="Observações" extraField="Categoria" title="Exame de Imagem" />}
                            {activeTab === 'EXAMES DE IMAGEM E OUTROS' && !loading && <GenericCardView data={sheetData['EXAMES DE IMAGEM E OUTROS']} canEdit={canEdit} openModal={(row, s)=>setSheetData(p=>({...p, __modal: {tab: activeTab, row: row, sch: s}}))} handleDelete={(id)=>api.deleteRecord(activeTab, id)} schema={tabSchemas[activeTab]} titleField="Descrição" descField="Onde Encontrar" extraField="Prazo de Laudo" title="Exame/Laudo" />}
                            {activeTab === 'CONSULTA E PROCEDIMENTOS' && !loading && <GenericCardView data={sheetData['CONSULTA E PROCEDIMENTOS']} canEdit={canEdit} openModal={(row, s)=>setSheetData(p=>({...p, __modal: {tab: activeTab, row: row, sch: s}}))} handleDelete={(id)=>api.deleteRecord(activeTab, id)} schema={tabSchemas[activeTab]} titleField="Consulta/Procedimento" descField="Descrição" extraField="Valor Particular" title="Consulta/Proc." />}
                            {activeTab === 'EXAMES LABORATORIAIS' && !loading && <GenericCardView data={sheetData['EXAMES LABORATORIAIS']} canEdit={canEdit} openModal={(row, s)=>setSheetData(p=>({...p, __modal: {tab: activeTab, row: row, sch: s}}))} handleDelete={(id)=>api.deleteRecord(activeTab, id)} schema={tabSchemas[activeTab]} titleField="Procedimento" descField="Preparo" extraField="Prazo de Liberação" title="Lab." />}
                            {activeTab === 'REMOÇÕES' && !loading && <GenericCardView data={sheetData['REMOÇÕES']} canEdit={canEdit} openModal={(row, s)=>setSheetData(p=>({...p, __modal: {tab: activeTab, row: row, sch: s}}))} handleDelete={(id)=>api.deleteRecord(activeTab, id)} schema={tabSchemas[activeTab]} titleField="Nome do Hospital/Clínica" descField="Informações Importantes" extraField="Contato" title="Remoção" />}
                            {activeTab === 'INSTITUTOS' && !loading && <InstitutosView data={sheetData['INSTITUTOS']} canEdit={canEdit} openModal={(row, s)=>setSheetData(p=>({...p, __modal: {tab: activeTab, row: row, sch: s}}))} handleDelete={(id)=>api.deleteRecord(activeTab, id)} schema={tabSchemas[activeTab]} />}
                            {activeTab === 'CHAT_MENSAGENS' && !loading && <ChatModerno chatData={sheetData['CHAT_MENSAGENS']} user={user} onSaveChat={api.saveRecord} onRefresh={()=>loadData('CHAT_MENSAGENS')} />}
                            {activeTab === 'ESCALAS' && !loading && <EscalasContainer sheetData={sheetData} user={user} onRefresh={()=>loadData('ESCALAS')} showToast={showToast} />}

                            {['CONVÊNIOS', 'CORPO CLINICO', 'CONTATOS', 'MURAL_AVISOS', 'BOLETINS_INFORMATIVOS', 'SENHAS E LOGINS GERAIS', 'CONTROLE_ATENDIMENTOS', 'USUARIOS', 'LEMBRETES_HORA'].includes(activeTab) && !loading && (
                                <DataTableGeneric title={titleTab} tabName={activeTab} data={sheetData[activeTab] || []} user={user} onRefresh={()=>loadData(activeTab)} showToast={showToast} />
                            )}

                            {sheetData.__modal && (
                                <ModalForm title={sheetData.__modal.tab} schema={sheetData.__modal.sch || tabSchemas[sheetData.__modal.tab]} formData={sheetData.__modal.row || {}} setFormData={(nd)=>setSheetData(p=>({...p, __modal: {...p.__modal, row: nd}}))} onSave={async (e)=>{e.preventDefault(); setLoading(true); await api.saveRecord(sheetData.__modal.tab, sheetData.__modal.row, !!sheetData.__modal.row.ID); setSheetData(p=>({...p, __modal: null})); loadData(sheetData.__modal.tab); showToast('Salvo!');}} onClose={()=>setSheetData(p=>({...p, __modal: null}))} loading={loading} />
                            )}
                        </ErrorBoundary>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
