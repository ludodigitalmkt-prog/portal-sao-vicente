<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="theme-color" content="#1E40AF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

        const VERSAO_ATUAL = "7.1.0"; // Integração Dinâmica da Logo
        if (window.location.search.indexOf('v=' + VERSAO_ATUAL) === -1) {
            localStorage.clear(); sessionStorage.clear();
            window.location.replace(window.location.pathname + (window.location.pathname.indexOf('?') === -1 ? '?' : '&') + 'v=' + VERSAO_ATUAL);
        }
    </script>

    <title>Portal São Vicente</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    colors: { primary: 'var(--color-primary, #1E40AF)', secondary: 'var(--color-secondary, #F97316)', medical: 'var(--color-medical, #E0F2FE)' },
                    fontFamily: { sans: ['var(--font-family, Inter)', 'sans-serif'] },
                    borderRadius: { 'custom': 'var(--border-radius, 1.5rem)' },
                    animation: { 
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite', 
                        'fade-in': 'fadeIn 0.3s ease-out', 
                        'pop-in': 'popIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                        'bounce-slight': 'bounceSlight 2s infinite ease-in-out'
                    },
                    keyframes: { 
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        popIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(100%)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        bounceSlight: { '0%, 100%': { transform: 'translateY(-10%)' }, '50%': { transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root { --color-primary: #1E40AF; --color-secondary: #F97316; --color-medical: #E0F2FE; --color-bg: #F8FAFC; --font-family: 'Inter'; --border-radius: 1.5rem; --card-transition: all 0.3s ease; }
        body { font-family: var(--font-family), sans-serif; overflow-x: hidden; transition: background-color 0.3s ease, color 0.3s ease; background-color: var(--color-bg); -webkit-tap-highlight-color: transparent; }
        body.dark { background-color: #0f172a; } 
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .card-hover { transition: var(--card-transition); border-radius: var(--border-radius); }
        .card-hover:hover { transform: translateY(-5px) scale(1.02); z-index: 10; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .glass-modal { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); }
        .dark .glass-modal { background: rgba(15, 23, 42, 0.85); }
        .rounded-custom { border-radius: var(--border-radius) !important; }
        .custom-scrollbar { overflow-y: auto; }

        .matrix-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .matrix-table th { padding: 1rem; color: white; font-weight: 800; text-transform: uppercase; font-size: 0.85rem; text-align: center; border: none; }
        .matrix-table th:first-child { border-radius: 1rem 0 0 1rem; background-color: #1e293b; text-align: left; position: sticky; left: 0; z-index: 30; }
        .matrix-table th:last-child { border-radius: 0 1rem 1rem 0; }
        .matrix-row { background-color: #ffffff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: transform 0.2s, box-shadow 0.2s; position: relative; }
        .matrix-row:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgba(0,0,0,0.1); z-index: 20; }
        .dark .matrix-row { background-color: #1e293b; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        .matrix-row td { padding: 1rem; text-align: center; vertical-align: middle; border: none; }
        .matrix-row td:first-child { background-color: #1e293b; color: white; font-weight: bold; border-radius: 1rem 0 0 1rem; text-align: left; position: sticky; left: 0; z-index: 20; border-left: 6px solid var(--color-primary); }
        .matrix-row td:last-child { border-radius: 0 1rem 1rem 0; }
    </style>
</head>
<body class="text-gray-800 dark:text-slate-100">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useRef, Component } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyArUJk5o90YfmMqRZl2kBaFfvRXFZcW3cE",
            authDomain: "portal-sao-vicente.firebaseapp.com",
            projectId: "portal-sao-vicente",
            storageBucket: "portal-sao-vicente.firebasestorage.app",
            messagingSenderId: "52988900084",
            appId: "1:52988900084:web:9f5f2d494c22b10eb2a4a1"
        };

        const isFirebaseConfigured = firebaseConfig.apiKey !== "" && !firebaseConfig.apiKey.includes("AIzaSySuaChave");
        let db = null; let auth = null;

        if (isFirebaseConfigured) {
            try {
                if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
                db = firebase.firestore();
                db.enablePersistence({ synchronizeTabs: true }).catch(function(err) { console.log("Aviso: Cache Offline -", err.code); });
                auth = firebase.auth();
            } catch (error) { console.error("Erro Firebase:", error); }
        }

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, erroInfo: "" }; }
            static getDerivedStateFromError(error) { return { hasError: true, erroInfo: String(error) }; }
            render() {
                if (this.state.hasError) return (
                    <div className="p-10 text-center flex flex-col items-center justify-center min-h-screen bg-gray-50">
                        <i className="ph-fill ph-warning-circle text-6xl text-red-500 mb-4"></i>
                        <h2 className="text-3xl font-black text-gray-800 mb-2">Aviso do Sistema</h2>
                        <p className="text-gray-500 mb-6 max-w-md">Ocorreu um erro interno ao desenhar a tela. Fique tranquilo, seus dados estão salvos.</p>
                        <button onClick={()=>window.location.reload()} className="bg-primary text-white px-10 py-4 rounded-xl font-black shadow-lg">Recarregar Painel</button>
                    </div>
                );
                return this.props.children; 
            }
        }

        const safeString = (val) => (val === null || val === undefined) ? '' : String(val);

        const formatDateForInput = (val) => {
            const s = safeString(val).trim();
            if (s.includes('/')) {
                const parts = s.split('/');
                if (parts.length === 3 && parts[2].length === 4) return `${parts[2]}-${parts[1]}-${parts[0]}`;
            }
            return s;
        };

        const formatImageUrl = (url) => {
            const str = safeString(url).trim(); if (!str) return '';
            if (str.includes('drive.google.com')) {
                const match = str.match(/\/d\/([a-zA-Z0-9_-]+)/) || str.match(/id=([a-zA-Z0-9_-]+)/) || str.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) return `https://drive.google.com/uc?export=view&id=${match[1]}`;
            }
            return str;
        };

        const getEmbedUrl = (url) => {
            const str = safeString(url).trim();
            if (str.includes('youtube.com/watch')) return str.replace('watch?v=', 'embed/');
            if (str.includes('youtu.be/')) return str.replace('youtu.be/', 'youtube.com/embed/');
            if (str.includes('drive.google.com')) {
                const match = str.match(/\/d\/([a-zA-Z0-9_-]+)/) || str.match(/id=([a-zA-Z0-9_-]+)/) || str.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) return `https://drive.google.com/file/d/${match[1]}/preview`;
            }
            return str;
        };

        const isPastEnd = (horaFimStr) => {
            const str = safeString(horaFimStr); if(!str) return false;
            const match = str.match(/(\d{2}):(\d{2})/g);
            if (match && match.length > 0) {
                const endTime = match[match.length - 1]; 
                const [hours, mins] = endTime.split(':').map(Number);
                const now = new Date();
                if (now.getHours() > hours || (now.getHours() === hours && now.getMinutes() >= mins)) return true;
            }
            return false;
        };

        const tabSchemas = {
            'CONVÊNIOS': ['ID', 'Procedimento', 'Unimed', 'Amil', 'Bradesco', 'SulAmérica', 'Particular'],
            'CORPO CLINICO': ['ID', 'Médico', 'Especialidade', 'Segmento', 'Código UNIMED', 'CRM', 'Hora Início', 'Hora Fim', 'Cor_Selo', 'Foto_URL'],
            'EXAMES DE IMAGEM': ['ID', 'Categoria', 'Código', 'Nome do Exame', 'Profissionais', 'Idade Permitida', 'Observações', 'Imagem_URL'],
            'EXAMES DE IMAGEM E OUTROS': ['ID', 'Código', 'Descrição', 'Valor', 'Prazo de Laudo', 'Onde Encontrar', 'Imagem_URL'],
            'CONSULTA E PROCEDIMENTOS': ['ID', 'Código', 'Consulta/Procedimento', 'Descrição', 'Preparo', 'Material Utilizado', 'Valor Particular', 'Imagem_URL'],
            'EXAMES LABORATORIAIS': ['ID', 'Código', 'Procedimento', 'Valor', 'Prazo de Liberação', 'Preparo', 'Motivo_Indicacao'],
            'CONTATOS': ['ID', 'Tipo', 'Local_Setor', 'Nome_Contato', 'Valor_Contato', 'Anotacoes'], 
            'SENHAS E LOGINS GERAIS': ['ID', 'Nome do Sistema', 'Link do Sistema', 'Login', 'Senha', 'Observações'],
            'REMOÇÕES': ['ID', 'Nome do Hospital/Clínica', 'Contato', 'Local', 'Informações Importantes', 'Convênios Atendidos', 'Imagem_URL'],
            'INSTITUTOS': ['ID', 'Tabela_Instituto', 'Profissional', 'Especialidade', 'CRM_URA', 'Valores'],
            'NOVIDADES_E_EVENTOS': ['ID', 'Tipo', 'Título', 'Mensagem', 'Data de Publicação', 'Imagem_URL'],
            'BOLETINS_INFORMATIVOS': ['ID', 'Título', 'Descrição', 'Tipo_Midia', 'Link_Arquivo', 'Data_Publicacao'],
            'CONTROLE_ATENDIMENTOS': ['ID', 'Profissional', 'Convênio', 'Qtd_Atual', 'Limite_Max'],
            'USUARIOS': ['ID', 'Nome Completo', 'E-mail', 'Nível de Acesso', 'Data de Nascimento', 'Foto_Perfil_URL', 'Status', 'Competências', 'Hora Início', 'Hora Fim', 'Horários Flexíveis', 'Formato Contratação'],
            'ESCALAS': ['ID', 'Tipo_Profissional', 'Nome_Profissional', 'Data', 'Turno', 'Horario', 'Unidade', 'Setor_Consultorio', 'Status_Turno', 'Substituindo'],
            'CHAT_MENSAGENS': ['ID', 'Data_Hora', 'Nome', 'Mensagem', 'Destinatario'],
            'LEMBRETES_HORA': ['ID', 'Hora', 'Mensagem'],
            'CONFIGURACOES': ['ID', 'Chave', 'Valor'],
            'MURAL_AVISOS': ['ID', 'Layout', 'Título', 'Subtítulo', 'Imagem_URL', 'Link', 'Ativo']
        };

        const api = {
            fetch: async (colName) => {
                if(!db) return [];
                try { const snap = await db.collection(colName).get(); return snap.docs.map(doc => ({ ID: doc.id, ...doc.data() })); } catch (e) { return []; }
            },
            fetchAll: async () => {
                if(!db) return {}; let allData = {};
                for (let c of Object.keys(tabSchemas)) { try { const snap = await db.collection(c).get(); allData[c] = snap.docs.map(doc => ({ ID: doc.id, ...doc.data() })); } catch(e) {} }
                return allData;
            },
            login: async (rawEmail, password) => {
                if(!isFirebaseConfigured || !auth) return { success: false, message: 'As chaves não estão configuradas.' };
                try {
                    const email = rawEmail.trim(); await auth.signInWithEmailAndPassword(email, password);
                    const userDoc = await db.collection('USUARIOS').where('E-mail', '==', email).get();
                    let userData = { 'E-mail': email, 'Nome Completo': email.split('@')[0], 'Nível de Acesso': 'Admin' };
                    if (!userDoc.empty) {
                        userData = { ID: userDoc.docs[0].id, ...userDoc.docs[0].data() };
                        if (userData.Status && String(userData.Status).toLowerCase() === 'inativo') { await auth.signOut(); return { success: false, message: 'Conta inativa.' }; }
                    }
                    return { success: true, user: userData };
                } catch (error) { return { success: false, message: "E-mail ou senha incorretos." }; }
            },
            saveRecord: async (colName, data, isEdit) => {
                if(!db) return { success: false };
                try {
                    let docData = { ...data };
                    Object.keys(docData).forEach(k => { if(typeof docData[k] === 'string') docData[k] = docData[k].trim(); });
                    let id = docData.ID; delete docData.ID;
                    Object.keys(docData).forEach(key => docData[key] === undefined && delete docData[key]);
                    if (isEdit && id) await db.collection(colName).doc(id).update(docData); else await db.collection(colName).add(docData);
                    return { success: true };
                } catch (e) { return { success: false }; }
            },
            deleteRecord: async (colName, id) => {
                if(!db) return { success: false };
                try { await db.collection(colName).doc(id).delete(); return { success: true }; } catch (e) { return { success: false }; }
            }
        };

        const ClockWidget = ({ lembretesData }) => {
            const [time, setTime] = useState(new Date());
            useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);
            const hour = time.getHours();
            let periodStr = 'Bom dia'; let icon = 'ph-sun'; let bgClass = 'bg-blue-50 border-blue-200 text-blue-800 dark:bg-blue-900/30 dark:border-blue-800 dark:text-blue-200';
            if (hour >= 12 && hour < 18) { periodStr = 'Boa tarde'; icon = 'ph-cloud-sun'; bgClass = 'bg-orange-50 border-orange-200 text-orange-800 dark:bg-orange-900/30 dark:border-orange-800 dark:text-orange-200'; }
            else if (hour >= 18 || hour < 6) { periodStr = 'Boa noite'; icon = 'ph-moon-stars'; bgClass = 'bg-indigo-900 border-indigo-700 text-indigo-100 dark:bg-slate-800 dark:border-slate-700 dark:text-indigo-200'; }
            const lembretes = Array.isArray(lembretesData) ? lembretesData : [];
            const lembreteAtual = lembretes.find(l => l && typeof l === 'object' && parseInt(safeString(l.Hora) || -1) === hour);
            const msg = lembreteAtual ? safeString(lembreteAtual.Mensagem) : 'Tenha um excelente turno de trabalho!';

            return (
                <div className={`p-6 rounded-custom border-2 shadow-sm flex items-center justify-between transition-colors duration-1000 ${bgClass}`}>
                    <div className="flex items-center gap-5">
                        <div className="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur flex items-center justify-center shadow-inner"><i className={`ph-fill ${icon} text-4xl animate-spin-slow`}></i></div>
                        <div><h2 className="text-3xl md:text-4xl font-black tracking-tighter">{time.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit', second:'2-digit'})}</h2><p className="text-xs md:text-sm font-bold uppercase tracking-widest opacity-80 mt-1">{periodStr}</p></div>
                    </div>
                    <div className="hidden md:flex flex-col items-end max-w-xs text-right border-l-2 border-white/20 pl-6">
                        <span className="text-[10px] font-black uppercase tracking-widest opacity-60 mb-1 flex items-center gap-1"><i className="ph-fill ph-bell-ringing animate-pulse"></i> Lembrete da Hora</span>
                        <p className="text-base font-bold leading-tight">{msg}</p>
                    </div>
                </div>
            )
        };

        const ModalForm = ({ title, schema, formData, setFormData, onSave, onClose, loading }) => {
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 glass-modal animate-fade-in overflow-y-auto" onMouseDown={onClose}>
                    <div className="bg-white dark:bg-slate-800 rounded-custom w-full max-w-3xl max-h-[90vh] flex flex-col shadow-2xl animate-pop-in overflow-hidden border border-gray-100 dark:border-slate-700 m-auto mt-4 mb-4" onMouseDown={e => e.stopPropagation()}>
                        <div className="p-6 bg-gray-50 dark:bg-slate-900 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center shrink-0">
                            <h3 className="text-xl md:text-2xl font-black flex items-center gap-3 text-gray-900 dark:text-white"><div className="w-10 h-10 rounded-full bg-primary/10 text-primary flex items-center justify-center"><i className={`ph-bold ${formData?.ID ? 'ph-pencil-simple' : 'ph-plus'}`}></i></div> {formData?.ID ? 'Editar' : 'Novo'} {title}</h3>
                            <button type="button" onClick={onClose} className="w-10 h-10 rounded-full bg-gray-200 dark:bg-slate-700 hover:bg-red-500 hover:text-white transition flex items-center justify-center"><i className="ph-bold ph-x text-lg"></i></button>
                        </div>
                        <div className="p-6 md:p-8 overflow-y-auto flex-1 custom-scrollbar">
                            <form id="gen-form" onSubmit={onSave} className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {(schema || []).filter(col => safeString(col) !== 'ID').map((col, idx) => {
                                    const colName = safeString(col); const cLower = colName.toLowerCase();
                                    const isLong = cLower.includes('descrição') || cLower.includes('anotações') || cLower.includes('mensagem') || cLower.includes('preparo') || cLower.includes('url') || cLower.includes('site') || cLower.includes('motivo') || cLower.includes('competências');
                                    
                                    return (
                                        <div key={idx} className={isLong ? 'md:col-span-2' : ''}>
                                            <label className="block text-[10px] md:text-xs font-black text-gray-400 dark:text-slate-400 mb-2 uppercase tracking-widest">{colName}</label>
                                            
                                            {colName === 'Layout' && title.includes('Aviso') ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="Padrão">Padrão</option><option value="Imagem Grande">Imagem Grande (Banner)</option><option value="Só Texto">Só Texto</option>
                                                </select>
                                            ) : colName === 'Tipo_Midia' ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={e => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="Documento PDF">Documento (Drive PDF)</option><option value="Vídeo">Vídeo (YouTube/Drive)</option>
                                                </select>
                                            ) : colName === 'Tipo' && title.includes('Contato') ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="Ramal">Ramal Interno</option><option value="Email">E-mail</option><option value="Telefone">Telefone Externo</option>
                                                </select>
                                            ) : colName.includes('?') || colName === 'Status' || colName === 'Ativo' ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="">Selecione...</option><option value="Sim">Sim</option><option value="Não">Não</option><option value="Ativo">Ativo</option><option value="Inativo">Inativo</option>
                                                </select>
                                            ) : colName === 'Nível de Acesso' ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="">Selecione...</option><option value="Colaborador">Colaborador</option><option value="Supervisor">Supervisor</option><option value="Admin">Admin</option>
                                                </select>
                                            ) : colName.includes('Cor') ? (
                                                <div className="flex items-center gap-3 bg-gray-50 dark:bg-slate-900 p-3 rounded-xl border border-gray-200 dark:border-slate-700">
                                                    <input type="color" className="w-10 h-10 rounded-xl cursor-pointer border-0 bg-transparent" value={safeString(formData[colName]) || '#1E40AF'} onChange={(e) => setFormData({...formData, [colName]: e.target.value})} />
                                                    <span className="font-mono text-sm font-bold text-gray-500">{safeString(formData[colName]) || 'Cor Padrão'}</span>
                                                </div>
                                            ) : isLong && !cLower.includes('url') && !cLower.includes('site') && !cLower.includes('link') ? (

            const mensagensRoom = chatLog.filter(m => {
                if(!m) return false;
                if(isGeral) return safeString(m.Destinatario) === 'Geral';
                return (safeString(m.Nome) === myName && safeString(m.Destinatario) === activeRoom) || (safeString(m.Nome) === activeRoom && safeString(m.Destinatario) === myName);

        const MapaSalasView = ({ escalas }) => {
            const safeEscalas = Array.isArray(escalas) ? escalas : [];
            const todayStr = new Date().toLocaleDateString('pt-BR');
            const todayEscalas = safeEscalas.filter(e => {
                if(!e || typeof e !== 'object') return false;
                const escDate = safeString(e.Data); const escTipo = safeString(e.Tipo_Profissional).toLowerCase(); const escStatus = safeString(e.Status_Turno).toLowerCase();
                return (escDate.includes(todayStr) || escDate.includes(todayStr.substring(0,5))) && escTipo.includes('médico') && escStatus.includes('trabalhando');
            });
            const board = {};
            todayEscalas.forEach(e => {
                if(!e) return;
                const u = safeString(e.Unidade) || 'Geral'; const s = safeString(e.Setor_Consultorio) || 'Sem Sala';
                if(!board[u]) board[u] = {}; if(!board[u][s]) board[u][s] = []; board[u][s].push(e);

            return (

        const EscalasContainer = ({ sheetData, user, onRefresh, showToast }) => {
            const [activeSubTab, setActiveSubTab] = useState('Painel Hoje');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({});
            const [loadingAction, setLoadingAction] = useState(false);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(null); 
            const [selectedPerson, setSelectedPerson] = useState(null); 
            const [datesToSave, setDatesToSave] = useState([]); 
            const [showSwapSugg, setShowSwapSugg] = useState(false);

            // Permissões
            const nivelKey = user && typeof user === 'object' ? Object.keys(user).find(k => safeString(k).toLowerCase().includes('acesso')) : null;
            const canEdit = nivelKey && ['admin', 'supervisor'].some(role => safeString(user[nivelKey]).toLowerCase().includes(role));
            const isColab = user && typeof user === 'object' && safeString(user[nivelKey]).toLowerCase().includes('colaborador');

            const escalas = Array.isArray(sheetData['ESCALAS']) ? sheetData['ESCALAS'] : [];
            const corpoClinico = Array.isArray(sheetData['CORPO CLINICO']) ? sheetData['CORPO CLINICO'] : [];
            const usuarios = Array.isArray(sheetData['USUARIOS']) ? sheetData['USUARIOS'] : [];
            const controleUnimed = Array.isArray(sheetData['CONTROLE_ATENDIMENTOS']) ? sheetData['CONTROLE_ATENDIMENTOS'] : [];
            
            const todayStr = new Date().toLocaleDateString('pt-BR');
            const todayEscalas = escalas.filter(e => e && (safeString(e.Data).includes(todayStr) || safeString(e.Data).includes(todayStr.substring(0,5))));

            const filteredEscalas = escalas.filter(esc => {
                if(!esc || typeof esc !== 'object') return false;
                const tipo = safeString(esc.Tipo_Profissional).toLowerCase();
                if (activeSubTab === 'Calendário Médicos') return tipo.includes('médico') || tipo.includes('medico') || tipo === '';
                else return tipo.includes('colaborador') || tipo.includes('equipe') || tipo.includes('enfermagem');
            });

            const daysInMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0).getDate();
            const firstDayOfMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1).getDay();

            const handleSaveBatch = async (e) => {
                e.preventDefault(); if(datesToSave.length === 0) return showToast('Selecione uma data.', 'error');
                setLoadingAction(true); let err = false;
                for (let d of datesToSave) {
                    const rec = { ...formData, Data: d }; if(datesToSave.length > 1) rec.ID = ''; 
                    const res = await api.saveRecord('ESCALAS', rec, !!formData.ID && datesToSave.length === 1);
                    if(!res.success) err = true;
                }
                setLoadingAction(false); if(!err) { setIsModalOpen(false); onRefresh('ESCALAS'); showToast('Salvo!'); }
            };

            const findSubstitutes = (missingPersonName) => {
                const missingUser = usuarios.find(u => u && safeString(u['Nome Completo']) === missingPersonName);
                if(!missingUser || !missingUser['Competências']) return [];
                const requiredSkills = safeString(missingUser['Competências']).toLowerCase().split(',').map(s=>s.trim()).filter(s=>s);
                return usuarios.filter(u => {
                    if (!u || safeString(u['Nome Completo']) === missingPersonName) return false;
                    const uSkills = safeString(u['Competências']).toLowerCase();
                    const hasSkill = requiredSkills.some(rs => uSkills.includes(rs));
                    const isWorkingToday = todayEscalas.some(e => e && safeString(e.Nome_Profissional) === safeString(u['Nome Completo']));
                    return hasSkill && !isWorkingToday;
                });
            };

            const handleStatusChange = async (esc, novoStatus) => {
                await api.saveRecord('ESCALAS', { ...esc, Status_Turno: novoStatus }, true);
                onRefresh('ESCALAS');
            };

            const handleUnimedUpdate = async (controleItem, num) => {
                const newValue = Number(controleItem.Qtd_Atual || 0) + num;
                if(newValue < 0) return;
                await api.saveRecord('CONTROLE_ATENDIMENTOS', { ...controleItem, Qtd_Atual: String(newValue) }, true);
                onRefresh('CONTROLE_ATENDIMENTOS');
            };

            const PainelDoDia = () => {
                const setores = {};
                todayEscalas.forEach(e => {
                    if(!e) return;
                    const s = safeString(e.Setor_Consultorio) || 'Sem Setor Informado';
                    if(!setores[s]) setores[s] = []; setores[s].push(e);
                });

                return (
                    <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] p-4 md:p-8 border border-gray-100 dark:border-slate-700 min-h-[60vh]">
