<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        const VERSAO_ATUAL = "6.0.0"; // Mega Atualização Escalas e Unimed
        if (window.location.search.indexOf('v=' + VERSAO_ATUAL) === -1) {
            localStorage.clear(); sessionStorage.clear();
            window.location.replace(window.location.pathname + (window.location.pathname.indexOf('?') === -1 ? '?' : '&') + 'v=' + VERSAO_ATUAL);
        }
    </script>

    <title>Portal São Vicente</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    colors: { primary: 'var(--color-primary, #1E40AF)', secondary: 'var(--color-secondary, #F97316)', medical: 'var(--color-medical, #E0F2FE)' },
                    fontFamily: { sans: ['var(--font-family, Inter)', 'sans-serif'] },
                    borderRadius: { 'custom': 'var(--border-radius, 1.5rem)' },
                    animation: { 
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite', 
                        'fade-in': 'fadeIn 0.3s ease-out', 
                        'pop-in': 'popIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                        'bounce-slight': 'bounceSlight 2s infinite ease-in-out'
                    },
                    keyframes: { 
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        popIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(100%)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        bounceSlight: { '0%, 100%': { transform: 'translateY(-10%)' }, '50%': { transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root { --color-primary: #1E40AF; --color-secondary: #F97316; --color-medical: #E0F2FE; --color-bg: #F8FAFC; --font-family: 'Inter'; --border-radius: 1.5rem; --card-transition: all 0.3s ease; }
        body { font-family: var(--font-family), sans-serif; overflow-x: hidden; transition: background-color 0.3s ease, color 0.3s ease; background-color: var(--color-bg); }
        body.dark { background-color: #0f172a; } 
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .card-hover { transition: var(--card-transition); border-radius: var(--border-radius); }
        .card-hover:hover { transform: translateY(-5px) scale(1.02); z-index: 10; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .glass-modal { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); }
        .dark .glass-modal { background: rgba(15, 23, 42, 0.85); }
        .rounded-custom { border-radius: var(--border-radius) !important; }
        .custom-scrollbar { overflow-y: auto; }

        .matrix-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .matrix-table th { padding: 1.5rem 1rem; color: white; font-weight: 800; text-transform: uppercase; font-size: 0.85rem; text-align: center; border: none; }
        .matrix-table th:first-child { border-radius: 1rem 0 0 1rem; background-color: #1e293b; text-align: left; position: sticky; left: 0; z-index: 30; }
        .matrix-table th:last-child { border-radius: 0 1rem 1rem 0; }
        .matrix-row { background-color: #ffffff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: transform 0.2s, box-shadow 0.2s; position: relative; }
        .matrix-row:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgba(0,0,0,0.1); z-index: 20; }
        .dark .matrix-row { background-color: #1e293b; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        .matrix-row td { padding: 1rem; text-align: center; vertical-align: middle; border: none; }
        .matrix-row td:first-child { background-color: #1e293b; color: white; font-weight: bold; border-radius: 1rem 0 0 1rem; text-align: left; position: sticky; left: 0; z-index: 20; border-left: 6px solid var(--color-primary); }
        .matrix-row td:last-child { border-radius: 0 1rem 1rem 0; }
    </style>
</head>
<body class="text-gray-800 dark:text-slate-100">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useRef, Component } = React;

        // ==========================================
        // 🛑 SUAS CHAVES DO FIREBASE AQUI 🛑
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyArUJk5o90YfmMqRZl2kBaFfvRXFZcW3cE",
            authDomain: "portal-sao-vicente.firebaseapp.com",
            projectId: "portal-sao-vicente",
            storageBucket: "portal-sao-vicente.firebasestorage.app",
            messagingSenderId: "52988900084",
            appId: "1:52988900084:web:9f5f2d494c22b10eb2a4a1"
        };

        const isFirebaseConfigured = firebaseConfig.apiKey !== "" && firebaseConfig.apiKey !== "COLE_AQUI" && !firebaseConfig.apiKey.includes("AIzaSySuaChave");
        
        let db = null;
        let auth = null;

        if (isFirebaseConfigured) {
            try {
                if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
                db = firebase.firestore();
                // OFFLINE MODE
                db.enablePersistence({ synchronizeTabs: true }).catch(function(err) { console.log("Offline mode warning:", err.code); });
                auth = firebase.auth();
            } catch (error) { console.error("Erro Firebase:", error); }
        }

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            render() {
                if (this.state.hasError) return <div className="p-10 text-center"><h2 className="text-2xl font-black text-red-500">Erro na Interface</h2><button onClick={()=>window.location.reload()} className="mt-4 bg-primary text-white px-6 py-2 rounded-xl">Recarregar</button></div>;
                return this.props.children; 
            }
        }

        const safeString = (val) => (val === null || val === undefined) ? '' : String(val);

        // ATUALIZADO: Motor de Links do Drive (Robusto)
        const formatImageUrl = (url) => {
            const str = safeString(url).trim(); if (!str) return '';
            if (str.includes('drive.google.com')) {
                const match = str.match(/\/d\/([a-zA-Z0-9_-]+)/) || str.match(/id=([a-zA-Z0-9_-]+)/) || str.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) return `https://drive.google.com/uc?export=view&id=${match[1]}`;
            }
            return str;
        };

        const getEmbedUrl = (url) => {
            const str = safeString(url).trim();
            if (str.includes('youtube.com/watch')) return str.replace('watch?v=', 'embed/');
            if (str.includes('youtu.be/')) return str.replace('youtu.be/', 'youtube.com/embed/');
            if (str.includes('drive.google.com')) {
                const match = str.match(/\/d\/([a-zA-Z0-9_-]+)/) || str.match(/id=([a-zA-Z0-9_-]+)/) || str.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) return `https://drive.google.com/file/d/${match[1]}/preview`;
            }
            return str;
        };

        // Função para checar se o expediente já acabou (Auto-Ausente)
        const isPastEnd = (horaFimStr) => {
            if(!horaFimStr) return false;
            const match = horaFimStr.match(/(\d{2}):(\d{2})/g);
            if (match && match.length > 0) {
                const endTime = match[match.length - 1]; 
                const [hours, mins] = endTime.split(':').map(Number);
                const now = new Date();
                if (now.getHours() > hours || (now.getHours() === hours && now.getMinutes() >= mins)) return true;
            }
            return false;
        };

        const tabSchemas = {
            'CORPO CLINICO': ['ID', 'Médico', 'Especialidade', 'Segmento', 'Código UNIMED', 'CRM', 'Hora Início', 'Hora Fim', 'Cor_Selo', 'Foto_URL'], // Adicionado Hora Início e Fim
            'EXAMES DE IMAGEM': ['ID', 'Categoria', 'Código', 'Nome do Exame', 'Profissionais', 'Idade Permitida', 'Observações', 'Imagem_URL'],
            'EXAMES DE IMAGEM E OUTROS': ['ID', 'Código', 'Descrição', 'Valor', 'Prazo de Laudo', 'Onde Encontrar', 'Imagem_URL'],
            'CONSULTA E PROCEDIMENTOS': ['ID', 'Código', 'Consulta/Procedimento', 'Descrição', 'Preparo', 'Material Utilizado', 'Valor Particular', 'Imagem_URL'],
            'EXAMES LABORATORIAIS': ['ID', 'Código', 'Procedimento', 'Valor', 'Prazo de Liberação', 'Preparo', 'Motivo_Indicacao'],
            'CONTATOS': ['ID', 'Tipo', 'Local_Setor', 'Nome_Contato', 'Valor_Contato', 'Anotacoes'], 
            'SENHAS E LOGINS GERAIS': ['ID', 'Nome do Sistema', 'Link do Sistema', 'Login', 'Senha', 'Observações'],
            'REMOÇÕES': ['ID', 'Nome do Hospital/Clínica', 'Contato', 'Local', 'Informações Importantes', 'Convênios Atendidos', 'Imagem_URL'],
            'INSTITUTOS': ['ID', 'Tabela_Instituto', 'Profissional', 'Especialidade', 'CRM_URA', 'Valores'],
            'NOVIDADES_E_EVENTOS': ['ID', 'Tipo', 'Título', 'Mensagem', 'Data de Publicação', 'Imagem_URL'],
            'BOLETINS_INFORMATIVOS': ['ID', 'Título', 'Descrição', 'Tipo_Midia', 'Link_Arquivo', 'Data_Publicacao'],
            'CONTROLE_ATENDIMENTOS': ['ID', 'Profissional', 'Convênio', 'Qtd_Atual', 'Limite_Max'],
            'USUARIOS': ['ID', 'Nome Completo', 'E-mail', 'Nível de Acesso', 'Data de Nascimento', 'Foto_Perfil_URL', 'Status', 'Competências', 'Hora Início', 'Hora Fim', 'Horários Flexíveis', 'Formato Contratação'], // Removida Senha, adc Horários
            'ESCALAS': ['ID', 'Tipo_Profissional', 'Nome_Profissional', 'Data', 'Turno', 'Horario', 'Unidade', 'Setor_Consultorio', 'Status_Turno', 'Substituindo'],
            'CHAT_MENSAGENS': ['ID', 'Data_Hora', 'Nome', 'Mensagem', 'Destinatario'],
            'LEMBRETES_HORA': ['ID', 'Hora', 'Mensagem'],
            'CONFIGURACOES': ['ID', 'Chave', 'Valor'],
            'MURAL_AVISOS': ['ID', 'Layout', 'Título', 'Subtítulo', 'Imagem_URL', 'Link', 'Ativo']
        };

        const api = {
            fetch: async (colName) => {
                if(!db) return [];
                try { const snap = await db.collection(colName).get(); return snap.docs.map(doc => ({ ID: doc.id, ...doc.data() })); } catch (e) { return []; }
            },
            fetchAll: async () => {
                if(!db) return {}; let allData = {};
                for (let c of Object.keys(tabSchemas)) { try { const snap = await db.collection(c).get(); allData[c] = snap.docs.map(doc => ({ ID: doc.id, ...doc.data() })); } catch(e) {} }
                return allData;
            },
            login: async (rawEmail, password) => {
                if(!isFirebaseConfigured || !auth) return { success: false, message: 'As chaves não estão configuradas.' };
                try {
                    const email = rawEmail.trim(); await auth.signInWithEmailAndPassword(email, password);
                    const userDoc = await db.collection('USUARIOS').where('E-mail', '==', email).get();
                    let userData = { 'E-mail': email, 'Nome Completo': email.split('@')[0], 'Nível de Acesso': 'Admin' };
                    if (!userDoc.empty) {
                        userData = { ID: userDoc.docs[0].id, ...userDoc.docs[0].data() };
                        if (userData.Status && String(userData.Status).toLowerCase() !== 'ativo') { await auth.signOut(); return { success: false, message: 'Conta inativa.' }; }
                    }
                    return { success: true, user: userData };
                } catch (error) { return { success: false, message: "E-mail ou senha incorretos." }; }
            },
            saveRecord: async (colName, data, isEdit) => {
                if(!db) return { success: false };
                try {
                    let docData = { ...data };
                    Object.keys(docData).forEach(k => { if(typeof docData[k] === 'string') docData[k] = docData[k].trim(); });
                    let id = docData.ID; delete docData.ID;
                    Object.keys(docData).forEach(key => docData[key] === undefined && delete docData[key]);
                    if (isEdit && id) await db.collection(colName).doc(id).update(docData); else await db.collection(colName).add(docData);
                    return { success: true };
                } catch (e) { return { success: false }; }
            },
            deleteRecord: async (colName, id) => {
                if(!db) return { success: false };
                try { await db.collection(colName).doc(id).delete(); return { success: true }; } catch (e) { return { success: false }; }
            }
        };

        const ClockWidget = ({ lembretesData }) => {
            const [time, setTime] = useState(new Date());
            useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);
            const hour = time.getHours();
            let periodStr = 'Bom dia'; let icon = 'ph-sun'; let bgClass = 'bg-blue-50 border-blue-200 text-blue-800 dark:bg-blue-900/30 dark:border-blue-800 dark:text-blue-200';
            if (hour >= 12 && hour < 18) { periodStr = 'Boa tarde'; icon = 'ph-cloud-sun'; bgClass = 'bg-orange-50 border-orange-200 text-orange-800 dark:bg-orange-900/30 dark:border-orange-800 dark:text-orange-200'; }
            else if (hour >= 18 || hour < 6) { periodStr = 'Boa noite'; icon = 'ph-moon-stars'; bgClass = 'bg-indigo-900 border-indigo-700 text-indigo-100 dark:bg-slate-800 dark:border-slate-700 dark:text-indigo-200'; }
            const lembretes = Array.isArray(lembretesData) ? lembretesData : [];
            const lembreteAtual = lembretes.find(l => l && typeof l === 'object' && parseInt(safeString(l.Hora) || -1) === hour);
            const msg = lembreteAtual ? safeString(lembreteAtual.Mensagem) : 'Tenha um excelente turno de trabalho!';

            return (
                <div className={`p-6 rounded-custom border-2 shadow-sm flex items-center justify-between transition-colors duration-1000 ${bgClass}`}>
                    <div className="flex items-center gap-5">
                        <div className="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur flex items-center justify-center shadow-inner"><i className={`ph-fill ${icon} text-4xl animate-spin-slow`}></i></div>
                        <div><h2 className="text-4xl font-black tracking-tighter">{time.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit', second:'2-digit'})}</h2><p className="text-sm font-bold uppercase tracking-widest opacity-80 mt-1">{periodStr}</p></div>
                    </div>
                    <div className="hidden md:flex flex-col items-end max-w-xs text-right border-l-2 border-white/20 pl-6">
                        <span className="text-[10px] font-black uppercase tracking-widest opacity-60 mb-1 flex items-center gap-1"><i className="ph-fill ph-bell-ringing animate-pulse"></i> Lembrete da Hora</span>
                        <p className="text-base font-bold leading-tight">{msg}</p>
                    </div>
                </div>
            )
        };

        const ModalForm = ({ title, schema, formData, setFormData, onSave, onClose, loading }) => {
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 glass-modal animate-fade-in" onMouseDown={onClose}>
                    <div className="bg-white dark:bg-slate-800 rounded-custom w-full max-w-3xl max-h-[90vh] flex flex-col shadow-2xl animate-pop-in overflow-hidden border border-gray-100 dark:border-slate-700" onMouseDown={e => e.stopPropagation()}>
                        <div className="p-6 bg-gray-50 dark:bg-slate-900 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center shrink-0">
                            <h3 className="text-2xl font-black flex items-center gap-3 text-gray-900 dark:text-white"><div className="w-10 h-10 rounded-full bg-primary/10 text-primary flex items-center justify-center"><i className={`ph-bold ${formData?.ID ? 'ph-pencil-simple' : 'ph-plus'}`}></i></div> {formData?.ID ? 'Editar' : 'Novo'} {title}</h3>
                            <button type="button" onClick={onClose} className="w-10 h-10 rounded-full bg-gray-200 dark:bg-slate-700 hover:bg-red-500 hover:text-white transition flex items-center justify-center"><i className="ph-bold ph-x text-lg"></i></button>
                        </div>
                        <div className="p-8 overflow-y-auto flex-1 custom-scrollbar">
                            <form id="gen-form" onSubmit={onSave} className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {(schema || []).filter(col => safeString(col) !== 'ID').map((col, idx) => {
                                    const colName = safeString(col); const cLower = colName.toLowerCase();
                                    const isLong = cLower.includes('descrição') || cLower.includes('anotações') || cLower.includes('mensagem') || cLower.includes('preparo') || cLower.includes('url') || cLower.includes('site') || cLower.includes('motivo') || cLower.includes('competências');
                                    
                                    return (
                                        <div key={idx} className={isLong ? 'md:col-span-2' : ''}>
                                            <label className="block text-xs font-black text-gray-400 dark:text-slate-400 mb-2 uppercase tracking-widest">{colName}</label>
                                            
                                            {colName === 'Layout' && title.includes('Aviso') ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-custom outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="Padrão">Padrão</option><option value="Imagem Grande">Imagem Grande (Banner)</option><option value="Só Texto">Só Texto</option>
                                                </select>
                                            ) : colName === 'Tipo_Midia' ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-custom font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={e => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="Documento PDF">Documento (Drive PDF)</option><option value="Vídeo">Vídeo (YouTube/Drive)</option>
                                                </select>
                                            ) : colName === 'Tipo' && title.includes('Contato') ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-custom outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="Ramal">Ramal Interno</option><option value="Email">E-mail</option><option value="Telefone">Telefone Externo</option>
                                                </select>
                                            ) : colName.includes('?') || colName === 'Status' || colName === 'Ativo' ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-custom outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="">Selecione...</option><option value="Sim">Sim</option><option value="Não">Não</option><option value="Ativo">Ativo</option><option value="Inativo">Inativo</option>
                                                </select>
                                            ) : colName === 'Nível de Acesso' ? (
                                                <select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-custom outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="">Selecione...</option><option value="Colaborador">Colaborador</option><option value="Supervisor">Supervisor</option><option value="Admin">Admin</option>
                                                </select>
                                            ) : colName.includes('Cor') ? (
                                                <div className="flex items-center gap-3 bg-gray-50 dark:bg-slate-900 p-3 rounded-custom border border-gray-200 dark:border-slate-700">
                                                    <input type="color" className="w-10 h-10 rounded-xl cursor-pointer border-0 bg-transparent" value={safeString(formData[colName]) || '#1E40AF'} onChange={(e) => setFormData({...formData, [colName]: e.target.value})} />
                                                    <span className="font-mono text-sm font-bold text-gray-500">{safeString(formData[colName]) || 'Cor Padrão'}</span>
                                                </div>
                                            ) : isLong && !cLower.includes('url') && !cLower.includes('site') && !cLower.includes('link') ? (
                                                <textarea className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-custom outline-none focus:ring-2 focus:ring-primary min-h-[120px] font-medium text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})} placeholder={cLower.includes('competências') ? 'Ex: Recepção, Triagem, Coleta' : `Detalhes...`}></textarea>
                                            ) : cLower.includes('data') ? (
                                                <input type="date" className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-custom outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})} />
                                            ) : cLower.includes('hora') || cLower.includes('início') || cLower.includes('fim') || cLower.includes('flexíveis') ? (
                                                <input type="time" className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-custom outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})} />
                                            ) : (
                                                <input type={cLower.includes('senha') ? 'password' : 'text'} className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-custom outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})} placeholder={`Preencha ${cLower}`} />
                                            )}
                                        </div>
                                    )
                                })}
                            </form>

        };

        const SenhasView = ({ data, canEdit, openModal, handleDelete, schema }) => {
            const [search, setSearch] = useState('');
            const filtered = data.filter(c => safeString(c['Nome do Sistema']).toLowerCase().includes(search.toLowerCase()) || safeString(c.Login).toLowerCase().includes(search.toLowerCase()));
            const [visiblePwd, setVisiblePwd] = useState({});

            const togglePwd = (id) => setVisiblePwd(p => ({...p, [id]: !p[id]}));

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-center bg-white dark:bg-slate-800 p-5 rounded-custom shadow-sm border border-gray-100 dark:border-slate-700 gap-4">
                        <div className="relative w-full md:w-96"><i className="ph-bold ph-magnifying-glass absolute left-5 top-4 text-gray-400 text-xl"></i><input type="text" placeholder="Buscar sistema ou login..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full pl-14 pr-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-full outline-none focus:ring-2 focus:ring-primary font-bold transition text-gray-800 dark:text-white" /></div>
                        {canEdit && <button onClick={()=>openModal(null, schema)} className="bg-primary text-white font-black px-8 py-4 rounded-full shadow-md hover:-translate-y-1 transition shrink-0"><i className="ph-bold ph-plus"></i> Nova Senha</button>}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                        {filtered.map((item, i) => (
                            <div key={i} className="bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-[2rem] p-6 shadow-sm card-hover relative group flex flex-col">
                                <div className="flex justify-between items-start mb-4">
                                    <h3 className="font-black text-xl text-gray-900 dark:text-white flex items-center gap-2"><i className="ph-fill ph-lock-key text-primary"></i> {safeString(item['Nome do Sistema'])}</h3>
                                    {item['Link do Sistema'] && <a href={safeString(item['Link do Sistema'])} target="_blank" className="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg text-xs font-black hover:bg-blue-600 hover:text-white transition">Acessar Link <i className="ph-bold ph-arrow-square-out"></i></a>}
                                </div>
                                
                                <div className="bg-gray-50 dark:bg-slate-900 rounded-xl p-4 space-y-3 mb-4">

                                    <div>
                                        <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest flex justify-between">Senha <button onClick={()=>togglePwd(item.ID)} className="text-primary hover:underline">{visiblePwd[item.ID] ? 'Ocultar' : 'Mostrar'}</button></p>
                                        <div className="flex justify-between items-center bg-white dark:bg-slate-800 px-3 py-2 rounded-lg border border-gray-200 dark:border-slate-700 mt-1">
                                            <span className="font-mono font-bold text-gray-800 dark:text-white">{visiblePwd[item.ID] ? safeString(item.Senha) : '••••••••••••'}</span>
                                            <button onClick={()=>navigator.clipboard.writeText(safeString(item.Senha))} className="text-gray-400 hover:text-primary"><i className="ph-bold ph-copy"></i></button>
                                        </div>
                                    </div>
                                </div>
                                {item['Observações'] && <p className="text-xs font-medium text-gray-500 mt-auto">{safeString(item['Observações'])}</p>}

                                {canEdit && (
                                    <div className="absolute top-4 right-4 flex gap-1 opacity-0 group-hover:opacity-100 transition">
                                        <button onClick={()=>openModal(item, schema)} className="p-2 text-blue-600 bg-white shadow rounded-lg hover:bg-blue-600 hover:text-white"><i className="ph-bold ph-pencil-simple"></i></button>
                                        <button onClick={()=>{if(confirm('Excluir?')) handleDelete(item.ID)}} className="p-2 text-red-600 bg-white shadow rounded-lg hover:bg-red-600 hover:text-white"><i className="ph-bold ph-trash"></i></button>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const BoletinsView = ({ data, canEdit, openModal, handleDelete }) => {
            const [selectedMedia, setSelectedMedia] = useState(null);
            const ativos = Array.isArray(data) ? data : [];

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex justify-between items-center bg-white dark:bg-slate-800 p-5 rounded-custom shadow-sm border border-gray-100 dark:border-slate-700">
                        <div>
                            <h2 className="text-2xl font-black text-gray-800 dark:text-white flex items-center gap-3"><i className="ph-fill ph-newspaper text-primary"></i> Boletins e Treinamentos</h2>
                            <p className="text-sm text-gray-500 font-medium ml-9 mt-1">Materiais educativos e comunicados em mídia para a equipe.</p>
                        </div>
                        {canEdit && <button onClick={()=>openModal({Tipo_Midia: 'Documento PDF'})} className="bg-primary text-white px-8 py-4 rounded-full font-black shadow-lg hover:-translate-y-1 transition flex items-center gap-2"><i className="ph-bold ph-plus text-xl"></i> Nova Mídia</button>}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {ativos.map((item, i) => (
                            <div key={i} className="bg-white dark:bg-slate-800 border border-gray-100 dark:border-slate-700 rounded-[2rem] p-6 shadow-sm card-hover flex flex-col relative group">
                                <div className="flex items-start justify-between mb-4">
                                    <div className={`w-14 h-14 rounded-2xl flex items-center justify-center text-3xl shadow-sm ${safeString(item.Tipo_Midia).includes('Vídeo') ? 'bg-red-50 text-red-600 dark:bg-red-900/30' : 'bg-blue-50 text-blue-600 dark:bg-blue-900/30'}`}>
                                        <i className={`ph-fill ${safeString(item.Tipo_Midia).includes('Vídeo') ? 'ph-play-circle' : 'ph-file-pdf'}`}></i>
                                    </div>
                                    <span className="text-xs font-black text-gray-400 bg-gray-50 dark:bg-slate-900 px-3 py-1 rounded-full border dark:border-slate-700">{safeString(item.Data_Publicacao).split('-').reverse().join('/')}</span>
                                </div>
                                <h3 className="font-black text-xl text-gray-900 dark:text-white leading-tight mb-2">{safeString(item.Título)}</h3>
                                <p className="text-sm text-gray-500 font-medium line-clamp-2 mb-6">{safeString(item.Descrição)}</p>
                                
                                <button onClick={()=>setSelectedMedia(item)} className="mt-auto w-full py-3 bg-gray-50 dark:bg-slate-900 hover:bg-primary dark:hover:bg-primary hover:text-white rounded-xl font-black transition flex items-center justify-center gap-2 text-gray-700 dark:text-white border dark:border-slate-700">
                                    Visualizar <i className="ph-bold ph-arrow-right"></i>
                                </button>

                                {canEdit && (
                                    <div className="absolute top-4 right-4 flex gap-1 opacity-0 group-hover:opacity-100 transition">
                                        <button onClick={()=>openModal(item)} className="p-2 bg-white dark:bg-slate-700 shadow rounded-lg hover:text-blue-600"><i className="ph-bold ph-pencil-simple"></i></button>
                                        <button onClick={()=>{if(confirm('Excluir?')) handleDelete(item.ID)}} className="p-2 bg-white dark:bg-slate-700 shadow rounded-lg hover:text-red-600"><i className="ph-bold ph-trash"></i></button>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    {selectedMedia && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 glass-modal" onClick={()=>setSelectedMedia(null)}>
                            <div className="bg-white dark:bg-slate-800 rounded-[2rem] w-full max-w-5xl shadow-2xl relative overflow-hidden border dark:border-slate-700" onClick={e=>e.stopPropagation()}>
                                <div className="p-6 bg-gray-900 text-white flex justify-between items-center"><h3 className="text-xl font-black">{safeString(selectedMedia.Título)}</h3><button onClick={()=>setSelectedMedia(null)} className="w-10 h-10 bg-white/20 hover:bg-red-500 rounded-full flex justify-center items-center transition"><i className="ph-bold ph-x"></i></button></div>
                                <div className="bg-gray-100 dark:bg-slate-900 h-[70vh] w-full relative flex items-center justify-center">
                                    {selectedMedia.Link_Arquivo ? (
                                        <iframe src={getEmbedUrl(selectedMedia.Link_Arquivo)} className="w-full h-full border-0" allow="autoplay; encrypted-media" allowFullScreen></iframe>
                                    ) : <div className="text-gray-400 font-black">Link indisponível ou não suportado.</div>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            )
        };

        const EscalasContainer = ({ sheetData, user, onRefresh, showToast }) => {
            const [activeSubTab, setActiveSubTab] = useState('Painel Hoje');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({});
            const [loadingAction, setLoadingAction] = useState(false);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(null); 
            const [selectedPerson, setSelectedPerson] = useState(null); 
            const [datesToSave, setDatesToSave] = useState([]); 
            const [showSwapSugg, setShowSwapSugg] = useState(false);

            // Permissão de Edição Completa
            const nivelKey = user && typeof user === 'object' ? Object.keys(user).find(k => safeString(k).toLowerCase().includes('acesso')) : null;
            const canEdit = nivelKey && ['admin', 'supervisor'].some(role => safeString(user[nivelKey]).toLowerCase().includes(role));
            
            // Permissão de Acesso Colaborador Comum (apenas troca de próprio status)
            const isColab = user && typeof user === 'object' && safeString(user[nivelKey]).toLowerCase().includes('colaborador');

            const escalas = Array.isArray(sheetData['ESCALAS']) ? sheetData['ESCALAS'] : [];
            const corpoClinico = Array.isArray(sheetData['CORPO CLINICO']) ? sheetData['CORPO CLINICO'] : [];
            const usuarios = Array.isArray(sheetData['USUARIOS']) ? sheetData['USUARIOS'] : [];
            const controleUnimed = Array.isArray(sheetData['CONTROLE_ATENDIMENTOS']) ? sheetData['CONTROLE_ATENDIMENTOS'] : [];
            
            const todayStr = new Date().toLocaleDateString('pt-BR');
            const todayEscalas = escalas.filter(e => safeString(e.Data).includes(todayStr) || safeString(e.Data).includes(todayStr.substring(0,5)));

            const filteredEscalas = escalas.filter(esc => {
                if(!esc || typeof esc !== 'object') return false;
                const tipo = safeString(esc.Tipo_Profissional).toLowerCase();
                if (activeSubTab === 'Calendário Médicos') return tipo.includes('médico') || tipo.includes('medico') || tipo === '';
                else return tipo.includes('colaborador') || tipo.includes('equipe') || tipo.includes('enfermagem');
            });

            const daysInMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0).getDate();
            const firstDayOfMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1).getDay();

            const handleSaveBatch = async (e) => {
                e.preventDefault(); if(datesToSave.length === 0) return showToast('Selecione uma data.', 'error');
                setLoadingAction(true); let err = false;
                for (let d of datesToSave) {
                    const rec = { ...formData, Data: d }; if(datesToSave.length > 1) rec.ID = ''; 
                    const res = await api.saveRecord('ESCALAS', rec, !!formData.ID && datesToSave.length === 1);
                    if(!res.success) err = true;
                }
                setLoadingAction(false); if(!err) { setIsModalOpen(false); onRefresh('ESCALAS'); showToast('Salvo!'); }
            };

            const findSubstitutes = (missingPersonName) => {
                const missingUser = usuarios.find(u => safeString(u['Nome Completo']) === missingPersonName);
                if(!missingUser || !missingUser['Competências']) return [];
                const requiredSkills = safeString(missingUser['Competências']).toLowerCase().split(',').map(s=>s.trim()).filter(s=>s);
                return usuarios.filter(u => {
                    if (safeString(u['Nome Completo']) === missingPersonName) return false;
                    const uSkills = safeString(u['Competências']).toLowerCase();
                    const hasSkill = requiredSkills.some(rs => uSkills.includes(rs));
                    const isWorkingToday = todayEscalas.some(e => safeString(e.Nome_Profissional) === safeString(u['Nome Completo']));
                    return hasSkill && !isWorkingToday;
                });
            };

            const handleStatusChange = async (esc, novoStatus) => {
                await api.saveRecord('ESCALAS', { ...esc, Status_Turno: novoStatus }, true);
                onRefresh('ESCALAS');
            };

            // Atualizar contagem da UNIMED direto pelo Kanban
            const handleUnimedUpdate = async (controleItem, num) => {
                const newValue = Number(controleItem.Qtd_Atual || 0) + num;
                if(newValue < 0) return;
                await api.saveRecord('CONTROLE_ATENDIMENTOS', { ...controleItem, Qtd_Atual: String(newValue) }, true);
                onRefresh('CONTROLE_ATENDIMENTOS');
            };

            // ABRIR MODAL COM LANÇAMENTO RÁPIDO DO USUÁRIO (Integração)
            const openQuickLancar = (nome, isMed = false) => {
                const refObj = isMed ? corpoClinico.find(c => c.Médico === nome) : usuarios.find(u => u['Nome Completo'] === nome);
                const hInicio = refObj ? safeString(refObj['Hora Início']) : '';
                const hFim = refObj ? safeString(refObj['Hora Fim']) : '';
                const horarioFormatado = hInicio && hFim ? `${hInicio} às ${hFim}` : '';

                setFormData({ ID: '', Tipo_Profissional: isMed ? 'Médico' : 'Colaborador', Nome_Profissional: nome, Turno: 'Manhã', Horario: horarioFormatado, Unidade: '', Setor_Consultorio: '', Status_Turno: 'Trabalhando', Substituindo: '' }); 
                setDatesToSave([]); 
                setIsModalOpen(true);
            };

            const PainelDoDia = () => {
                const setores = {};
                todayEscalas.forEach(e => {
                    const s = safeString(e.Setor_Consultorio) || 'Sem Setor Informado';
                    if(!setores[s]) setores[s] = []; setores[s].push(e);
                });

                return (
                    <div className="bg-white dark:bg-slate-800 rounded-[3rem] p-8 border border-gray-100 dark:border-slate-700 min-h-[60vh]">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                            <h3 className="text-3xl font-black text-gray-800 dark:text-white flex items-center gap-3"><i className="ph-fill ph-kanban text-primary"></i> Operação de Hoje</h3>
                            <div className="flex gap-4 text-xs font-bold uppercase tracking-widest bg-gray-50 dark:bg-slate-900 p-3 rounded-full border dark:border-slate-700">
                                <span className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-green-500"></div> Ativo</span>
                                <span className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-orange-500"></div> Intervalo</span>
                                <span className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-red-500"></div> Ausente</span>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                            {Object.keys(setores).map(setor => (
                                <div key={setor} className="bg-gray-50 dark:bg-slate-900 rounded-[2rem] p-6 shadow-inner border border-gray-100 dark:border-slate-700 flex flex-col">
                                    <h4 className="font-black text-gray-500 dark:text-slate-400 uppercase tracking-widest text-sm mb-4 px-2">{setor}</h4>
                                    <div className="space-y-4">
                                        {setores[setor].map((esc, i) => {
                                            // AUTO-AUSENTE: Se passou do horário de fim
                                            let isFimExpediente = false;
                                            // Buscamos o Hora Fim cadastrado no usuário, ou tentamos extrair do string "08:00 às 18:00"
                                            let userHoraFim = '';
                                            const profData = usuarios.find(u => u['Nome Completo'] === esc.Nome_Profissional) || corpoClinico.find(c => c.Médico === esc.Nome_Profissional);
                                            if (profData && profData['Hora Fim']) userHoraFim = profData['Hora Fim'];
                                            else userHoraFim = esc.Horario; // Fallback to extract from string

                                            if (isPastEnd(userHoraFim)) isFimExpediente = true;

                                            const status = isFimExpediente ? 'Ausente (Fim Expediente)' : (safeString(esc.Status_Turno) || 'Trabalhando');
                                            const isIntervalo = status === 'Intervalo';
                                            const isAusente = status.includes('Ausente') || status === 'Folga' || status === 'Falta';
                                            
                                            let bgCard = isIntervalo ? 'bg-orange-50 dark:bg-orange-900/30 border-orange-200' : isAusente ? 'bg-red-50 dark:bg-red-900/30 border-red-200 opacity-60' : 'bg-white dark:bg-slate-800 border-gray-100 dark:border-slate-600';
                                            
                                            // CONTROLE UNIMED (Para os Médicos)
                                            const cUnimed = controleUnimed.find(a => safeString(a.Profissional) === safeString(esc.Nome_Profissional));
                                            let uPulseClass = '';
                                            if (cUnimed) {
                                                const q = Number(cUnimed.Qtd_Atual||0); const m = Number(cUnimed.Limite_Max||1);
                                                if (m - q <= 5) uPulseClass = 'animate-pulse bg-red-500 text-white';
                                                else if (q/m >= 0.8) uPulseClass = 'animate-pulse bg-green-500 text-white';
                                                else uPulseClass = 'bg-blue-100 text-blue-800';
                                            }

                                            return (
                                                <div key={i} onClick={()=>(canEdit || isColab) && setSelectedPerson(esc)} className={`p-5 rounded-[1.5rem] border-2 shadow-sm cursor-pointer hover:shadow-md hover:border-primary transition relative flex flex-col gap-2 ${bgCard}`}>
                                                    {isIntervalo && <div className="absolute -top-3 -right-3 w-10 h-10 bg-orange-500 text-white rounded-full flex items-center justify-center text-xl animate-bounce-slight shadow-lg border-2 border-white dark:border-slate-800 z-10">🥪</div>}
                                                    
                                                    <div className="flex justify-between items-start">
                                                        <div>
                                                            <span className={`font-black text-lg ${isAusente ? 'text-red-900' : 'text-gray-900'} dark:text-white truncate`}>{safeString(esc.Nome_Profissional)}</span>
                                                            <p className="text-xs font-bold text-gray-500 dark:text-slate-400 mt-1"><i className="ph-fill ph-clock"></i> {safeString(esc.Horario)}</p>
                                                        </div>
                                                        {isAusente && <span className="text-[10px] uppercase font-black tracking-widest text-red-600 bg-red-100 px-2 py-1 rounded">Ausente</span>}
                                                    </div>

                                                    {esc.Substituindo && <p className="text-[10px] font-black text-primary bg-blue-50 dark:bg-blue-900/50 px-2 py-1 rounded mt-1 uppercase w-max">Cobrindo: {esc.Substituindo}</p>}
                                                    
                                                    {cUnimed && (
                                                        <div className={`mt-2 flex justify-between items-center p-2 rounded-xl border ${uPulseClass || 'border-blue-200 bg-blue-50/50'}`} onClick={(e)=>e.stopPropagation()}>
                                                            <span className="text-[10px] font-black uppercase tracking-widest px-1">Guia Unimed</span>
                                                            <div className="flex items-center gap-3">
                                                                <button onClick={()=>handleUnimedUpdate(cUnimed, -1)} className="w-6 h-6 bg-white/50 hover:bg-white rounded-full flex items-center justify-center font-black text-black shadow-sm">-</button>
                                                                <span className="font-black text-sm">{cUnimed.Qtd_Atual} <span className="opacity-50 text-xs">/ {cUnimed.Limite_Max}</span></span>
                                                                <button onClick={()=>handleUnimedUpdate(cUnimed, 1)} className="w-6 h-6 bg-white/50 hover:bg-white rounded-full flex items-center justify-center font-black text-black shadow-sm">+</button>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            ))}
                            {Object.keys(setores).length === 0 && <div className="col-span-full text-center p-20 text-gray-400 font-black text-2xl border-2 border-dashed border-gray-200 dark:border-slate-700 rounded-3xl">Ninguém escalado hoje.</div>}
                        </div>
                    </div>
                )
            };

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="bg-white dark:bg-slate-800 rounded-custom p-4 shadow-sm border border-gray-100 dark:border-slate-700 flex flex-wrap justify-between items-center gap-4">
                        <div className="flex bg-gray-50 dark:bg-slate-900 p-2 rounded-2xl gap-2 overflow-x-auto hide-scroll flex-1">
                            {['Painel Hoje', 'Calendário Médicos', 'Calendário Equipe'].map(tab => (
                                <button key={tab} onClick={() => setActiveSubTab(tab)} className={`px-6 py-3.5 rounded-xl font-black transition-all whitespace-nowrap ${activeSubTab === tab ? 'bg-white dark:bg-slate-800 text-primary shadow-md' : 'text-gray-500 hover:bg-gray-200 dark:hover:bg-slate-800'}`}>{tab}</button>
                            ))}
                        </div>
                        {canEdit && <button onClick={() => { setFormData({ ID: '', Tipo_Profissional: activeSubTab === 'Calendário Médicos' ? 'Médico' : 'Colaborador', Nome_Profissional: '', Turno: 'Manhã', Horario: '', Unidade: '', Setor_Consultorio: '', Status_Turno: 'Trabalhando', Substituindo: '' }); setDatesToSave([]); setIsModalOpen(true); }} className="bg-primary text-white font-black px-8 py-4 rounded-custom shadow-lg hover:-translate-y-1 transition shrink-0"><i className="ph-bold ph-calendar-plus"></i> Lançar Horário</button>}
                    </div>

                    {activeSubTab === 'Painel Hoje' ? <PainelDoDia /> : (
                        <div className="bg-white dark:bg-slate-800 rounded-[3rem] shadow-sm border border-gray-100 dark:border-slate-700 p-8 relative overflow-hidden">
                            <div className="flex justify-between items-center mb-10">
                                <button onClick={()=>setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth()-1, 1))} className="w-14 h-14 bg-gray-50 dark:bg-slate-900 rounded-2xl"><i className="ph-bold ph-caret-left"></i></button>
                                <h2 className="text-4xl font-black capitalize text-gray-900 dark:text-white">{currentMonth.toLocaleString('pt-BR', { month: 'long', year: 'numeric' })}</h2>
                                <button onClick={()=>setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth()+1, 1))} className="w-14 h-14 bg-gray-50 dark:bg-slate-900 rounded-2xl"><i className="ph-bold ph-caret-right"></i></button>
                            </div>
                            <div className="grid grid-cols-7 gap-4 mb-4 text-center"><div className="font-black text-gray-400">D</div><div className="font-black text-gray-400">S</div><div className="font-black text-gray-400">T</div><div className="font-black text-gray-400">Q</div><div className="font-black text-gray-400">Q</div><div className="font-black text-gray-400">S</div><div className="font-black text-gray-400">S</div></div>
                            <div className="grid grid-cols-7 gap-4 relative z-10">
                                {Array(firstDayOfMonth).fill(null).map((_, i) => <div key={`e-${i}`} className="aspect-square opacity-20 bg-gray-50 dark:bg-slate-900 rounded-3xl" />)}
                                {Array(daysInMonth).fill(null).map((_, i) => {
                                    const day = i + 1; const dateStrCompleto = `${String(day).padStart(2, '0')}/${String(currentMonth.getMonth() + 1).padStart(2, '0')}/${currentMonth.getFullYear()}`;
                                    const pessoasNoDia = filteredEscalas.filter(e => safeString(e.Data).includes(dateStrCompleto) || safeString(e.Data).includes(`${String(day).padStart(2, '0')}/${String(currentMonth.getMonth() + 1).padStart(2, '0')}/${String(currentMonth.getFullYear()).slice(2)}`));

                                    return (
                                        <div key={day} onClick={() => setSelectedDate(dateStrCompleto)} className={`aspect-square rounded-[2rem] border-2 p-4 flex flex-col cursor-pointer transition-all ${isToday ? 'border-primary bg-blue-50/50 dark:bg-blue-900/20 shadow-md' : 'border-gray-100 dark:border-slate-700 hover:border-primary/50 bg-white dark:bg-slate-800'}`}>

                                            <div className="mt-auto w-full space-y-1.5">{pessoasNoDia.length > 0 && <div className={`w-full text-center text-xs font-black py-2 rounded-xl shadow-sm ${activeSubTab.includes('Médicos') ? 'bg-primary text-white' : 'bg-secondary text-white'}`}>{pessoasNoDia.length} Plantão</div>}</div>

                                    )
                                })}
                            </div>
                        </div>

                    {selectedDate && !selectedPerson && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 glass-modal" onClick={() => setSelectedDate(null)}>
                            <div className="bg-white dark:bg-slate-800 rounded-[3rem] w-full max-w-5xl p-10 shadow-2xl animate-pop-in relative border border-gray-100 dark:border-slate-700" onClick={e => e.stopPropagation()}>
                                <button onClick={()=>setSelectedDate(null)} className="absolute top-8 right-8 w-12 h-12 bg-gray-100 dark:bg-slate-700 hover:bg-red-500 hover:text-white rounded-full"><i className="ph-bold ph-x"></i></button>
