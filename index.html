                                <h3 className="text-3xl md:text-4xl font-black mb-8 md:mb-12 flex items-center gap-4 text-gray-900 dark:text-white border-b dark:border-slate-700 pb-6"><i className="ph-fill ph-calendar-check text-primary"></i> Plantão dia {selectedDate}</h3>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 overflow-y-auto custom-scrollbar flex-1 pb-4 pr-2">
                                    {filteredEscalas.filter(e => e && (safeString(e.Data).includes(selectedDate) || safeString(e.Data).includes(selectedDate.substring(0,6) + selectedDate.substring(8,10)))).map((esc, i) => (
                                        <div key={i} onClick={() => (canEdit || isColab) && setSelectedPerson(esc)} className="bg-white dark:bg-slate-800 border-2 border-gray-100 dark:border-slate-700 rounded-2xl md:rounded-[2rem] p-6 md:p-8 cursor-pointer card-hover hover:border-primary flex flex-col shadow-sm group">
                                            <h4 className="font-black text-xl md:text-2xl mb-3 text-gray-900 dark:text-white group-hover:text-primary transition">{safeString(esc.Nome_Profissional)}</h4>
                                            <p className="text-xs md:text-sm font-black bg-gray-50 dark:bg-slate-900 px-4 py-2 rounded-xl mb-6 text-gray-600 dark:text-slate-300 w-max flex items-center gap-2 border dark:border-slate-700"><i className="ph-fill ph-clock"></i> {safeString(esc.Turno)} • {safeString(esc.Horario)}</p>
                                            <div className="mt-auto flex justify-between items-center"><span className="text-[10px] font-black uppercase px-4 py-2 rounded-full bg-green-100 text-green-800 tracking-widest">{safeString(esc.Status_Turno)||'Ativo'}</span><span className="text-primary text-xs font-black bg-blue-50 dark:bg-blue-900/30 px-4 py-2 rounded-xl opacity-0 group-hover:opacity-100 transition">Abrir Detalhes <i className="ph-bold ph-arrow-right"></i></span></div>
                                        </div>
                                    ))}
                                    {filteredEscalas.filter(e => e && safeString(e.Data).includes(selectedDate)).length === 0 && <div className="col-span-full text-center text-gray-400 font-black text-2xl p-20 border-2 border-dashed rounded-[3rem] dark:border-slate-700">A escala deste dia está vazia.</div>}
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {selectedPerson && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 backdrop-blur-xl bg-gray-900/70 animate-fade-in" onClick={() => {setSelectedPerson(null); setShowSwapSugg(false)}}>
                            <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] w-full max-w-lg p-8 md:p-10 shadow-2xl relative border border-white dark:border-slate-700 max-h-[90vh] overflow-y-auto custom-scrollbar animate-pop-in" onClick={e => e.stopPropagation()}>
                                <button onClick={()=>{setSelectedPerson(null); setShowSwapSugg(false)}} className="absolute top-6 right-6 md:top-8 md:right-8 w-12 h-12 bg-gray-50 dark:bg-slate-700 hover:bg-gray-200 dark:hover:bg-slate-600 rounded-full flex justify-center items-center transition shadow-sm text-xl"><i className="ph-bold ph-x"></i></button>
                                
                                <div className="mb-8 border-b dark:border-slate-700 pb-6 pr-10">
                                    <h2 className="text-3xl font-black mb-2 text-gray-900 dark:text-white leading-tight">{safeString(selectedPerson.Nome_Profissional)}</h2>
                                    <p className="text-sm font-bold text-gray-500 dark:text-gray-400 flex items-center gap-2"><i className="ph-fill ph-map-pin"></i> {safeString(selectedPerson.Setor_Consultorio)} • <i className="ph-fill ph-clock ml-2"></i> {safeString(selectedPerson.Horario)}</p>
                                </div>

                                <div className="space-y-4 mb-8">
                                    <h4 className="text-[10px] md:text-xs font-black uppercase text-gray-400 tracking-widest bg-gray-50 dark:bg-slate-900 px-3 py-1.5 rounded-full w-max">Sinalização Rápida</h4>
                                    <div className="grid grid-cols-2 gap-4">
                                        <button onClick={()=>{handleStatusChange(selectedPerson, 'Trabalhando'); setSelectedPerson(null);}} className="p-4 md:p-5 rounded-[1.5rem] border-2 hover:border-green-500 bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800 text-green-700 dark:text-green-400 font-black flex flex-col items-center justify-center gap-2 transition hover:-translate-y-1 shadow-sm"><i className="ph-fill ph-check-circle text-3xl"></i> Voltei p/ Posto</button>
                                        <button onClick={()=>{handleStatusChange(selectedPerson, 'Intervalo'); setSelectedPerson(null);}} className="p-4 md:p-5 rounded-[1.5rem] border-2 hover:border-orange-500 bg-orange-50 dark:bg-orange-900/20 border-orange-200 dark:border-orange-800 text-orange-700 dark:text-orange-400 font-black flex flex-col items-center justify-center gap-2 transition hover:-translate-y-1 shadow-sm"><i className="ph-fill ph-coffee text-3xl"></i> Fui Lanchar</button>
                                    </div>
                                </div>

                                {canEdit && (
                                    <div className="border-t border-gray-100 dark:border-slate-700 pt-8 space-y-4">
                                        <h4 className="text-[10px] md:text-xs font-black uppercase text-gray-400 tracking-widest mb-2 bg-gray-50 dark:bg-slate-900 px-3 py-1.5 rounded-full w-max">Ações da Gestão</h4>
                                        <button onClick={()=>setShowSwapSugg(!showSwapSugg)} className="w-full py-4 md:py-5 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-full font-black shadow-xl hover:scale-105 transition flex justify-center items-center gap-3 text-sm md:text-base"><i className="ph-bold ph-arrows-left-right text-xl"></i> Gerenciar Substituição</button>
                                        <button onClick={async()=>{if(confirm('Tem certeza que deseja apagar este plantão?')){ await api.deleteRecord('ESCALAS', selectedPerson.ID); onRefresh('ESCALAS'); setSelectedPerson(null); setSelectedDate(null); }}} className="w-full py-4 md:py-5 bg-red-50 dark:bg-red-900/20 text-red-600 border border-red-100 dark:border-red-900 rounded-full font-black transition flex justify-center items-center gap-3 hover:bg-red-600 hover:text-white text-sm md:text-base"><i className="ph-bold ph-trash text-xl"></i> Cancelar Plantão</button>
                                    </div>
                                )}

                                {showSwapSugg && canEdit && (
                                    <div className="mt-6 bg-gray-50 dark:bg-slate-900 rounded-[2rem] p-6 border border-gray-100 dark:border-slate-700 animate-fade-in shadow-inner">
                                        <h4 className="text-[10px] md:text-xs font-black uppercase text-gray-500 mb-4 flex items-center gap-2"><i className="ph-fill ph-magic-wand text-primary"></i> Opções Inteligentes (Mesma Competência):</h4>
                                        <div className="space-y-3 max-h-56 overflow-y-auto custom-scrollbar pr-2">
                                            {findSubstitutes(selectedPerson.Nome_Profissional).map((sub, idx) => (
                                                <div key={idx} className="bg-white dark:bg-slate-800 p-4 md:p-5 rounded-2xl border border-gray-100 dark:border-slate-600 flex justify-between items-center shadow-sm card-hover">
                                                    <div>
                                                        <p className="font-black text-sm md:text-base text-gray-900 dark:text-white">{safeString(sub['Nome Completo'])}</p>
                                                        <p className="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-widest" title={safeString(sub['Horários Flexíveis'])}><i className="ph-fill ph-clock"></i> Disp: {safeString(sub['Horários Flexíveis']).substring(0,25)}</p>
                                                    </div>
                                                    <button onClick={async()=>{ 
                                                        await api.saveRecord('ESCALAS', { ...selectedPerson, ID: '', Nome_Profissional: safeString(sub['Nome Completo']), Substituindo: safeString(selectedPerson.Nome_Profissional) }, false);
                                                        showToast(`Substituto acionado: ${sub['Nome Completo']}.`); 
                                                        setSelectedPerson(null); setShowSwapSugg(false); 
                                                        onRefresh('ESCALAS');
                                                    }} className="bg-primary hover:bg-blue-700 text-white text-[10px] md:text-xs font-black px-4 py-2.5 md:px-5 md:py-3 rounded-xl transition shadow-md flex items-center gap-1">Acionar <i className="ph-bold ph-arrow-right"></i></button>
                                                </div>
                                            ))}
                                            {findSubstitutes(selectedPerson.Nome_Profissional).length === 0 && <p className="text-sm font-bold text-gray-400 text-center py-8 border-2 border-dashed rounded-2xl border-gray-200 dark:border-slate-700">Nenhum membro da equipe com esta competência está livre hoje.</p>}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                    
                    {/* Modal de Lançamento em Lote com Design Novo */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 glass-modal animate-fade-in" onMouseDown={()=>setIsModalOpen(false)}>
                            <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] w-full max-w-6xl max-h-[90vh] flex flex-col shadow-2xl animate-pop-in border border-gray-100 dark:border-slate-700 overflow-hidden" onMouseDown={e=>e.stopPropagation()}>
                                <div className="p-6 md:p-10 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center bg-gray-50/50 dark:bg-slate-900 shrink-0">
                                    <h3 className="text-2xl md:text-3xl font-black text-gray-900 dark:text-white flex items-center gap-3"><div className="w-12 h-12 bg-primary/10 text-primary rounded-2xl flex justify-center items-center"><i className="ph-fill ph-calendar-plus"></i></div> Lançar Escalas</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="w-12 h-12 bg-white dark:bg-slate-700 rounded-full hover:bg-red-500 hover:text-white shadow-sm text-xl transition flex justify-center items-center border dark:border-slate-600"><i className="ph-bold ph-x"></i></button>
                                </div>
                                <div className="p-6 md:p-10 flex flex-col lg:flex-row gap-8 md:gap-12 overflow-y-auto custom-scrollbar">
                                    <div className="lg:w-1/2">
                                        <h4 className="font-black mb-6 text-lg md:text-xl text-gray-900 dark:text-white bg-gray-50 dark:bg-slate-900 px-4 py-2 rounded-full w-max text-sm uppercase tracking-widest">1. Selecione as Datas</h4>
                                        <div className="grid grid-cols-7 gap-2 md:gap-3">
                                            {Array(firstDayOfMonth).fill(null).map((_, i) => <div key={`empty-${i}`} />)}
                                            {Array(daysInMonth).fill(null).map((_, i) => {
                                                const day = i + 1; const dStr = `${String(day).padStart(2, '0')}/${String(currentMonth.getMonth() + 1).padStart(2, '0')}/${currentMonth.getFullYear()}`; const sel = datesToSave.includes(dStr);
                                                return <button type="button" key={day} onClick={() => { if(sel) setDatesToSave(datesToSave.filter(x => x !== dStr)); else setDatesToSave([...datesToSave, dStr]); }} className={`w-full aspect-square rounded-xl md:rounded-2xl font-black text-sm md:text-lg transition-all ${sel ? 'bg-primary text-white shadow-lg shadow-blue-900/30 scale-105' : 'bg-gray-50 dark:bg-slate-800 border-2 border-gray-100 dark:border-slate-700 hover:border-primary shadow-sm text-gray-800 dark:text-white'}`}>{day}</button>
                                            })}
                                        </div>
                                    </div>
                                    <div className="lg:w-1/2">
                                        <h4 className="font-black mb-6 text-lg md:text-xl text-gray-900 dark:text-white bg-gray-50 dark:bg-slate-900 px-4 py-2 rounded-full w-max text-sm uppercase tracking-widest">2. Dados do Plantão</h4>
                                        <form id="esc-form" onSubmit={handleSaveBatch} className="space-y-6 md:space-y-8 bg-gray-50/50 dark:bg-slate-900/50 p-6 md:p-8 rounded-[2rem] border border-gray-100 dark:border-slate-700">
                                            <div><label className="block text-[10px] md:text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">Profissional / Equipe</label><select className="w-full px-5 py-4 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-600 rounded-2xl outline-none focus:ring-2 focus:ring-primary font-black text-gray-900 dark:text-white shadow-sm" value={safeString(formData.Nome_Profissional)} onChange={e => {
                                                const nome = e.target.value;
                                                const refObj = activeSubTab.includes('Médicos') ? corpoClinico.find(c => c && c.Médico === nome) : usuarios.find(u => u && u['Nome Completo'] === nome);
                                                const hInicio = refObj ? safeString(refObj['Hora Início']) : ''; const hFim = refObj ? safeString(refObj['Hora Fim']) : '';
                                                const autoHorario = hInicio && hFim ? `${hInicio} às ${hFim}` : formData.Horario;
                                                setFormData({...formData, Nome_Profissional: nome, Horario: autoHorario});
                                            }} required><option value="">Selecione na lista...</option>{activeSubTab.includes('Médicos') ? corpoClinico.map((m,i) => m && <option key={i} value={safeString(m.Médico)}>{safeString(m.Médico)}</option>) : usuarios.map((u,i) => u && <option key={i} value={safeString(u['Nome Completo'])}>{safeString(u['Nome Completo'])}</option>)}</select></div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div><label className="block text-[10px] md:text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">Turno Principal</label><select className="w-full px-5 py-4 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-600 rounded-2xl outline-none font-bold text-gray-900 dark:text-white shadow-sm" value={safeString(formData.Turno)} onChange={e => setFormData({...formData, Turno: e.target.value})}><option>Manhã</option><option>Tarde</option><option>Noite</option></select></div>
                                                <div><label className="block text-[10px] md:text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">Horário (Expediente)</label><input type="text" className="w-full px-5 py-4 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-600 rounded-2xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-900 dark:text-white shadow-sm" value={safeString(formData.Horario)} onChange={e => setFormData({...formData, Horario: e.target.value})} placeholder="Ex: 08:00 às 18:00" /></div>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div><label className="block text-[10px] md:text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">Unidade Local</label><input type="text" className="w-full px-5 py-4 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-600 rounded-2xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-900 dark:text-white shadow-sm" value={safeString(formData.Unidade)} onChange={e => setFormData({...formData, Unidade: e.target.value})} placeholder="Ex: Sede" /></div>
                                                <div><label className="block text-[10px] md:text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">Setor / Consultório</label><input type="text" className="w-full px-5 py-4 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-600 rounded-2xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-900 dark:text-white shadow-sm" value={safeString(formData.Setor_Consultorio)} onChange={e => setFormData({...formData, Setor_Consultorio: e.target.value})} placeholder="Ex: Triagem 1" /></div>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                                <div className="p-6 md:p-8 border-t border-gray-100 dark:border-slate-700 flex justify-end gap-4 bg-white dark:bg-slate-800 shrink-0">
                                    <button onClick={() => setIsModalOpen(false)} className="px-8 py-4 font-black text-gray-500 hover:text-gray-800 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-slate-700 rounded-full transition">Cancelar</button>
                                    <button type="submit" form="esc-form" disabled={loadingAction} className="px-12 py-4 bg-primary text-white font-black rounded-full shadow-xl shadow-blue-900/30 hover:-translate-y-1 transition flex items-center gap-2">{loadingAction?<i className="ph animate-spin ph-spinner text-xl"></i>:<i className="ph-bold ph-check-circle text-xl"></i>} {loadingAction?'Processando...':'Confirmar Escala'}</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // O COMPONENTE CRÍTICO: TABELA GENÉRICA
        // ==========================================
        const DataTableGeneric = ({ title, tabName, data, user, onRefresh, showToast }) => {
            const safeData = Array.isArray(data) ? data : [];
            const [isModalOpen, setIsModalOpen] = useState(false); const [formData, setFormData] = useState({}); const [loading, setLoading] = useState(false); const [search, setSearch] = useState(''); const [currentSchema, setCurrentSchema] = useState([]);
            
            let dynamicKeys = ['ID']; if (safeData.length > 0 && typeof safeData[0] === 'object' && safeData[0] !== null) dynamicKeys = Object.keys(safeData[0]);
            const schema = tabSchemas[tabName] || dynamicKeys || ['ID'];
            
            const nivelKey = user && typeof user === 'object' ? Object.keys(user).find(k => safeString(k).toLowerCase().includes('acesso')) : null;
            const canEdit = nivelKey && ['admin', 'supervisor', 'supervisão'].some(role => safeString(user[nivelKey]).toLowerCase().includes(role));
            const filteredData = safeData.filter(row => row && typeof row === 'object' && Object.values(row).some(val => safeString(val).toLowerCase().includes(search.toLowerCase())));

            const openModal = (row = null, customSchema = null) => { let initial = {}; const s = customSchema || schema; s.forEach(col => initial[col] = row ? safeString(row[col]) : ''); setFormData(initial); setCurrentSchema(s); setIsModalOpen(true); };
            const handleSave = async (e) => { e.preventDefault(); setLoading(true); const res = await api.saveRecord(tabName, formData, !!formData.ID); setLoading(false); if (res && res.success) { setIsModalOpen(false); onRefresh(tabName); showToast('Salvo com sucesso!'); } else showToast('Erro ao salvar.', 'error'); };
            const handleDelete = async (id) => { if(confirm('Excluir permanentemente?')) { const res = await api.deleteRecord(tabName, id); if (res && res.success) { onRefresh(tabName); showToast('Excluído com sucesso!'); } } };

            // Se a aba tiver um Design Especializado (Cards/Kanban), manda para eles. Se não, desenha a Tabela Limpa.
            if(tabName === 'CONVÊNIOS') return <><ConveniosMatrixView data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} schema={schema} /> {isModalOpen && <ModalForm title="Regra Convênio" schema={currentSchema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'CORPO CLINICO') return <><CorpoClinicoCards data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} openLancarEscala={()=>{}} /> {isModalOpen && <ModalForm title="Médico" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'CONTATOS') return <><ContatosViewTabs data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} schema={schema} /> {isModalOpen && <ModalForm title="Contato" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'MURAL_AVISOS') return <><MuralAvisosView data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} /> {isModalOpen && <ModalForm title="Aviso" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'BOLETINS_INFORMATIVOS') return <><BoletinsView data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} /> {isModalOpen && <ModalForm title="Mídia" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'SENHAS E LOGINS GERAIS') return <><SenhasView data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} schema={schema} /> {isModalOpen && <ModalForm title="Acesso" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;

            return (
                <div className="bg-white dark:bg-slate-800 rounded-[2rem] shadow-sm border border-gray-100 dark:border-slate-700 overflow-hidden animate-fade-in">
                    <div className="p-6 md:p-8 border-b border-gray-100 dark:border-slate-700 bg-gray-50/50 dark:bg-slate-900/50 flex flex-col md:flex-row justify-between items-center gap-4">
                        <h2 className="text-2xl font-black text-gray-900 dark:text-white flex items-center gap-3"><div className="w-2 h-6 bg-primary rounded-full"></div> {title}</h2>
                        <div className="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                            <div className="relative flex-1 sm:w-72"><i className="ph-bold ph-magnifying-glass absolute left-5 top-4 text-gray-400"></i><input type="text" placeholder="Pesquisar na tabela..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-white dark:bg-slate-900 shadow-inner border border-gray-200 dark:border-slate-700 rounded-full outline-none focus:ring-2 focus:ring-primary font-bold text-sm text-gray-800 dark:text-white" /></div>
                            {canEdit && <button onClick={() => openModal(null, schema)} className="bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-black px-8 py-3 rounded-full shadow-lg hover:-translate-y-1 transition text-sm flex items-center justify-center gap-2"><i className="ph-bold ph-plus text-lg"></i> Novo Item</button>}
                        </div>
                    </div>
                    <div className="overflow-x-auto p-4 custom-scrollbar">
                        <table className="w-full text-left border-collapse min-w-[800px]">
                            <thead><tr className="text-gray-400 text-[10px] uppercase tracking-widest border-b-2 border-gray-100 dark:border-slate-700">{schema.filter(c=>c!=='ID').map((col, i) => <th key={i} className="p-4 font-black">{col}</th>)}{canEdit && <th className="p-4 font-black text-right">Ações</th>}</tr></thead>
                            <tbody className="text-sm font-bold text-gray-800 dark:text-slate-200">
                                {filteredData.length === 0 ? <tr><td colSpan="100%" className="text-center p-20 text-gray-400 font-black text-xl border-2 border-dashed border-gray-200 dark:border-slate-700 rounded-[2rem] block m-4">Nenhum dado cadastrado nesta área.</td></tr> : 
                                filteredData.map((row, i) => (
                                    <tr key={i} className="hover:bg-blue-50/50 dark:hover:bg-slate-700/50 border-b border-gray-50 dark:border-slate-700 group transition">
                                        {schema.filter(c=>c!=='ID').map((col, j) => {
                                            const val = safeString(row[col]); const cl = col.toLowerCase();
                                            return <td key={j} className="p-4 whitespace-nowrap">{cl.includes('url')||cl.includes('foto')||cl.includes('imagem')?(val?<img src={formatImageUrl(val)} className="h-12 w-12 object-cover rounded-xl border shadow-sm"/>:<div className="h-12 w-12 bg-gray-100 dark:bg-slate-700 rounded-xl flex items-center justify-center text-gray-300"><i className="ph-fill ph-image text-xl"></i></div>):cl.includes('senha')?'••••••••':val==='Sim'||val==='Ativo'?<span className="bg-green-100 dark:bg-green-900/30 border border-green-200 dark:border-green-800 text-green-800 dark:text-green-300 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest">{val}</span>:val==='Não'||val==='Inativo'?<span className="bg-red-100 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-800 dark:text-red-300 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest">{val}</span>:val||'-'}</td>
                                        })}
                                        {canEdit && <td className="p-4 flex justify-end gap-2 opacity-50 group-hover:opacity-100 transition"><button onClick={()=>openModal(row, schema)} className="text-blue-600 bg-blue-50 dark:bg-blue-900/30 p-3 rounded-xl hover:bg-blue-600 hover:text-white shadow-sm"><i className="ph-bold ph-pencil-simple text-lg"></i></button><button onClick={()=>handleDelete(row.ID)} className="text-red-600 bg-red-50 dark:bg-red-900/30 p-3 rounded-xl hover:bg-red-600 hover:text-white shadow-sm"><i className="ph-bold ph-trash text-lg"></i></button></td>}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {isModalOpen && <ModalForm title={title} schema={currentSchema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null); const [loading, setLoading] = useState(true); const [activeTab, setActiveTab] = useState('Home'); const [sheetData, setSheetData] = useState({}); const [darkMode, setDarkMode] = useState(false); const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            const [loginView, setLoginView] = useState('selecao'); const [loginErrorMsg, setLoginErrorMsg] = useState(''); const [isSharedAuth, setIsSharedAuth] = useState(localStorage.getItem('shared_auth') === 'true');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const SENHA_ACESSO_GERAL = "Csv@123"; 

            const userFoto = user?.Foto_Perfil_URL;
            const userName = user?.['Nome Completo'] || (isSharedAuth ? 'Equipe São Vicente' : 'Usuário');

            const nivelKey = user && typeof user === 'object' ? Object.keys(user).find(k => safeString(k).toLowerCase().includes('acesso')) : null;
            const isAdmin = user && nivelKey && ['admin', 'supervisor', 'supervisão'].some(role => safeString(user[nivelKey]).toLowerCase().includes(role));

            useEffect(() => {
                const unsub = auth?.onAuthStateChanged(async (u) => {
                    if (u && !isSharedAuth) {
                        try {
                            const userDoc = await db.collection('USUARIOS').where('E-mail', '==', u.email).get();
                            if (!userDoc.empty) setUser({ ID: userDoc.docs[0].id, ...userDoc.docs[0].data() });
                            else setUser({ 'E-mail': u.email, 'Nome Completo': u.email.split('@')[0], 'Nível de Acesso': 'Admin' });
                        } catch (err) { setUser({ 'E-mail': u.email, 'Nome Completo': u.email.split('@')[0], 'Nível de Acesso': 'Admin' }); }
                    } else {
                        if(isSharedAuth) setUser({ 'Nome Completo': 'Equipe São Vicente', 'Nível de Acesso': 'Colaborador' });
                        else setUser(null);
                    }
                    setLoading(false);
                });
                return () => unsub && unsub();
            }, [isSharedAuth]);
                    
            const showToast = (msg, type = 'success') => { setToast({ show: true, message: msg, type }); setTimeout(() => setToast(p => ({ ...p, show: false })), 3500); };

            useEffect(() => {
                if (darkMode) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } 
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            }, [darkMode]);

            useEffect(() => {
                const init = async () => { if(!isFirebaseConfigured) return; const allData = await api.fetchAll(); if(allData && Object.keys(allData).length > 0) setSheetData(allData); }; init();
            }, []);

            const loadData = async (tab) => {
                setLoading(true);
                if (tab === 'Home') {
                    const [news, atend, lembretes, mural] = await Promise.all([api.fetch('NOVIDADES_E_EVENTOS'), api.fetch('CONTROLE_ATENDIMENTOS'), api.fetch('LEMBRETES_HORA'), api.fetch('MURAL_AVISOS')]);
                    setSheetData(prev => ({ ...prev, 'NOVIDADES_E_EVENTOS': news, 'CONTROLE_ATENDIMENTOS': atend, 'LEMBRETES_HORA': lembretes, 'MURAL_AVISOS': mural }));
                } else if (tab === 'ESCALAS') {
                    const [escala, medicos, u, cont] = await Promise.all([api.fetch('ESCALAS'), api.fetch('CORPO CLINICO'), api.fetch('USUARIOS'), api.fetch('CONTROLE_ATENDIMENTOS')]);
                    setSheetData(prev => ({ ...prev, 'ESCALAS': escala, 'CORPO CLINICO': medicos, 'USUARIOS': u, 'CONTROLE_ATENDIMENTOS': cont }));
                } else {
                    const data = await api.fetch(tab); setSheetData(prev => ({ ...prev, [tab]: data }));
                }
                setLoading(false);
            };

            if (!user) {
                const handleFirebaseLogin = async (e) => {
                    e.preventDefault(); setLoading(true); setLoginErrorMsg('');
                    localStorage.setItem('shared_auth', 'false'); setIsSharedAuth(false);
                    const res = await api.login(e.target.email.value, e.target.password.value);
                    if (res && res.success) { setUser(res.user); loadData('Home'); } 
                    else { setLoginErrorMsg(res?.message || 'Erro ao conectar.'); }
                    setLoading(false);
                };

                const handleSharedLogin = (e) => {
                    e.preventDefault(); setLoginErrorMsg('');
                    if (e.target.shared_password.value === SENHA_ACESSO_GERAL) {
                        auth?.signOut(); localStorage.setItem('shared_auth', 'true'); setIsSharedAuth(true); setUser({ 'Nome Completo': 'Equipe São Vicente', 'Nível de Acesso': 'Colaborador' }); loadData('Home');
                    } else { setLoginErrorMsg('Senha incorreta.'); }
                };

                return (
                    <div className="min-h-screen bg-blue-50 dark:bg-slate-900 flex flex-col items-center justify-center p-4 selection:bg-primary selection:text-white">
                        <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col md:flex-row animate-fade-in border border-blue-100 dark:border-slate-700">
                            <div className="md:w-5/12 bg-gradient-to-br from-primary to-blue-800 text-white p-10 md:p-12 flex flex-col justify-center relative">
                                <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                                <div className="relative z-10 text-center">
                                    <div className="w-24 h-24 md:w-28 md:h-28 mx-auto bg-white/10 rounded-[2rem] flex items-center justify-center mb-6 backdrop-blur-sm shadow-xl border border-white/20"><i className="ph-fill ph-heartbeat text-6xl md:text-7xl animate-pulse-fast"></i></div>
                                    <h1 className="text-3xl md:text-4xl font-black mb-4 tracking-tight drop-shadow-md">São Vicente</h1>
                                    <p className="text-blue-100 font-bold text-xs md:text-sm">Portal Interno Inteligente</p>
                                </div>
                            </div>
                            <div className="md:w-7/12 p-8 md:p-12 bg-white dark:bg-slate-800 flex flex-col justify-center">
                                {loginErrorMsg && <div className="mb-6 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 p-4 rounded-xl flex gap-3 items-start animate-pop-in"><i className="ph-fill ph-warning-circle text-red-600 dark:text-red-400 text-xl shrink-0 mt-0.5"></i><p className="text-sm font-bold text-red-800 dark:text-red-200 leading-tight">{loginErrorMsg}</p></div>}
                                
                                {loginView === 'selecao' && (
                                    <div className="space-y-4 md:space-y-6 animate-fade-in">
                                        <h2 className="text-xl md:text-2xl font-black text-gray-800 dark:text-white mb-6 md:mb-8 text-center md:text-left">Selecione seu acesso:</h2>
                                        
                                        <button onClick={()=>setLoginView('geral')} className="w-full bg-blue-50 hover:bg-primary dark:bg-slate-700 dark:hover:bg-primary group p-5 md:p-6 rounded-[1.5rem] border-2 border-blue-100 dark:border-slate-600 hover:border-primary transition-all flex items-center gap-4 md:gap-6 text-left shadow-sm hover:shadow-xl hover:-translate-y-1">
                                            <div className="w-14 h-14 md:w-16 md:h-16 rounded-2xl bg-white dark:bg-slate-800 text-primary flex justify-center items-center shrink-0 shadow-inner group-hover:scale-110 transition"><i className="ph-fill ph-users text-2xl md:text-3xl"></i></div>
                                            <div><h3 className="font-black text-lg md:text-xl text-gray-900 dark:text-white group-hover:text-white transition">Equipe / Colaboradores</h3><p className="text-xs md:text-sm text-gray-500 dark:text-gray-400 group-hover:text-blue-100 transition mt-1 font-medium">Acesso rápido a escalas e ramais.</p></div>
                                        </button>

                                        <button onClick={()=>setLoginView('supervisor')} className="w-full bg-orange-50 hover:bg-secondary dark:bg-slate-700 dark:hover:bg-secondary group p-5 md:p-6 rounded-[1.5rem] border-2 border-orange-100 dark:border-slate-600 hover:border-secondary transition-all flex items-center gap-4 md:gap-6 text-left shadow-sm hover:shadow-xl hover:-translate-y-1">
                                            <div className="w-14 h-14 md:w-16 md:h-16 rounded-2xl bg-white dark:bg-slate-800 text-secondary flex justify-center items-center shrink-0 shadow-inner group-hover:scale-110 transition"><i className="ph-fill ph-shield-star text-2xl md:text-3xl"></i></div>
                                            <div><h3 className="font-black text-lg md:text-xl text-gray-900 dark:text-white group-hover:text-white transition">Supervisão / Gestão</h3><p className="text-xs md:text-sm text-gray-500 dark:text-gray-400 group-hover:text-orange-100 transition mt-1 font-medium">Painel de edição e controle de equipe.</p></div>
                                        </button>

                                        <div className="pt-6 text-center"><button onClick={()=>setLoginView('admin')} className="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-primary transition underline decoration-dashed underline-offset-4">Acesso Administrativo</button></div>
                                    </div>
                                )}
                                
                                {loginView === 'geral' && (
                                    <form onSubmit={handleSharedLogin} className="space-y-6 animate-fade-in">
                                        <button type="button" onClick={()=>{setLoginView('selecao'); setLoginErrorMsg('');}} className="text-gray-400 hover:text-primary flex items-center gap-2 mb-4 md:mb-6 font-bold text-sm bg-gray-50 dark:bg-slate-700 px-4 py-2 rounded-full w-max transition"><i className="ph-bold ph-arrow-left"></i> Voltar</button>
                                        <h2 className="text-2xl font-black text-gray-800 dark:text-white mb-1">Acesso da Equipe</h2>
                                        <p className="text-sm text-gray-500 font-medium mb-8">Digite a senha geral fornecida pela coordenação.</p>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Senha Única</label><div className="relative"><i className="ph-fill ph-lock-key absolute left-6 top-4.5 text-gray-400 text-xl"></i><input name="shared_password" type="password" className="w-full pl-16 pr-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-full outline-none focus:ring-2 focus:ring-primary font-black text-gray-900 dark:text-white transition shadow-inner" placeholder="Sua senha..." required /></div></div>
                                        <button type="submit" disabled={loading} className="w-full bg-primary hover:opacity-90 text-white font-black py-4 md:py-5 rounded-full shadow-xl shadow-blue-900/30 hover:-translate-y-1 hover:scale-105 transition transform flex justify-center items-center gap-2 text-lg">{loading?<i className="ph animate-spin ph-spinner text-2xl"></i>:<i className="ph-bold ph-sign-in text-2xl"></i>} {loading?'Verificando...':'Entrar no Portal'}</button>
                                    </form>
                                )}

                                {(loginView === 'supervisor' || loginView === 'admin') && (
                                    <form onSubmit={handleFirebaseLogin} className="space-y-6 animate-fade-in">
                                        <button type="button" onClick={()=>{setLoginView('selecao'); setLoginErrorMsg('');}} className="text-gray-400 hover:text-primary flex items-center gap-2 mb-4 md:mb-6 font-bold text-sm bg-gray-50 dark:bg-slate-700 px-4 py-2 rounded-full w-max transition"><i className="ph-bold ph-arrow-left"></i> Voltar</button>
                                        <h2 className="text-2xl font-black text-gray-800 dark:text-white mb-1">Acesso {loginView === 'admin' ? 'Administrador' : 'Gestão'}</h2>
                                        <p className="text-sm text-gray-500 font-medium mb-8">Faça login com suas credenciais do Firebase.</p>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">E-mail</label><div className="relative"><i className="ph-fill ph-user absolute left-6 top-4.5 text-gray-400 text-xl"></i><input name="email" type="email" className="w-full pl-16 pr-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-full outline-none focus:ring-2 focus:ring-primary font-bold text-gray-900 dark:text-white transition shadow-inner" required /></div></div>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Senha</label><div className="relative"><i className="ph-fill ph-lock-key absolute left-6 top-4.5 text-gray-400 text-xl"></i><input name="password" type="password" className="w-full pl-16 pr-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-full outline-none focus:ring-2 focus:ring-primary font-bold text-gray-900 dark:text-white transition shadow-inner" required /></div></div>
                                        <button type="submit" disabled={loading} className={`w-full ${loginView === 'admin' ? 'bg-gray-900 dark:bg-white dark:text-gray-900 shadow-gray-900/30' : 'bg-secondary shadow-orange-900/30'} hover:opacity-90 text-white font-black py-4 md:py-5 rounded-full shadow-xl hover:-translate-y-1 hover:scale-105 transition transform flex justify-center items-center gap-2 text-lg`}>{loading?<i className="ph animate-spin ph-spinner text-2xl"></i>:<i className="ph-bold ph-shield-check text-2xl"></i>} {loading ? 'Conectando...' : 'Acessar Painel'}</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            const menus = [
                { id: 'Home', icon: 'ph-house', label: 'Dashboard' },
                { id: 'MURAL_AVISOS', icon: 'ph-presentation-chart', label: 'Avisos' },
                { id: 'BOLETINS_INFORMATIVOS', icon: 'ph-newspaper', label: 'Boletins/Mídia' },
                { id: 'ESCALAS', icon: 'ph-calendar-check', label: 'Painel Escalas' },
                { id: 'CONVÊNIOS', icon: 'ph-file-text', label: 'Convênios' },
                { id: 'CORPO CLINICO', icon: 'ph-stethoscope', label: 'Corpo Clínico' },
                { id: 'CONTATOS', icon: 'ph-address-book', label: 'Contatos' },
                { id: 'CHAT_MENSAGENS', icon: 'ph-chat-circle-dots', label: 'Chat Interno' },
                { id: 'EXAMES DE IMAGEM', icon: 'ph-bone', label: 'Exames Imagem' },
                { id: 'EXAMES DE IMAGEM E OUTROS', icon: 'ph-files', label: 'Laudos' },
                { id: 'CONSULTA E PROCEDIMENTOS', icon: 'ph-first-aid-kit', label: 'Consultas' },
                { id: 'EXAMES LABORATORIAIS', icon: 'ph-flask', label: 'Laboratório' },
                { id: 'INSTITUTOS', icon: 'ph-buildings', label: 'Institutos' },
                { id: 'REMOÇÕES', icon: 'ph-car', label: 'Remoções' },
                { id: 'SENHAS E LOGINS GERAIS', icon: 'ph-lock-key', label: 'Senhas' }
            ];
            const adminMenus = [ { id: 'CONTROLE_ATENDIMENTOS', icon: 'ph-chart-line-up', label: 'Metas Unimed' }, { id: 'USUARIOS', icon: 'ph-users', label: 'Equipe' } ];

            const foundMenu = menus.concat(adminMenus).find(m => m.id === activeTab);
            const titleTab = foundMenu ? foundMenu.label : activeTab;

            return (
                <div className={`min-h-screen flex flex-col md:flex-row overflow-hidden relative selection:bg-primary selection:text-white ${darkMode ? 'dark bg-slate-900 text-slate-100' : 'bg-gray-50 text-gray-800'}`}>
                    
                    {toast.show && <div className={`fixed bottom-4 md:bottom-8 right-4 md:right-8 z-[9999] px-6 md:px-8 py-4 md:py-5 rounded-2xl shadow-2xl text-white font-black text-sm md:text-lg animate-slide-up flex items-center gap-3 ${toast.type==='error'?'bg-red-500':'bg-green-500'}`}><i className={`ph-bold ${toast.type==='error'?'ph-warning-circle':'ph-check-circle'} text-2xl`}></i> {toast.message}</div>}

                    <div className="md:hidden bg-primary text-white p-4 flex justify-between items-center z-40 shadow-lg relative">
                        <div className="flex items-center gap-2 font-black text-xl"><i className="ph-fill ph-heartbeat text-2xl"></i> Portal SV</div>
                        <div className="flex gap-2">
                            <button onClick={()=>setDarkMode(!darkMode)} className="text-2xl p-2 bg-white/10 rounded-xl"><i className={`ph-fill ${darkMode ? 'ph-sun' : 'ph-moon'}`}></i></button>
                            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-3xl p-2 bg-white/10 rounded-xl"><i className={`ph-bold ${isMobileMenuOpen ? 'ph-x' : 'ph-list'}`}></i></button>
                        </div>
                    </div>

                    {isMobileMenuOpen && <div className="fixed inset-0 bg-black/60 z-40 md:hidden backdrop-blur-sm animate-fade-in" onClick={() => setIsMobileMenuOpen(false)}></div>}

                    <aside className={`fixed inset-y-0 left-0 w-72 md:w-[320px] bg-white dark:bg-slate-800 border-r border-gray-100 dark:border-slate-700 flex flex-col h-screen shrink-0 shadow-2xl z-50 transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 transition-transform duration-400 ease-out`}>
                        <div className="p-6 md:p-8 flex items-center justify-between border-b border-gray-50 dark:border-slate-700 bg-gray-50/30 dark:bg-slate-900/30 cursor-pointer hover:bg-gray-100 dark:hover:bg-slate-700 transition" onClick={()=>{setActiveTab('Home'); setIsMobileMenuOpen(false);}}>
                            <div className="flex items-center">
                                <div className="bg-primary text-white p-3 rounded-[1rem] mr-4 shadow-lg"><i className="ph-fill ph-heartbeat text-3xl animate-pulse-fast"></i></div>
                                <div><h1 className="text-2xl font-black leading-none tracking-tight text-gray-900 dark:text-white">Portal SV</h1><span className="text-[9px] font-black text-primary uppercase tracking-widest">São Vicente</span></div>
                            </div>
                            <button onClick={(e)=>{e.stopPropagation(); setDarkMode(!darkMode)}} className="hidden md:flex text-gray-400 hover:text-primary text-2xl bg-gray-100 dark:bg-slate-700 p-2.5 rounded-xl transition hover:scale-110 shadow-inner"><i className={`ph-fill ${darkMode ? 'ph-sun' : 'ph-moon'}`}></i></button>
                        </div>
                        <div className="p-6 border-b border-gray-50 dark:border-slate-700 flex items-center gap-4 bg-white dark:bg-slate-800 relative overflow-hidden">
                            {userFoto ? <img src={formatImageUrl(userFoto)} className="w-14 h-14 rounded-[1rem] object-cover shadow-md shrink-0 border-2 border-white dark:border-slate-600 relative z-10" alt="Avatar" /> : <div className="w-14 h-14 rounded-[1rem] bg-gradient-to-tr from-secondary to-orange-400 flex items-center justify-center text-white font-black text-2xl shadow-lg shrink-0 relative z-10">{safeString(userName || 'U').charAt(0).toUpperCase()}</div>}
                            <div className="flex-1 overflow-hidden relative z-10">
                                <p className="text-base font-black truncate text-gray-900 dark:text-white">{userName}</p>
                                <p className="text-[9px] font-black text-primary bg-primary/10 px-2.5 py-1 rounded-md inline-block mt-1 uppercase tracking-widest">{isAdmin?'Gestão Admin':'Colaborador'}</p>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-1.5 custom-scrollbar pb-8">
                            <div className="px-4 mb-3 mt-2 text-[9px] font-black text-gray-400 uppercase tracking-widest">Menu Principal</div>
                            {menus.map(m => <button key={m.id} onClick={()=>{setActiveTab(m.id); loadData(m.id); setIsMobileMenuOpen(false);}} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl text-sm font-black transition-all ${activeTab===m.id?'bg-primary text-white shadow-lg shadow-blue-900/20 md:scale-[1.02] translate-x-1':'text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-slate-700'}`}><i className={`ph-fill ${m.icon} text-xl`}></i> {m.label}</button>)}
                            
                            {isAdmin && (
                                <>
                                    <div className="px-4 mt-8 mb-3 text-[9px] font-black text-gray-400 uppercase tracking-widest">Avançado</div>
                                    {adminMenus.map(m => <button key={m.id} onClick={()=>{setActiveTab(m.id); loadData(m.id); setIsMobileMenuOpen(false);}} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl text-sm font-black transition-all ${activeTab===m.id?'bg-gray-900 dark:bg-white text-white dark:text-gray-900 shadow-lg md:scale-[1.02] translate-x-1':'text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-slate-700'}`}><i className={`ph-fill ${m.icon} text-xl`}></i> {m.label}</button>)}
                                </>
                            )}
                            <button onClick={()=>{auth?.signOut(); localStorage.removeItem('shared_auth'); setIsSharedAuth(false); setUser(null);}} className="w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-sm font-black text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 mt-10 transition"><i className="ph-fill ph-sign-out text-xl"></i> Encerrar Sessão</button>
                        </div>
                    </aside>

                    <main className="flex-1 h-[calc(100vh-76px)] md:h-screen overflow-y-auto relative custom-scrollbar p-4 md:p-10 pt-6 md:pt-10">
                        <ErrorBoundary>
                            {loading && <div className="fixed inset-0 bg-white/70 dark:bg-slate-900/70 backdrop-blur z-40 flex items-center justify-center"><div className="w-14 h-14 border-4 border-primary border-t-transparent rounded-full animate-spin shadow-2xl"></div></div>}

                            {/* POPUP UNIMED EXCLUSIVO DA TELA HOME */}
                            {activeTab === 'Home' && !loading && Array.isArray(sheetData['CONTROLE_ATENDIMENTOS']) && sheetData['CONTROLE_ATENDIMENTOS'].filter(a => Number(a.Limite_Max||0) > 0 && (Number(a.Qtd_Atual||0)/Number(a.Limite_Max||1)) >= 0.9).length > 0 && (
                                <div className="bg-red-600 rounded-[2rem] p-6 md:p-8 text-white shadow-2xl shadow-red-900/30 mb-8 animate-pop-in relative overflow-hidden border-4 border-red-700">
                                    <i className="ph-fill ph-warning-circle absolute -right-10 -bottom-10 text-[10rem] opacity-20"></i>
                                    <div className="relative z-10">
                                        <h3 className="text-2xl md:text-3xl font-black mb-6 flex items-center gap-3"><i className="ph-fill ph-bell-ringing animate-pulse"></i> Alerta Crítico: Limites Unimed</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            {sheetData['CONTROLE_ATENDIMENTOS'].filter(a => Number(a.Limite_Max||0) > 0 && (Number(a.Qtd_Atual||0)/Number(a.Limite_Max||1)) >= 0.9).map((a, i) => {
                                                const qtd = Number(a.Qtd_Atual || 0); const max = Number(a.Limite_Max || 1); const perc = (qtd / max) * 100;
                                                return (
                                                    <div key={i} className="bg-white/10 p-6 rounded-3xl border border-white/20 backdrop-blur-sm">
                                                        <span className="font-black text-xl block mb-4">{safeString(a.Profissional)}</span>
                                                        <div className="w-full bg-black/20 rounded-full h-3 mb-4 overflow-hidden"><div className="h-3 rounded-full bg-white shadow-[0_0_10px_white]" style={{width: `${Math.min(perc, 100)}%`}}></div></div>
                                                        <p className="text-4xl font-black leading-none">{qtd} <span className="text-lg opacity-70">/ {max}</span></p>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'Home' && !loading && (
                                <div className="space-y-8 animate-fade-in max-w-[1400px] mx-auto">
                                    <ClockWidget lembretesData={sheetData['LEMBRETES_HORA']} />
                                    <div>
                                        <h3 className="text-xl md:text-2xl font-black mb-6 text-gray-900 dark:text-white px-2">Acesso Rápido</h3>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4 md:gap-6">
                                            {[ { l: 'Mural', i: 'ph-presentation-chart', bg:'bg-blue-50 dark:bg-blue-900/30 border-blue-100 dark:border-blue-800', c:'text-blue-600 dark:text-blue-400', t: 'MURAL_AVISOS' }, { l: 'Painel', i: 'ph-kanban', bg:'bg-orange-50 dark:bg-orange-900/30 border-orange-100 dark:border-orange-800', c:'text-orange-600 dark:text-orange-400', t: 'ESCALAS' }, { l: 'Boletins', i: 'ph-newspaper', bg:'bg-purple-50 dark:bg-purple-900/30 border-purple-100 dark:border-purple-800', c:'text-purple-600 dark:text-purple-400', t: 'BOLETINS_INFORMATIVOS' }, { l: 'Consultas', i: 'ph-stethoscope', bg:'bg-indigo-50 dark:bg-indigo-900/30 border-indigo-100 dark:border-indigo-800', c:'text-indigo-600 dark:text-indigo-400', t: 'CONSULTA E PROCEDIMENTOS' }, { l: 'Imagem', i: 'ph-bone', bg:'bg-green-50 dark:bg-green-900/30 border-green-100 dark:border-green-800', c:'text-green-600 dark:text-green-400', t: 'EXAMES DE IMAGEM' }, { l: 'Senhas', i: 'ph-lock-key', bg:'bg-red-50 dark:bg-red-900/30 border-red-100 dark:border-red-800', c:'text-red-600 dark:text-red-400', t: 'SENHAS E LOGINS GERAIS' } ].map((d, i) => (
                                                <button key={i} onClick={()=>{setActiveTab(d.t);loadData(d.t)}} className={`${d.bg} ${d.c} p-5 md:p-8 rounded-[1.5rem] md:rounded-[2rem] flex flex-col items-center justify-center gap-4 card-hover shadow-sm border-2`}>
                                                    <i className={`ph-fill ${d.i} text-4xl md:text-5xl drop-shadow-sm`}></i><span className="font-black text-[10px] md:text-xs text-center uppercase tracking-widest">{d.l}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'EXAMES DE IMAGEM' && !loading && <GenericCardView data={sheetData['EXAMES DE IMAGEM']} canEdit={canEdit} openModal={(row, s)=>setSheetData(p=>({...p, __modal: {tab: activeTab, row: row, sch: s}}))} handleDelete={(id)=>api.deleteRecord(activeTab, id)} schema={tabSchemas[activeTab]} titleField="Nome do Exame" descField="Observações" extraField="Categoria" title="Exame de Imagem" />}
                            {activeTab === 'EXAMES DE IMAGEM E OUTROS' && !loading && <GenericCardView data={sheetData['EXAMES DE IMAGEM E OUTROS']} canEdit={canEdit} openModal={(row, s)=>setSheetData(p=>({...p, __modal: {tab: activeTab, row: row, sch: s}}))} handleDelete={(id)=>api.deleteRecord(activeTab, id)} schema={tabSchemas[activeTab]} titleField="Descrição" descField="Onde Encontrar" extraField="Prazo de Laudo" title="Exame/Laudo" />}
                            {activeTab === 'CONSULTA E PROCEDIMENTOS' && !loading && <GenericCardView data={sheetData['CONSULTA E PROCEDIMENTOS']} canEdit={canEdit} openModal={(row, s)=>setSheetData(p=>({...p, __modal: {tab: activeTab, row: row, sch: s}}))} handleDelete={(id)=>api.deleteRecord(activeTab, id)} schema={tabSchemas[activeTab]} titleField="Consulta/Procedimento" descField="Descrição" extraField="Valor Particular" title="Consulta/Proc." />}
                            {activeTab === 'EXAMES LABORATORIAIS' && !loading && <GenericCardView data={sheetData['EXAMES LABORATORIAIS']} canEdit={canEdit} openModal={(row, s)=>setSheetData(p=>({...p, __modal: {tab: activeTab, row: row, sch: s}}))} handleDelete={(id)=>api.deleteRecord(activeTab, id)} schema={tabSchemas[activeTab]} titleField="Procedimento" descField="Preparo" extraField="Prazo de Liberação" title="Lab." />}
                            {activeTab === 'REMOÇÕES' && !loading && <GenericCardView data={sheetData['REMOÇÕES']} canEdit={canEdit} openModal={(row, s)=>setSheetData(p=>({...p, __modal: {tab: activeTab, row: row, sch: s}}))} handleDelete={(id)=>api.deleteRecord(activeTab, id)} schema={tabSchemas[activeTab]} titleField="Nome do Hospital/Clínica" descField="Informações Importantes" extraField="Contato" title="Remoção" />}
                            {activeTab === 'INSTITUTOS' && !loading && <InstitutosView data={sheetData['INSTITUTOS']} canEdit={canEdit} openModal={(row, s)=>setSheetData(p=>({...p, __modal: {tab: activeTab, row: row, sch: s}}))} handleDelete={(id)=>api.deleteRecord(activeTab, id)} schema={tabSchemas[activeTab]} />}
                            {activeTab === 'CHAT_MENSAGENS' && !loading && <ChatModerno chatData={sheetData['CHAT_MENSAGENS']} user={user} onSaveChat={api.saveRecord} onRefresh={()=>loadData('CHAT_MENSAGENS')} />}
                            {activeTab === 'ESCALAS' && !loading && <EscalasContainer sheetData={sheetData} user={user} onRefresh={()=>loadData('ESCALAS')} showToast={showToast} />}

                            {['CONVÊNIOS', 'CORPO CLINICO', 'CONTATOS', 'MURAL_AVISOS', 'BOLETINS_INFORMATIVOS', 'SENHAS E LOGINS GERAIS', 'CONTROLE_ATENDIMENTOS', 'USUARIOS', 'LEMBRETES_HORA'].includes(activeTab) && !loading && (
                                <DataTableGeneric title={titleTab} tabName={activeTab} data={sheetData[activeTab] || []} user={user} onRefresh={()=>loadData(activeTab)} showToast={showToast} />
                            )}

                            {sheetData.__modal && (
                                <ModalForm title={sheetData.__modal.tab} schema={sheetData.__modal.sch || tabSchemas[sheetData.__modal.tab]} formData={sheetData.__modal.row || {}} setFormData={(nd)=>setSheetData(p=>({...p, __modal: {...p.__modal, row: nd}}))} onSave={async (e)=>{e.preventDefault(); setLoading(true); await api.saveRecord(sheetData.__modal.tab, sheetData.__modal.row, !!sheetData.__modal.row.ID); setSheetData(p=>({...p, __modal: null})); loadData(sheetData.__modal.tab); showToast('Salvo com sucesso!');}} onClose={()=>setSheetData(p=>({...p, __modal: null}))} loading={loading} />
                            )}
                        </ErrorBoundary>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
