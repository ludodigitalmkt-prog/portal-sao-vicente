    <link rel="manifest" href="manifest.json">

    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        const VERSAO_ATUAL = "9.0.0"; // Correção canEdit, isFirebaseConfigured, Design Leve e Popup Unimed
        if (window.location.search.indexOf('v=' + VERSAO_ATUAL) === -1) {
            localStorage.clear(); sessionStorage.clear();
            window.location.replace(window.location.pathname + (window.location.pathname.indexOf('?') === -1 ? '?' : '&') + 'v=' + VERSAO_ATUAL);
        }
    </script>

    <title>Portal São Vicente</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: { extend: { colors: { primary: '#1E40AF', secondary: '#F97316', medical: '#E0F2FE' }, fontFamily: { sans: ['Inter', 'sans-serif'] }, borderRadius: { 'custom': '2rem' }, animation: { 'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite', 'fade-in': 'fadeIn 0.4s ease-out', 'pop-in': 'popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards', 'bounce-slight': 'bounceSlight 2s infinite ease-in-out' }, keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }, popIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } }, bounceSlight: { '0%, 100%': { transform: 'translateY(-10%)' }, '50%': { transform: 'translateY(0)' } } } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; transition: background-color 0.3s ease, color 0.3s ease; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        body.dark { background-color: #0f172a; } 
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Retorno da Leveza: Hover suave e Sombras fluidas */
        .card-hover { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 2rem; cursor: pointer; }
        .card-hover:hover { transform: translateY(-8px) scale(1.01); z-index: 10; box-shadow: 0 25px 30px -5px rgba(30, 64, 175, 0.1), 0 15px 15px -10px rgba(30, 64, 175, 0.05); border-color: #1E40AF; }
        
        .glass-modal { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); }
        .dark .glass-modal { background: rgba(15, 23, 42, 0.85); }
        .custom-scrollbar { overflow-y: auto; }
        
        .matrix-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .matrix-table th { padding: 1.5rem; color: white; font-weight: 900; text-transform: uppercase; font-size: 0.85rem; text-align: center; border: none; }
        .matrix-table th:first-child { border-radius: 1.5rem 0 0 1.5rem; background-color: #1e293b; text-align: left; position: sticky; left: 0; z-index: 30; }
        .matrix-table th:last-child { border-radius: 0 1.5rem 1.5rem 0; }
        .matrix-row { background-color: #ffffff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: transform 0.3s ease, box-shadow 0.3s ease; position: relative; border-radius: 1.5rem; }
        .matrix-row:hover { transform: translateY(-4px) scale(1.01); box-shadow: 0 15px 25px -5px rgba(0,0,0,0.1); z-index: 20; }
        .dark .matrix-row { background-color: #1e293b; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        .matrix-row td { padding: 1.2rem; text-align: center; vertical-align: middle; border: none; }
        .matrix-row td:first-child { background-color: #1e293b; color: white; font-weight: bold; border-radius: 1.5rem 0 0 1.5rem; text-align: left; position: sticky; left: 0; z-index: 20; border-left: 6px solid #1E40AF; }
        .matrix-row td:last-child { border-radius: 0 1.5rem 1.5rem 0; }
    </style>
</head>
<body class="text-gray-800 dark:text-slate-100">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, Component } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyArUJk5o90YfmMqRZl2kBaFfvRXFZcW3cE",
            authDomain: "portal-sao-vicente.firebaseapp.com",
            projectId: "portal-sao-vicente",
            storageBucket: "portal-sao-vicente.firebasestorage.app",
            messagingSenderId: "52988900084",
            appId: "1:52988900084:web:9f5f2d494c22b10eb2a4a1"
        };

        // 🛑 CORREÇÃO 1: Variável Global Ativada
        const isFirebaseConfigured = firebaseConfig.apiKey !== "" && !firebaseConfig.apiKey.includes("AIzaSySuaChave");
        let db = null; let auth = null;

        if (isFirebaseConfigured) {
            try {
                if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
                db = firebase.firestore();
                db.enablePersistence({ synchronizeTabs: true }).catch(function(err) {});
                auth = firebase.auth();
            } catch (error) { console.error("Erro Firebase:", error); }
        }

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, erroInfo: "" }; }
            static getDerivedStateFromError(error) { return { hasError: true, erroInfo: String(error) }; }
            render() {
                if (this.state.hasError) return (
                    <div className="p-10 text-center flex flex-col items-center justify-center min-h-screen bg-gray-50">
                        <i className="ph-fill ph-warning-circle text-6xl text-red-500 mb-4 animate-bounce-slight"></i>
                        <h2 className="text-3xl font-black text-gray-800 mb-2">Aviso do Sistema</h2>
                        <p className="text-gray-500 mb-6 max-w-md">Ocorreu um pequeno erro de renderização ({this.state.erroInfo}). Clique abaixo para voltar.</p>
                        <button onClick={()=>window.location.reload()} className="bg-primary text-white px-10 py-4 rounded-full font-black shadow-xl hover:-translate-y-1 transition">Recarregar Portal</button>
                    </div>
                );
                return this.props.children; 
            }
        }

        const safeString = (val) => (val === null || val === undefined) ? '' : String(val);
        const formatDateForInput = (val) => { const s = safeString(val).trim(); if (s.includes('/')) { const parts = s.split('/'); if (parts.length === 3 && parts[2].length === 4) return `${parts[2]}-${parts[1]}-${parts[0]}`; } return s; };
        const formatImageUrl = (url) => { const str = safeString(url).trim(); if (!str) return ''; if (str.includes('drive.google.com')) { const match = str.match(/\/d\/([a-zA-Z0-9_-]+)/) || str.match(/id=([a-zA-Z0-9_-]+)/) || str.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if (match && match[1]) return `https://drive.google.com/uc?export=view&id=${match[1]}`; } return str; };
        const getEmbedUrl = (url) => { const str = safeString(url).trim(); if (str.includes('youtube.com/watch')) return str.replace('watch?v=', 'embed/'); if (str.includes('youtu.be/')) return str.replace('youtu.be/', 'youtube.com/embed/'); if (str.includes('drive.google.com')) { const match = str.match(/\/d\/([a-zA-Z0-9_-]+)/) || str.match(/id=([a-zA-Z0-9_-]+)/) || str.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if (match && match[1]) return `https://drive.google.com/file/d/${match[1]}/preview`; } return str; };
        
        const isPastEnd = (horaFimStr) => {
            const str = safeString(horaFimStr); if(!str) return false;
            const match = str.match(/(\d{2}):(\d{2})/g);
            if (match && match.length > 0) {
                const endTime = match[match.length - 1]; const [hours, mins] = endTime.split(':').map(Number); const now = new Date();
                if (now.getHours() > hours || (now.getHours() === hours && now.getMinutes() >= mins)) return true;
            }
            return false;
        };

        const tabSchemas = {
            'CONVÊNIOS': ['ID', 'Código', 'Procedimento'], 
            'CORPO CLINICO': ['ID', 'Médico', 'Especialidade', 'Segmento', 'Código UNIMED', 'CRM', 'CBO', 'Cor_Selo', 'Foto_URL'], 
            'EXAMES DE IMAGEM': ['ID', 'Categoria', 'Código', 'Nome do Exame', 'Profissionais', 'Idade Permitida', 'Observações', 'Imagem_URL'],
            'EXAMES DE IMAGEM E OUTROS': ['ID', 'Código', 'Descrição', 'Valor', 'Prazo de Laudo', 'Onde Encontrar', 'Imagem_URL'],
            'CONSULTA E PROCEDIMENTOS': ['ID', 'Código', 'Consulta/Procedimento', 'Descrição', 'Preparo', 'Material Utilizado', 'Valor Particular', 'Imagem_URL'],
            'EXAMES LABORATORIAIS': ['ID', 'Código', 'Procedimento', 'Valor', 'Prazo de Liberação', 'Preparo', 'Motivo_Indicacao'],
            'CONTATOS': ['ID', 'Tipo', 'Local_Setor', 'Nome_Contato', 'Valor_Contato', 'Anotacoes'], 
            'SENHAS E LOGINS GERAIS': ['ID', 'Nome do Sistema', 'Link do Sistema', 'Login', 'Senha', 'Observações'],
            'REMOÇÕES': ['ID', 'Nome do Hospital/Clínica', 'Contato', 'Local', 'Informações Importantes', 'Convênios Atendidos', 'Imagem_URL'],
            'INSTITUTOS': ['ID', 'Tabela_Instituto', 'Profissional', 'Especialidade', 'CRM_URA', 'Valores'],
            'NOVIDADES_E_EVENTOS': ['ID', 'Tipo', 'Título', 'Mensagem', 'Data de Publicação', 'Imagem_URL'],
            'BOLETINS_INFORMATIVOS': ['ID', 'Título', 'Descrição', 'Tipo_Midia', 'Link_Arquivo', 'Data_Publicacao'],
            'CONTROLE_ATENDIMENTOS': ['ID', 'Profissional', 'Convênio', 'Qtd_Atual', 'Limite_Max'],
            'USUARIOS': ['ID', 'Nome Completo', 'E-mail', 'Nível de Acesso', 'Data de Nascimento', 'Foto_Perfil_URL', 'Status', 'Competências', 'Hora Início', 'Hora Fim', 'Dias de Trabalho', 'Horários Flexíveis', 'Formato Contratação'],
            'ESCALAS': ['ID', 'Tipo_Profissional', 'Nome_Profissional', 'Data', 'Turno', 'Horario', 'Unidade', 'Setor_Consultorio', 'Status_Turno', 'Substituindo'],
            'CHAT_MENSAGENS': ['ID', 'Data_Hora', 'Nome', 'Mensagem', 'Destinatario'],
            'LEMBRETES_HORA': ['ID', 'Hora', 'Mensagem'],
            'MURAL_AVISOS': ['ID', 'Layout', 'Título', 'Subtítulo', 'Imagem_URL', 'Link', 'Ativo']
        };

        const api = {
            fetch: async (colName) => {
                if(!db) return [];
                try { const snap = await db.collection(colName).get(); return snap.docs.map(doc => ({ ID: doc.id, ...doc.data() })); } catch (e) { return []; }
            },
            fetchAll: async () => {
                if(!db) return {}; let allData = {};
                for (let c of Object.keys(tabSchemas)) { try { const snap = await db.collection(c).get(); allData[c] = snap.docs.map(doc => ({ ID: doc.id, ...doc.data() })); } catch(e) {} }
                return allData;
            },
            login: async (rawEmail, password) => {
                if(!isFirebaseConfigured || !auth) return { success: false, message: 'As chaves não estão configuradas.' };
                try {
                    const email = rawEmail.trim(); await auth.signInWithEmailAndPassword(email, password);
                    const userDoc = await db.collection('USUARIOS').where('E-mail', '==', email).get();
                    let userData = { 'E-mail': email, 'Nome Completo': email.split('@')[0], 'Nível de Acesso': 'Admin' };
                    if (!userDoc.empty) {
                        userData = { ID: userDoc.docs[0].id, ...userDoc.docs[0].data() };
                        if (userData.Status && String(userData.Status).toLowerCase() === 'inativo') { await auth.signOut(); return { success: false, message: 'Conta inativa.' }; }
                    }
                    return { success: true, user: userData };
                } catch (error) { return { success: false, message: "E-mail ou senha incorretos." }; }
            },
            saveRecord: async (colName, data, isEdit) => {
                if(!db) return { success: false };
                try {
                    let docData = { ...data };
                    Object.keys(docData).forEach(k => { if(typeof docData[k] === 'string') docData[k] = docData[k].trim(); });
                    let id = docData.ID; delete docData.ID;
                    Object.keys(docData).forEach(key => docData[key] === undefined && delete docData[key]);
                    if (isEdit && id) await db.collection(colName).doc(id).update(docData); else await db.collection(colName).add(docData);
                    return { success: true };
                } catch (e) { return { success: false }; }
            },
            deleteRecord: async (colName, id) => {
                if(!db) return { success: false };
                try { await db.collection(colName).doc(id).delete(); return { success: true }; } catch (e) { return { success: false }; }
            }
        };

        const ClockWidget = ({ lembretesData }) => {
            const [time, setTime] = useState(new Date());
            useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);
            const hour = time.getHours();
            let periodStr = 'Bom dia'; let icon = 'ph-sun'; let bgClass = 'bg-blue-50 text-blue-800 dark:bg-blue-900/30 dark:text-blue-200';
            if (hour >= 12 && hour < 18) { periodStr = 'Boa tarde'; icon = 'ph-cloud-sun'; bgClass = 'bg-orange-50 text-orange-800 dark:bg-orange-900/30 dark:text-orange-200'; }
            else if (hour >= 18 || hour < 6) { periodStr = 'Boa noite'; icon = 'ph-moon-stars'; bgClass = 'bg-indigo-900 text-indigo-100 dark:bg-slate-800 dark:text-indigo-200'; }
            const lembretes = Array.isArray(lembretesData) ? lembretesData : [];
            const lembreteAtual = lembretes.find(l => l && typeof l === 'object' && parseInt(safeString(l.Hora) || -1) === hour);
            const msg = lembreteAtual ? safeString(lembreteAtual.Mensagem) : 'Tenha um excelente turno de trabalho!';

            return (
                <div className={`p-6 rounded-[2rem] shadow-lg hover:-translate-y-1 transition-transform duration-500 flex items-center justify-between ${bgClass}`}>
                    <div className="flex items-center gap-5">
                        <div className="w-16 h-16 rounded-[1.5rem] bg-white/30 backdrop-blur flex items-center justify-center shadow-inner"><i className={`ph-fill ${icon} text-4xl animate-spin-slow`}></i></div>
                        <div><h2 className="text-3xl md:text-5xl font-black tracking-tighter drop-shadow-sm">{time.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit', second:'2-digit'})}</h2><p className="text-xs md:text-sm font-bold uppercase tracking-widest opacity-90 mt-1">{periodStr}</p></div>
                    </div>
                    <div className="hidden md:flex flex-col items-end max-w-xs text-right border-l-2 border-white/20 pl-6">
                        <span className="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1 flex items-center gap-1 bg-white/20 px-3 py-1 rounded-full"><i className="ph-fill ph-bell-ringing animate-pulse"></i> Lembrete da Hora</span>
                        <p className="text-base font-bold leading-tight">{msg}</p>
                    </div>
                </div>
            )
        };

        const ModalForm = ({ title, schema, formData, setFormData, onSave, onClose, loading }) => {
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 glass-modal animate-fade-in overflow-y-auto" onMouseDown={onClose}>
                    <div className="bg-white dark:bg-slate-800 rounded-[3rem] w-full max-w-4xl flex flex-col shadow-2xl animate-pop-in overflow-hidden border border-gray-100 dark:border-slate-700 m-auto mt-4 mb-4" onMouseDown={e => e.stopPropagation()}>
                        <div className="p-8 bg-gray-50/50 dark:bg-slate-900 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center shrink-0">
                            <h3 className="text-2xl md:text-3xl font-black flex items-center gap-3 text-gray-900 dark:text-white"><div className="w-12 h-12 rounded-[1.5rem] bg-primary/10 text-primary flex items-center justify-center shadow-inner"><i className={`ph-bold ${formData?.ID ? 'ph-pencil-simple' : 'ph-plus'}`}></i></div> {formData?.ID ? 'Editar' : 'Novo'} {title}</h3>
                            <button type="button" onClick={onClose} className="w-12 h-12 rounded-full bg-white shadow-sm border border-gray-100 dark:bg-slate-700 hover:bg-red-500 hover:text-white hover:scale-105 transition-all flex items-center justify-center text-xl"><i className="ph-bold ph-x"></i></button>
                        </div>
                        <div className="p-6 md:p-10 overflow-y-auto flex-1 custom-scrollbar">
                            <form id="gen-form" onSubmit={onSave} className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {(schema || []).filter(col => safeString(col) !== 'ID').map((col, idx) => {
                                    const colName = safeString(col); const cLower = colName.toLowerCase();
                                    const isLong = cLower.includes('descrição') || cLower.includes('anotações') || cLower.includes('mensagem') || cLower.includes('preparo') || cLower.includes('url') || cLower.includes('site') || cLower.includes('motivo') || cLower.includes('competências') || cLower.includes('trabalho');
                                    
                                    return (
                                        <div key={idx} className={isLong ? 'md:col-span-2' : ''}>
                                            <label className="block text-xs font-black text-gray-400 dark:text-slate-400 mb-2 uppercase tracking-widest pl-2">{colName}</label>
                                            
                                            {colName === 'Layout' && title.includes('Aviso') ? (
                                                <select className="w-full px-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white shadow-inner" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="Padrão">Padrão</option><option value="Imagem Grande">Imagem Grande (Banner)</option><option value="Só Texto">Só Texto</option>
                                                </select>
                                            ) : colName === 'Tipo_Midia' ? (
                                                <select className="w-full px-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-2xl font-bold text-gray-800 dark:text-white shadow-inner" value={safeString(formData[colName])} onChange={e => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="Documento PDF">Documento (Drive PDF)</option><option value="Apresentação">Apresentação (Slides Drive)</option><option value="Vídeo">Vídeo (YouTube/Drive)</option><option value="Imagem">Imagem Externa</option><option value="Outro">Outro Formato</option>
                                                </select>
                                            ) : colName === 'Tipo' && title.includes('Contato') ? (
                                                <select className="w-full px-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white shadow-inner" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="Ramal">Ramal Interno</option><option value="Email">E-mail</option><option value="Telefone">Telefone Externo</option>
                                                </select>
                                            ) : colName.includes('?') || colName === 'Status' || colName === 'Ativo' ? (
                                                <select className="w-full px-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white shadow-inner" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="">Selecione...</option><option value="Sim">Sim</option><option value="Não">Não</option><option value="Ativo">Ativo</option><option value="Inativo">Inativo</option>
                                                </select>
                                            ) : colName === 'Nível de Acesso' ? (
                                                <select className="w-full px-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white shadow-inner" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})}>
                                                    <option value="">Selecione...</option><option value="Colaborador">Colaborador</option><option value="Supervisor">Supervisor</option><option value="Admin">Admin</option>
                                                </select>
                                            ) : colName.includes('Cor') ? (
                                                <div className="flex items-center gap-3 bg-gray-50 dark:bg-slate-900 p-4 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-inner">
                                                    <input type="color" className="w-10 h-10 rounded-full cursor-pointer border-0 bg-transparent" value={safeString(formData[colName]) || '#1E40AF'} onChange={(e) => setFormData({...formData, [colName]: e.target.value})} />
                                                    <span className="font-mono text-sm font-bold text-gray-500">{safeString(formData[colName]) || 'Cor Padrão'}</span>
                                                </div>
                                            ) : isLong && !cLower.includes('url') && !cLower.includes('site') && !cLower.includes('link') ? (
                                                <textarea className="w-full px-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-primary min-h-[120px] font-bold text-gray-800 dark:text-white shadow-inner" value={safeString(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})} placeholder={cLower.includes('competências') ? 'Ex: Recepção, Triagem' : cLower.includes('dias') ? 'Ex: Seg, Ter, Qua' : `Detalhes...`}></textarea>
                                            ) : cLower.includes('data') ? (
                                                <input type="date" className="w-full px-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800 dark:text-white shadow-inner" value={formatDateForInput(formData[colName])} onChange={(e) => setFormData({...formData, [colName]: e.target.value})} />
                                            ) : cLower.includes('hora') || cLower.includes('início') || cLower.includes('fim') || cLower.includes('flexíveis') ? (

        const DetailModal = ({ item, schema, onClose, canEdit, openModal, handleDelete, title }) => {

                                <div className={`relative z-10 flex flex-col flex-1 ${item.Imagem_URL ? 'mt-24 bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-lg border border-gray-100 dark:border-slate-700' : ''}`}>

                </div>

        };

                        {canEdit && <button onClick={()=>openModal(null, schema)} className="bg-primary text-white font-black px-8 py-4 rounded-full shadow-xl hover:-translate-y-1 hover:scale-105 transition w-full md:w-auto flex items-center justify-center gap-2"><i className="ph-bold ph-plus text-xl"></i> Novo Vínculo</button>}
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">

                                <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest bg-gray-50 px-3 py-1.5 rounded-full w-max mb-6">{groupedByTabela[tab].length} Profissionais</p>
                                <div className="mt-auto space-y-3 border-t pt-6">
                                    {groupedByTabela[tab].slice(0,3).map((item, j) => <p key={j} onClick={()=>setSelectedItem(item)} className="text-sm font-bold text-gray-700 hover:text-primary cursor-pointer truncate flex items-center gap-2"><i className="ph-bold ph-user text-gray-300"></i> {safeString(item.Profissional)}</p>)}
                                    {groupedByTabela[tab].length > 3 && <p className="text-xs font-black text-primary cursor-pointer hover:underline mt-2">Ver todos os {groupedByTabela[tab].length}...</p>}

                                    {groupedByProf[prof].map((item, j) => <div key={j} onClick={()=>setSelectedItem(item)} className="bg-gray-50 p-3 rounded-xl text-xs font-black text-gray-700 cursor-pointer hover:bg-blue-50 hover:text-blue-700 transition flex justify-between items-center"><span className="truncate pr-2">{safeString(item.Tabela_Instituto)}</span><i className="ph-bold ph-caret-right text-gray-400"></i></div>)}

            const safeData = Array.isArray(data) ? data : [];
            const [search, setSearch] = useState('');
            
            let dynamicCols = new Set();
            safeData.forEach(row => { if(row && typeof row === 'object') Object.keys(row).forEach(k => { if(k !== 'ID' && k !== 'Código' && k !== 'Procedimento') dynamicCols.add(k); }); });
            let insurances = Array.from(dynamicCols);
            if(insurances.length === 0) insurances = ['Unimed', 'Particular']; 

            let allKeys = ['ID', 'Código', 'Procedimento', ...insurances];
            let procColName = 'Procedimento';

            const filteredData = safeData.filter(row => row && typeof row === 'object' && (safeString(row.Procedimento).toLowerCase().includes(search.toLowerCase()) || safeString(row['Código']).toLowerCase().includes(search.toLowerCase())));
            const headerColors = ['#2563eb', '#0ea5e9', '#0d9488', '#10b981', '#8b5cf6', '#d946ef', '#f43f5e', '#f97316'];

                                                        <td key={`cell-${rowIndex}-${i}`}>

                                                        </td>
                                                    );

                                    <div className="w-full bg-gray-50 dark:bg-slate-900 rounded-2xl p-5 mt-auto space-y-3 text-left shadow-inner mb-6">
                                        {med.CRM && <p className="text-xs font-black text-gray-400 flex justify-between uppercase tracking-widest"><span>CRM</span> <span className="text-gray-800 dark:text-slate-200">{safeString(med.CRM)}</span></p>}
                                        {med['Código UNIMED'] && <p className="text-xs font-black text-gray-400 flex justify-between uppercase tracking-widest"><span>UNIMED</span> <span className="text-gray-800 dark:text-slate-200">{safeString(med['Código UNIMED'])}</span></p>}
                                        {med.CBO && <p className="text-xs font-black text-gray-400 flex justify-between items-center pt-3 border-t border-gray-200 dark:border-slate-700 uppercase tracking-widest"><span>CBO</span> <span className="bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-slate-200 px-3 py-1 rounded-lg">{safeString(med.CBO)}</span></p>}
                                    </div>
                                    
                                    {canEdit && <button onClick={()=>openLancarEscala(safeString(med.Médico), true)} className="w-full bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-black py-4 rounded-full shadow-lg hover:scale-105 transition flex justify-center items-center gap-2 text-sm"><i className="ph-bold ph-calendar-plus text-xl"></i> Agendar Plantão</button>}
                                </div>
                                {canEdit && (
                                    <div className="absolute top-4 right-4 flex gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition z-20">
                                        <button onClick={()=>openModal(med)} className="w-12 h-12 bg-white dark:bg-slate-700 text-blue-600 rounded-full shadow-md hover:bg-blue-600 hover:text-white flex items-center justify-center hover:scale-110 transition"><i className="ph-bold ph-pencil-simple text-xl"></i></button>
                                        <button onClick={()=>{if(confirm('Excluir?')) handleDelete(med.ID)}} className="w-12 h-12 bg-white dark:bg-slate-700 text-red-600 rounded-full shadow-md hover:bg-red-600 hover:text-white flex items-center justify-center hover:scale-110 transition"><i className="ph-bold ph-trash text-xl"></i></button>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ContatosViewTabs = ({ data, canEdit, openModal, handleDelete, schema }) => {
            const safeData = Array.isArray(data) ? data : [];
            const [search, setSearch] = useState('');
            const [activeTab, setActiveTab] = useState('Ramal'); 
            const filtered = safeData.filter(c => c && safeString(c.Tipo) === activeTab && Object.values(c).some(v=>safeString(v).toLowerCase().includes(search.toLowerCase()))).sort((a,b)=>safeString(a.Nome_Contato).localeCompare(safeString(b.Nome_Contato)));

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] p-6 shadow-sm border border-gray-100 dark:border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex bg-gray-50 dark:bg-slate-900 p-2 rounded-full gap-2 w-full md:w-auto shadow-inner">
                            <button onClick={()=>setActiveTab('Ramal')} className={`flex-1 md:flex-none px-6 py-3.5 rounded-full font-black text-sm transition-all ${activeTab==='Ramal'?'bg-white dark:bg-slate-800 text-primary shadow-md':'text-gray-500 hover:text-gray-900'}`}>📞 Ramais</button>
                            <button onClick={()=>setActiveTab('Email')} className={`flex-1 md:flex-none px-6 py-3.5 rounded-full font-black text-sm transition-all ${activeTab==='Email'?'bg-white dark:bg-slate-800 text-secondary shadow-md':'text-gray-500 hover:text-gray-900'}`}>📧 E-mails</button>
                            <button onClick={()=>setActiveTab('Telefone')} className={`flex-1 md:flex-none px-6 py-3.5 rounded-full font-black text-sm transition-all ${activeTab==='Telefone'?'bg-white dark:bg-slate-800 text-green-600 shadow-md':'text-gray-500 hover:text-gray-900'}`}>📱 Externos</button>
                        </div>
                        <div className="relative w-full md:w-80"><i className="ph-bold ph-magnifying-glass absolute left-6 top-4 text-gray-400 text-xl"></i><input type="text" placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full pl-14 pr-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-full font-black outline-none focus:ring-2 focus:ring-primary shadow-inner text-gray-800 dark:text-white" /></div>
                        {canEdit && <button onClick={()=>openModal({Tipo: activeTab}, schema)} className="bg-primary text-white w-full md:w-auto font-black px-8 py-4 rounded-full shadow-xl shadow-blue-900/20 hover:-translate-y-1 hover:scale-105 transition flex justify-center items-center gap-2 shrink-0"><i className="ph-bold ph-plus text-xl"></i> Novo Contato</button>}
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
                        {filtered.map((item, i) => (
                            <div key={i} className="bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-[2.5rem] p-8 shadow-sm card-hover relative group flex flex-col">
                                <span className="text-[10px] font-black text-gray-400 uppercase tracking-widest bg-gray-50 dark:bg-slate-900 px-4 py-2 rounded-full mb-4 w-max border dark:border-slate-700">{safeString(item.Local_Setor) || 'Sem Local'}</span>
                                <h3 className="font-black text-2xl text-gray-900 dark:text-white mb-2 leading-tight">{safeString(item.Nome_Contato) || 'Sem Nome'}</h3>
                                <p className={`text-xl md:text-2xl font-black mt-4 p-4 rounded-2xl break-all shadow-inner ${activeTab==='Ramal'?'bg-blue-50 text-blue-700':activeTab==='Email'?'bg-orange-50 text-orange-700':'bg-green-50 text-green-700'}`}>{safeString(item.Valor_Contato)}</p>
                                {item.Anotacoes && <p className="text-sm font-bold text-gray-500 mt-6 leading-tight border-t dark:border-slate-700 pt-4">{safeString(item.Anotacoes)}</p>}
                                
                                {canEdit && (
                                    <div className="absolute top-6 right-6 flex gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition">
                                        <button onClick={()=>openModal(item, schema)} className="w-10 h-10 bg-white shadow-md rounded-full text-blue-600 hover:bg-blue-600 hover:text-white flex items-center justify-center transition hover:scale-110"><i className="ph-bold ph-pencil-simple text-lg"></i></button>
                                        <button onClick={()=>{if(confirm('Excluir?')) handleDelete(item.ID)}} className="w-10 h-10 bg-white shadow-md rounded-full text-red-600 hover:bg-red-600 hover:text-white flex items-center justify-center transition hover:scale-110"><i className="ph-bold ph-trash text-lg"></i></button>
                                    </div>
                                )}
                            </div>
                        ))}
                        {filtered.length === 0 && <div className="col-span-full p-20 text-center text-gray-400 font-black text-2xl border-2 border-dashed rounded-[3rem] dark:border-slate-700">Nenhum {activeTab} cadastrado.</div>}
                    </div>
                </div>
            )
        };

        const ChatModerno = ({ chatData, user, onSaveChat, onRefresh }) => {
            const [msg, setMsg] = useState('');
            const [activeRoom, setActiveRoom] = useState('Geral'); 
            const isAdmin = user && typeof user === 'object' && ['admin', 'supervisor'].some(r => { const nk = Object.keys(user).find(k => safeString(k).toLowerCase().includes('acesso')); return nk ? safeString(user[nk]).toLowerCase().includes(r) : false; });
            const myName = safeString(user && user['Nome Completo'] ? user['Nome Completo'] : 'Usuário');
            const chatLog = Array.isArray(chatData) ? chatData : [];
            const isGeral = activeRoom === 'Geral';
            
            const mensagensRoom = chatLog.filter(m => {
                if(!m) return false;
                if(isGeral) return safeString(m.Destinatario) === 'Geral';
                return (safeString(m.Nome) === myName && safeString(m.Destinatario) === activeRoom) || (safeString(m.Nome) === activeRoom && safeString(m.Destinatario) === myName);
            }).sort((a,b) => new Date(a.Data_Hora) - new Date(b.Data_Hora));

            const handleSend = async (e) => {
                e.preventDefault(); if(!msg)return;
                let dest = activeRoom;
                if(!isAdmin && activeRoom === 'Supervisão') dest = 'Supervisão';
                await onSaveChat('CHAT_MENSAGENS', {ID:'', Data_Hora:new Date().toISOString(), Nome:myName, Mensagem:msg, Destinatario:dest}, false);
                setMsg(''); onRefresh();
            };

            return (
                <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] shadow-xl border border-gray-100 dark:border-slate-700 h-[75vh] md:h-[80vh] flex flex-col md:flex-row overflow-hidden animate-fade-in">
                    <div className="md:w-1/3 border-b md:border-r border-gray-100 dark:border-slate-700 bg-gray-50/50 dark:bg-slate-900/50 flex flex-col shrink-0">
                        <div className="p-6 md:p-8 border-b border-gray-100 dark:border-slate-700 bg-white dark:bg-slate-800"><h2 className="text-2xl md:text-3xl font-black flex items-center gap-3"><i className="ph-fill ph-chats-circle text-primary"></i> Comunicação</h2></div>
                        <div className="p-4 md:p-6 space-y-3 overflow-y-auto flex md:flex-col gap-3 md:gap-0 hide-scroll">
                            <div onClick={()=>setActiveRoom('Geral')} className={`p-4 md:p-5 rounded-[1.5rem] cursor-pointer font-black flex items-center gap-4 transition whitespace-nowrap md:whitespace-normal shrink-0 ${activeRoom==='Geral'?'bg-primary text-white shadow-xl hover:scale-105':'hover:bg-white dark:hover:bg-slate-800 text-gray-700 dark:text-gray-300 border border-transparent hover:border-gray-200'}`}><div className="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-white/20 flex items-center justify-center shadow-inner"><i className="ph-fill ph-users text-xl md:text-2xl"></i></div> Fórum da Equipe</div>
                            <div onClick={()=>setActiveRoom(isAdmin?'Caixa de Entrada':'Supervisão')} className={`p-4 md:p-5 rounded-[1.5rem] cursor-pointer font-black flex items-center justify-between transition whitespace-nowrap md:whitespace-normal shrink-0 ${activeRoom!=='Geral'?'bg-gray-900 dark:bg-white text-white dark:text-gray-900 shadow-xl hover:scale-105':'hover:bg-white dark:hover:bg-slate-800 text-gray-700 dark:text-gray-300 border border-transparent hover:border-gray-200'}`}><div className="flex items-center gap-4"><div className="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-white/20 dark:bg-black/10 flex items-center justify-center shadow-inner"><i className="ph-fill ph-shield-star text-xl md:text-2xl"></i></div> {isAdmin?'Caixa Inbox':'Falar c/ Supervisão'}</div></div>
                        </div>
                    </div>
                    <div className="md:w-2/3 flex flex-col bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-gray-50 dark:bg-slate-900 flex-1 relative">
                        <div className="p-6 md:p-8 bg-white/90 dark:bg-slate-800/90 backdrop-blur border-b border-gray-100 dark:border-slate-700 flex justify-between items-center shadow-sm z-10 shrink-0">
                            <h3 className="font-black text-xl md:text-2xl text-gray-900 dark:text-white">{activeRoom}</h3>
                            <button onClick={()=>onRefresh()} className="w-10 h-10 md:w-12 md:h-12 bg-gray-100 dark:bg-slate-700 rounded-full flex items-center justify-center hover:text-primary transition shadow-inner hover:scale-110"><i className="ph-bold ph-arrows-clockwise text-xl"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 md:p-10 space-y-6 md:space-y-8 flex flex-col custom-scrollbar">
                            {mensagensRoom.length === 0 && <div className="m-auto text-gray-400 font-black bg-white dark:bg-slate-800 p-6 md:p-10 rounded-[2rem] shadow-sm text-center text-lg border dark:border-slate-700">Nenhuma mensagem neste canal.</div>}
                            {mensagensRoom.map((m, i) => {
                                const isMe = safeString(m.Nome) === myName;
                                return (
                                    <div key={i} className={`flex flex-col gap-1.5 max-w-[85%] md:max-w-[70%] ${isMe ? 'self-end items-end' : 'self-start items-start'} animate-fade-in`}>
                                        <span className="text-[10px] md:text-xs font-black text-gray-400 uppercase tracking-widest mx-3">{safeString(m.Nome)}</span>
                                        <div className={`p-5 md:p-6 rounded-[1.5rem] shadow-md text-sm md:text-base font-bold ${isMe ? 'bg-primary text-white rounded-tr-none' : 'bg-white dark:bg-slate-800 border border-gray-100 dark:border-slate-700 rounded-tl-none text-gray-800 dark:text-gray-200'}`}>{safeString(m.Mensagem)}</div>
                                    </div>
                                )
                            })}
                        </div>
                        <form onSubmit={handleSend} className="p-5 md:p-6 bg-white dark:bg-slate-800 border-t border-gray-100 dark:border-slate-700 flex gap-4 md:gap-6 shrink-0 z-10">
                            <input type="text" value={msg} onChange={e=>setMsg(e.target.value)} placeholder="Escreva a sua mensagem..." className="flex-1 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-full px-6 md:px-8 py-4 outline-none focus:ring-2 focus:ring-primary font-black transition text-gray-800 dark:text-white shadow-inner text-sm md:text-base" />
                            <button type="submit" className="w-14 h-14 md:w-16 md:h-16 rounded-full bg-primary text-white flex items-center justify-center shadow-xl shadow-blue-900/20 hover:scale-110 transition transform shrink-0"><i className="ph-fill ph-paper-plane-tilt text-xl md:text-2xl"></i></button>
                        </form>
                    </div>
                </div>
            )
        };

        const SenhasView = ({ data, canEdit, openModal, handleDelete, schema }) => {
            const [search, setSearch] = useState('');
            const filtered = data.filter(c => c && (safeString(c['Nome do Sistema']).toLowerCase().includes(search.toLowerCase()) || safeString(c.Login).toLowerCase().includes(search.toLowerCase()))).sort((a,b)=>safeString(a['Nome do Sistema']).localeCompare(safeString(b['Nome do Sistema'])));
            const [visiblePwd, setVisiblePwd] = useState({});
            const togglePwd = (id) => setVisiblePwd(p => ({...p, [id]: !p[id]}));

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-center bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm border border-gray-100 dark:border-slate-700 gap-4">
                        <div className="relative w-full md:w-96"><i className="ph-bold ph-magnifying-glass absolute left-6 top-4.5 text-gray-400 text-xl"></i><input type="text" placeholder="Buscar sistema ou login..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full pl-16 pr-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-full outline-none focus:ring-2 focus:ring-primary font-black transition text-gray-800 dark:text-white shadow-inner" /></div>
                        {canEdit && <button onClick={()=>openModal(null, schema)} className="bg-primary text-white font-black px-8 py-4 w-full md:w-auto rounded-full shadow-xl shadow-blue-900/20 hover:-translate-y-1 hover:scale-105 transition shrink-0 flex justify-center items-center gap-2"><i className="ph-bold ph-plus text-xl"></i> Nova Senha</button>}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 md:gap-8">
                        {filtered.map((item, i) => (
                            <div key={i} className="bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-[2.5rem] p-8 shadow-sm card-hover relative group flex flex-col">
                                <div className="flex justify-between items-start mb-6">
                                    <h3 className="font-black text-2xl text-gray-900 dark:text-white flex items-center gap-3 truncate pr-2"><div className="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center shrink-0"><i className="ph-fill ph-lock-key text-primary"></i></div> <span className="truncate">{safeString(item['Nome do Sistema'])}</span></h3>
                                </div>
                                
                                <div className="bg-gray-50 dark:bg-slate-900 rounded-2xl p-5 space-y-4 mb-6 shadow-inner">
                                    <div><p className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Login</p><p className="font-black text-gray-800 dark:text-white break-all text-lg">{safeString(item.Login)}</p></div>
                                    <div>
                                        <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest flex justify-between mb-1">Senha <button onClick={()=>togglePwd(item.ID)} className="text-primary hover:underline">{visiblePwd[item.ID] ? 'Ocultar' : 'Mostrar'}</button></p>
                                        <div className="flex justify-between items-center bg-white dark:bg-slate-800 px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm">
                                            <span className="font-mono font-black text-gray-800 dark:text-white text-lg tracking-widest">{visiblePwd[item.ID] ? safeString(item.Senha) : '••••••••••••'}</span>
                                            <button onClick={()=>{navigator.clipboard.writeText(safeString(item.Senha)); alert('Senha copiada!');}} className="text-gray-400 hover:text-primary transition hover:scale-110"><i className="ph-bold ph-copy text-xl"></i></button>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="flex justify-between items-end mt-auto pt-4 border-t dark:border-slate-700">
                                    {item['Observações'] ? <p className="text-xs font-bold text-gray-500 flex-1 pr-4 line-clamp-2">{safeString(item['Observações'])}</p> : <div></div>}
                                    {item['Link do Sistema'] && <a href={safeString(item['Link do Sistema'])} target="_blank" className="bg-blue-50 dark:bg-blue-900/30 text-blue-600 px-4 py-2 rounded-xl text-xs font-black hover:bg-blue-600 hover:text-white transition shrink-0 flex items-center gap-1 shadow-sm">Acessar <i className="ph-bold ph-arrow-square-out"></i></a>}
                                </div>

                                {canEdit && (
                                    <div className="absolute top-6 right-6 flex gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition">
                                        <button onClick={()=>openModal(item, schema)} className="w-10 h-10 text-blue-600 bg-white dark:bg-slate-700 shadow-md rounded-full hover:bg-blue-600 hover:text-white flex items-center justify-center hover:scale-110 transition"><i className="ph-bold ph-pencil-simple text-lg"></i></button>
                                        <button onClick={()=>{if(confirm('Excluir senha?')) handleDelete(item.ID)}} className="w-10 h-10 text-red-600 bg-white dark:bg-slate-700 shadow-md rounded-full hover:bg-red-600 hover:text-white flex items-center justify-center hover:scale-110 transition"><i className="ph-bold ph-trash text-lg"></i></button>
                                    </div>
                                )}
                            </div>
                        ))}
                        {filtered.length === 0 && <div className="col-span-full p-20 text-center text-gray-400 font-black text-2xl border-2 border-dashed border-gray-200 dark:border-slate-700 rounded-[3rem]">Nenhuma senha encontrada.</div>}
                    </div>
                </div>
            );
        };

        const BoletinsView = ({ data, canEdit, openModal, handleDelete }) => {
            const [selectedMedia, setSelectedMedia] = useState(null);
            const ativos = Array.isArray(data) ? data.filter(d => d) : [];

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-center bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm border border-gray-100 dark:border-slate-700 gap-4">
                        <div>
                            <h2 className="text-2xl md:text-3xl font-black text-gray-800 dark:text-white flex items-center gap-3"><i className="ph-fill ph-newspaper text-primary"></i> Boletins e Treinamentos</h2>
                            <p className="text-sm text-gray-500 font-bold ml-10 mt-1 hidden md:block">Materiais educativos e comunicados para a equipe.</p>
                        </div>
                        {canEdit && <button onClick={()=>openModal({Tipo_Midia: 'Documento PDF'})} className="bg-primary text-white px-8 py-4 w-full md:w-auto rounded-full font-black shadow-xl shadow-blue-900/20 hover:-translate-y-1 hover:scale-105 transition flex items-center justify-center gap-2"><i className="ph-bold ph-plus text-xl"></i> Nova Mídia</button>}
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                        {ativos.map((item, i) => {
                            let icon = 'ph-file-pdf'; let color = 'bg-blue-50 text-blue-600 dark:bg-blue-900/30';
                            const t = safeString(item.Tipo_Midia).toLowerCase();
                            if(t.includes('vídeo') || t.includes('video')) { icon = 'ph-play-circle'; color = 'bg-red-50 text-red-600 dark:bg-red-900/30'; }
                            else if(t.includes('imagem')) { icon = 'ph-image'; color = 'bg-green-50 text-green-600 dark:bg-green-900/30'; }
                            else if(t.includes('apresentação')) { icon = 'ph-projector-screen'; color = 'bg-orange-50 text-orange-600 dark:bg-orange-900/30'; }

                            return (
                                <div key={i} className="bg-white dark:bg-slate-800 border border-gray-100 dark:border-slate-700 rounded-[2.5rem] p-8 shadow-sm card-hover flex flex-col relative group">
                                    <div className="flex items-start justify-between mb-6">
                                        <div className={`w-16 h-16 rounded-[1.5rem] flex items-center justify-center text-4xl shadow-inner ${color}`}>
                                            <i className={`ph-fill ${icon}`}></i>
                                        </div>
                                        <span className="text-[10px] font-black text-gray-400 bg-gray-50 dark:bg-slate-900 px-4 py-2 rounded-full border dark:border-slate-700 shadow-sm uppercase tracking-widest">{safeString(item.Data_Publicacao).split('-').reverse().join('/')}</span>
                                    </div>
                                    <h3 className="font-black text-2xl text-gray-900 dark:text-white leading-tight mb-3">{safeString(item.Título)}</h3>
                                    <p className="text-sm text-gray-500 font-bold line-clamp-3 mb-8">{safeString(item.Descrição)}</p>
                                    
                                    <button onClick={()=>setSelectedMedia(item)} className="mt-auto w-full py-4 bg-gray-50 dark:bg-slate-900 hover:bg-gray-900 dark:hover:bg-white dark:hover:text-gray-900 hover:text-white rounded-xl font-black transition flex items-center justify-center gap-2 text-gray-700 dark:text-white border dark:border-slate-700 shadow-sm hover:shadow-lg">
                                        Abrir Arquivo <i className="ph-bold ph-arrow-square-out text-lg"></i>
                                    </button>

                                    {canEdit && (
                                        <div className="absolute top-6 right-6 flex gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition">
                                            <button onClick={()=>openModal(item)} className="w-10 h-10 bg-white dark:bg-slate-700 shadow-md rounded-full text-blue-600 hover:bg-blue-600 hover:text-white flex justify-center items-center hover:scale-110 transition"><i className="ph-bold ph-pencil-simple text-lg"></i></button>
                                            <button onClick={()=>{if(confirm('Excluir permanentemente?')) handleDelete(item.ID)}} className="w-10 h-10 bg-white dark:bg-slate-700 shadow-md rounded-full text-red-600 hover:bg-red-600 hover:text-white flex justify-center items-center hover:scale-110 transition"><i className="ph-bold ph-trash text-lg"></i></button>
                                        </div>
                                    )}
                                </div>
                            )
                        })}
                        {ativos.length === 0 && <div className="col-span-full p-20 text-center text-gray-400 font-black text-2xl border-2 border-dashed border-gray-200 dark:border-slate-700 rounded-[3rem]">Nenhum boletim cadastrado.</div>}
                    </div>

                    {selectedMedia && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 glass-modal animate-fade-in" onClick={()=>setSelectedMedia(null)}>
                            <div className="bg-white dark:bg-slate-800 rounded-[3rem] w-full max-w-5xl shadow-2xl relative overflow-hidden border border-gray-100 dark:border-slate-700 flex flex-col animate-pop-in" onClick={e=>e.stopPropagation()}>
                                <div className="p-6 md:p-8 bg-gray-50/50 dark:bg-slate-900 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center shrink-0">
                                    <h3 className="text-xl md:text-2xl font-black text-gray-900 dark:text-white truncate pr-4 flex items-center gap-3"><i className="ph-fill ph-projector-screen text-primary"></i> {safeString(selectedMedia.Título)}</h3>
                                    <button onClick={()=>setSelectedMedia(null)} className="w-12 h-12 bg-white dark:bg-slate-700 hover:bg-red-500 hover:text-white rounded-full flex justify-center items-center transition shadow-sm shrink-0"><i className="ph-bold ph-x text-xl"></i></button>
                                </div>
                                <div className="bg-gray-100 dark:bg-slate-900 h-[65vh] md:h-[75vh] w-full relative flex items-center justify-center p-4">
                                    {selectedMedia.Link_Arquivo ? (
                                        safeString(selectedMedia.Tipo_Midia) === 'Imagem Externa' ? (
                                            <img src={formatImageUrl(selectedMedia.Link_Arquivo)} className="max-w-full max-h-full object-contain rounded-2xl shadow-xl border border-gray-200 dark:border-slate-700" alt={selectedMedia.Título} />
                                        ) : (
                                            <iframe src={getEmbedUrl(selectedMedia.Link_Arquivo)} className="w-full h-full border-0 rounded-2xl shadow-xl bg-white" allow="autoplay; encrypted-media" allowFullScreen></iframe>
                                        )
                                    ) : <div className="text-gray-400 font-black p-10 text-center border-2 border-dashed rounded-3xl">Link do arquivo indisponível.</div>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            )
        };

        // ... Continuação com o EscalasContainer atualizado

        const EscalasContainer = ({ sheetData, user, onRefresh, showToast }) => {
            const [activeSubTab, setActiveSubTab] = useState('Painel Hoje');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({});
            const [loadingAction, setLoadingAction] = useState(false);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(null); 
            const [selectedPerson, setSelectedPerson] = useState(null); 
            const [datesToSave, setDatesToSave] = useState([]); 
            const [showSwapSugg, setShowSwapSugg] = useState(false);
            const [searchTab, setSearchTab] = useState(''); 

            const nivelKey = user && typeof user === 'object' ? Object.keys(user).find(k => safeString(k).toLowerCase().includes('acesso')) : null;
            const canEdit = nivelKey && ['admin', 'supervisor'].some(role => safeString(user[nivelKey]).toLowerCase().includes(role));
            const isColab = user && typeof user === 'object' && safeString(user[nivelKey]).toLowerCase().includes('colaborador');

            const escalas = Array.isArray(sheetData['ESCALAS']) ? sheetData['ESCALAS'] : [];
            const corpoClinico = Array.isArray(sheetData['CORPO CLINICO']) ? sheetData['CORPO CLINICO'] : [];
            const usuarios = Array.isArray(sheetData['USUARIOS']) ? sheetData['USUARIOS'] : [];
            const controleUnimed = Array.isArray(sheetData['CONTROLE_ATENDIMENTOS']) ? sheetData['CONTROLE_ATENDIMENTOS'] : [];
            
            const todayStr = new Date().toLocaleDateString('pt-BR');
            
            const todayEscalas = escalas.filter(e => e && (safeString(e.Data).includes(todayStr) || safeString(e.Data).includes(todayStr.substring(0,5)))).sort((a,b)=>safeString(a.Nome_Profissional).localeCompare(safeString(b.Nome_Profissional)));

            const filteredEscalas = escalas.filter(esc => {
                if(!esc || typeof esc !== 'object') return false;
                const dt = safeString(esc.Data);
                const currentMonthStr = `${String(currentMonth.getMonth() + 1).padStart(2, '0')}/${currentMonth.getFullYear()}`;
                const currentMonthStrShort = `${String(currentMonth.getMonth() + 1).padStart(2, '0')}/${String(currentMonth.getFullYear()).slice(2)}`;
                if(!dt.includes(currentMonthStr) && !dt.includes(currentMonthStrShort)) return false;

                const tipo = safeString(esc.Tipo_Profissional).toLowerCase();
                const nm = safeString(esc.Nome_Profissional).toLowerCase();
                if (searchTab && !nm.includes(searchTab.toLowerCase())) return false;

                if (activeSubTab === 'Calendário Médicos') return tipo.includes('médico') || tipo.includes('medico') || tipo === '';
                else if (activeSubTab === 'Calendário Equipe') return tipo.includes('colaborador') || tipo.includes('equipe') || tipo.includes('enfermagem');
                return true; 
            });

            const daysInMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0).getDate();
            const firstDayOfMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1).getDay();

            const handleSaveBatch = async (e) => {
                e.preventDefault(); if(datesToSave.length === 0) return showToast('Selecione uma data.', 'error');
                setLoadingAction(true); let err = false;
                for (let d of datesToSave) {
                    const rec = { ...formData, Data: d }; if(datesToSave.length > 1) rec.ID = ''; 
                    const res = await api.saveRecord('ESCALAS', rec, !!formData.ID && datesToSave.length === 1);
                    if(!res.success) err = true;
                }
                setLoadingAction(false); if(!err) { setIsModalOpen(false); onRefresh('ESCALAS'); showToast('Salvo!'); }
            };

            const findSubstitutes = (missingPersonName) => {
                const missingUser = usuarios.find(u => u && safeString(u['Nome Completo']) === missingPersonName);
                if(!missingUser || !missingUser['Competências']) return [];
                const requiredSkills = safeString(missingUser['Competências']).toLowerCase().split(',').map(s=>s.trim()).filter(s=>s);
                return usuarios.filter(u => {
                    if (!u || safeString(u['Nome Completo']) === missingPersonName) return false;
                    const uSkills = safeString(u['Competências']).toLowerCase();
                    const hasSkill = requiredSkills.some(rs => uSkills.includes(rs));
                    const isWorkingToday = todayEscalas.some(e => e && safeString(e.Nome_Profissional) === safeString(u['Nome Completo']));
                    return hasSkill && !isWorkingToday;
                });
            };

            const handleStatusChange = async (esc, novoStatus) => {
                await api.saveRecord('ESCALAS', { ...esc, Status_Turno: novoStatus }, true);
                onRefresh('ESCALAS');
            };

            const handleUnimedUpdate = async (controleItem, num) => {
                const newValue = Number(controleItem.Qtd_Atual || 0) + num;
                if(newValue < 0) return;
                await api.saveRecord('CONTROLE_ATENDIMENTOS', { ...controleItem, Qtd_Atual: String(newValue) }, true);
                onRefresh('CONTROLE_ATENDIMENTOS');
            };

            const PainelDoDia = () => {
                const setores = {};
                const dataToShow = searchTab ? todayEscalas.filter(e => safeString(e.Nome_Profissional).toLowerCase().includes(searchTab.toLowerCase())) : todayEscalas;

                dataToShow.forEach(e => {
                    if(!e) return;
                    const s = safeString(e.Setor_Consultorio) || 'Sem Setor Informado';
                    if(!setores[s]) setores[s] = []; setores[s].push(e);
                });

                return (
                    <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] p-6 md:p-10 border border-gray-100 dark:border-slate-700 min-h-[60vh] shadow-sm">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                            <h3 className="text-2xl md:text-3xl font-black text-gray-800 dark:text-white flex items-center gap-3"><div className="w-12 h-12 bg-primary/10 text-primary rounded-2xl flex justify-center items-center"><i className="ph-fill ph-kanban"></i></div> Operação de Hoje</h3>
                            <div className="flex flex-wrap justify-center gap-4 text-[10px] md:text-xs font-black uppercase tracking-widest bg-gray-50 dark:bg-slate-900 p-4 rounded-2xl md:rounded-full border dark:border-slate-700 shadow-inner w-full md:w-auto">
                                <span className="flex items-center gap-2 text-gray-700 dark:text-gray-300"><div className="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.8)]"></div> Ativo</span>
                                <span className="flex items-center gap-2 text-gray-700 dark:text-gray-300"><div className="w-3 h-3 rounded-full bg-orange-500 shadow-[0_0_10px_rgba(249,115,22,0.8)]"></div> Intervalo</span>
                                <span className="flex items-center gap-2 text-gray-700 dark:text-gray-300"><div className="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.8)]"></div> Ausente</span>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                            {Object.keys(setores).sort().map(setor => (
                                <div key={setor} className="bg-gray-50 dark:bg-slate-900 rounded-[2rem] p-6 md:p-8 shadow-inner border border-gray-100 dark:border-slate-700 flex flex-col">
                                    <h4 className="font-black text-gray-400 dark:text-slate-500 uppercase tracking-widest text-sm mb-6 px-2 flex items-center gap-2"><i className="ph-fill ph-door text-lg"></i> {setor}</h4>
                                    <div className="space-y-4">
                                        {setores[setor].map((esc, i) => {
                                            let isFimExpediente = false;
                                            let userHoraFim = '';
                                            const profData = usuarios.find(u => u && u['Nome Completo'] === esc.Nome_Profissional) || corpoClinico.find(c => c && c.Médico === esc.Nome_Profissional);
                                            if (profData && profData['Hora Fim']) userHoraFim = profData['Hora Fim'];
                                            else userHoraFim = esc.Horario;

                                            if (isPastEnd(userHoraFim)) isFimExpediente = true;

                                            const status = isFimExpediente ? 'Ausente (Fim Expediente)' : (safeString(esc.Status_Turno) || 'Trabalhando');
                                            const isIntervalo = status === 'Intervalo';
                                            const isAusente = status.includes('Ausente') || status === 'Folga' || status === 'Falta';
                                            
                                            let bgCard = isIntervalo ? 'bg-orange-50 dark:bg-orange-900/30 border-orange-200' : isAusente ? 'bg-red-50 dark:bg-red-900/30 border-red-200 opacity-60 grayscale-[50%]' : 'bg-white dark:bg-slate-800 border-gray-100 dark:border-slate-600';
                                            
                                            const cUnimed = controleUnimed.find(a => a && safeString(a.Profissional) === safeString(esc.Nome_Profissional));
                                            let uPulseClass = '';
                                            if (cUnimed) {
                                                const q = Number(cUnimed.Qtd_Atual||0); const m = Number(cUnimed.Limite_Max||1);
                                                if (m > 0 && m - q <= 5) uPulseClass = 'animate-pulse bg-red-500 text-white border-red-600';
                                                else if (m > 0 && q/m >= 0.8) uPulseClass = 'animate-pulse bg-green-500 text-white border-green-600';
                                                else uPulseClass = 'bg-blue-50 text-blue-800 border-blue-200 dark:bg-blue-900/40 dark:text-blue-200 dark:border-blue-800';
                                            }

                                            return (
                                                <div key={i} onClick={()=>(canEdit || isColab) && setSelectedPerson(esc)} className={`p-6 rounded-[1.5rem] border-2 shadow-sm card-hover hover:border-primary transition relative flex flex-col gap-3 ${bgCard}`}>
                                                    {isIntervalo && <div className="absolute -top-4 -right-4 w-12 h-12 bg-orange-500 text-white rounded-full flex items-center justify-center text-2xl animate-bounce-slight shadow-xl border-4 border-white dark:border-slate-900 z-10">🥪</div>}
                                                    
                                                    <div className="flex justify-between items-start">
                                                        <div>
                                                            <span className={`font-black text-xl ${isAusente ? 'text-red-900 dark:text-red-400 line-through decoration-red-300' : 'text-gray-900 dark:text-white'} block pr-4`}>{safeString(esc.Nome_Profissional)}</span>
                                                            <p className="text-xs font-bold text-gray-500 dark:text-slate-400 mt-1 flex items-center gap-1.5"><i className="ph-fill ph-clock"></i> {safeString(esc.Horario)}</p>
                                                        </div>
                                                        {isAusente && <span className="text-[9px] uppercase font-black tracking-widest text-red-600 bg-red-100 px-3 py-1.5 rounded-full">Ausente</span>}
                                                    </div>

                                                    {esc.Substituindo && <p className="text-[10px] font-black text-primary bg-blue-50 dark:bg-blue-900/50 px-3 py-1.5 rounded-lg mt-1 uppercase w-max border border-blue-100 dark:border-blue-800">Cobrindo: {safeString(esc.Substituindo)}</p>}
                                                    
                                                    {cUnimed && (
                                                        <div className={`mt-3 flex flex-col sm:flex-row justify-between items-center p-4 rounded-xl border gap-3 shadow-inner ${uPulseClass}`} onClick={(e)=>e.stopPropagation()}>
                                                            <span className="text-[10px] font-black uppercase tracking-widest">Meta Unimed</span>
                                                            <div className="flex items-center gap-4">
                                                                <button onClick={()=>handleUnimedUpdate(cUnimed, -1)} className="w-8 h-8 bg-white/60 hover:bg-white rounded-lg flex items-center justify-center font-black text-black shadow-sm text-lg transition hover:scale-110">-</button>
                                                                <span className="font-black text-xl w-16 text-center">{cUnimed.Qtd_Atual} <span className="opacity-50 text-xs font-bold">/ {cUnimed.Limite_Max}</span></span>
                                                                <button onClick={()=>handleUnimedUpdate(cUnimed, 1)} className="w-8 h-8 bg-white/60 hover:bg-white rounded-lg flex items-center justify-center font-black text-black shadow-sm text-lg transition hover:scale-110">+</button>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            ))}
                            {Object.keys(setores).length === 0 && <div className="col-span-full text-center p-20 text-gray-400 font-black text-2xl border-2 border-dashed border-gray-200 dark:border-slate-700 rounded-[3rem]">Nenhum plantão ativo no momento.</div>}
                        </div>
                    </div>
                )
            };

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="bg-white dark:bg-slate-800 rounded-[2rem] p-5 shadow-sm border border-gray-100 dark:border-slate-700 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="flex bg-gray-50 dark:bg-slate-900 p-2 rounded-full gap-2 overflow-x-auto hide-scroll w-full md:w-auto shadow-inner">
                            {['Painel Hoje', 'Calendário Médicos', 'Calendário Equipe'].map(tab => (
                                <button key={tab} onClick={() => {setActiveSubTab(tab); setSearchTab('');}} className={`px-6 md:px-8 py-4 rounded-full font-black text-sm md:text-base transition-all whitespace-nowrap ${activeSubTab === tab ? 'bg-white dark:bg-slate-800 text-primary shadow-md' : 'text-gray-500 hover:text-gray-900 dark:hover:text-white'}`}>{tab}</button>
                            ))}
                        </div>
                        <div className="flex gap-3 w-full md:w-auto">
                            <div className="relative flex-1 md:w-72"><i className="ph-bold ph-magnifying-glass absolute left-5 top-4.5 text-gray-400 text-lg"></i><input type="text" placeholder="Buscar Profissional..." value={searchTab} onChange={e=>setSearchTab(e.target.value)} className="w-full pl-14 pr-4 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-full font-black outline-none focus:ring-2 focus:ring-primary text-sm dark:text-white shadow-inner" /></div>
                            {canEdit && <button onClick={() => { setFormData({ ID: '', Tipo_Profissional: activeSubTab.includes('Médicos') ? 'Médico' : 'Colaborador', Nome_Profissional: '', Turno: 'Manhã', Horario: '', Unidade: '', Setor_Consultorio: '', Status_Turno: 'Trabalhando', Substituindo: '' }); setDatesToSave([]); setIsModalOpen(true); }} className="bg-primary text-white font-black px-6 py-4 rounded-full shadow-xl shadow-blue-900/20 hover:scale-105 hover:-translate-y-1 transition shrink-0 flex items-center gap-2"><i className="ph-bold ph-plus text-xl"></i></button>}
                        </div>
                    </div>

                    {activeSubTab === 'Painel Hoje' ? <PainelDoDia /> : (
                        <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] shadow-sm border border-gray-100 dark:border-slate-700 p-6 md:p-10 relative overflow-hidden">
                            <div className="flex justify-between items-center mb-8 md:mb-12">
                                <button onClick={()=>setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth()-1, 1))} className="w-12 h-12 md:w-16 md:h-16 bg-gray-50 dark:bg-slate-900 rounded-2xl hover:scale-110 transition shadow-inner flex justify-center items-center text-xl text-gray-600 dark:text-gray-400"><i className="ph-bold ph-caret-left"></i></button>
                                <h2 className="text-3xl md:text-5xl font-black capitalize text-gray-900 dark:text-white text-center tracking-tight">{currentMonth.toLocaleString('pt-BR', { month: 'long', year: 'numeric' })}</h2>
                                <button onClick={()=>setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth()+1, 1))} className="w-12 h-12 md:w-16 md:h-16 bg-gray-50 dark:bg-slate-900 rounded-2xl hover:scale-110 transition shadow-inner flex justify-center items-center text-xl text-gray-600 dark:text-gray-400"><i className="ph-bold ph-caret-right"></i></button>
                            </div>
                            <div className="grid grid-cols-7 gap-2 md:gap-6 mb-4 text-center border-b dark:border-slate-700 pb-4"><div className="font-black text-gray-400 uppercase tracking-widest text-[10px] md:text-sm">Dom</div><div className="font-black text-gray-400 uppercase tracking-widest text-[10px] md:text-sm">Seg</div><div className="font-black text-gray-400 uppercase tracking-widest text-[10px] md:text-sm">Ter</div><div className="font-black text-gray-400 uppercase tracking-widest text-[10px] md:text-sm">Qua</div><div className="font-black text-gray-400 uppercase tracking-widest text-[10px] md:text-sm">Qui</div><div className="font-black text-gray-400 uppercase tracking-widest text-[10px] md:text-sm">Sex</div><div className="font-black text-gray-400 uppercase tracking-widest text-[10px] md:text-sm">Sáb</div></div>
                            <div className="grid grid-cols-7 gap-2 md:gap-6 relative z-10">
                                {Array(firstDayOfMonth).fill(null).map((_, i) => <div key={`e-${i}`} className="aspect-square opacity-20 bg-gray-50 dark:bg-slate-900 rounded-[1.5rem]" />)}
                                {Array(daysInMonth).fill(null).map((_, i) => {
                                    const day = i + 1; const dateStrCompleto = `${String(day).padStart(2, '0')}/${String(currentMonth.getMonth() + 1).padStart(2, '0')}/${currentMonth.getFullYear()}`;
                                    const pessoasNoDia = filteredEscalas.filter(e => e && (safeString(e.Data).includes(dateStrCompleto) || safeString(e.Data).includes(`${String(day).padStart(2, '0')}/${String(currentMonth.getMonth() + 1).padStart(2, '0')}/${String(currentMonth.getFullYear()).slice(2)}`)));
                                    const isToday = dateStrCompleto === todayStr;
                                    return (
                                        <div key={day} onClick={() => setSelectedDate(dateStrCompleto)} className={`aspect-square rounded-xl md:rounded-[2rem] border-2 p-3 md:p-6 flex flex-col cursor-pointer card-hover ${isToday ? 'border-primary bg-blue-50/50 dark:bg-blue-900/20 shadow-lg' : 'border-gray-100 dark:border-slate-700 hover:border-primary bg-white dark:bg-slate-800'}`}>
                                            <span className={`text-xl md:text-3xl font-black ${isToday ? 'text-primary' : 'text-gray-900 dark:text-white'}`}>{day}</span>
                                            <div className="mt-auto w-full">{pessoasNoDia.length > 0 && <div className={`w-full text-center text-[9px] md:text-xs font-black py-1.5 md:py-2.5 rounded-lg md:rounded-xl shadow-sm ${activeSubTab.includes('Médicos') ? 'bg-primary text-white' : 'bg-secondary text-white'}`}>{pessoasNoDia.length} <span className="hidden md:inline">Plantões</span></div>}</div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    )}
                    
                    {selectedDate && !selectedPerson && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 glass-modal animate-fade-in" onClick={() => setSelectedDate(null)}>
                            <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] w-full max-w-6xl p-8 md:p-12 shadow-2xl relative border border-gray-100 dark:border-slate-700 flex flex-col max-h-[90vh] animate-pop-in" onClick={e => e.stopPropagation()}>
                                <button onClick={()=>setSelectedDate(null)} className="absolute top-6 right-6 md:top-10 md:right-10 w-12 h-12 bg-gray-50 dark:bg-slate-700 hover:bg-red-500 hover:text-white rounded-full transition flex justify-center items-center text-xl shadow-sm"><i className="ph-bold ph-x"></i></button>
