                                    {filteredEscalas.filter(e => safeString(e.Data).includes(selectedDate) || safeString(e.Data).includes(selectedDate.substring(0,6) + selectedDate.substring(8,10))).map((esc, i) => (
                                        <div key={i} onClick={() => (canEdit || isColab) && setSelectedPerson(esc)} className="bg-white dark:bg-slate-900 border-2 border-gray-100 dark:border-slate-700 rounded-3xl p-6 cursor-pointer card-hover hover:border-primary flex flex-col">
                                            <h4 className="font-black text-xl mb-3 text-gray-900 dark:text-white">{safeString(esc.Nome_Profissional)}</h4>
                                            <p className="text-sm font-black bg-gray-50 dark:bg-slate-800 px-3 py-1.5 rounded-xl mb-4 text-gray-600 dark:text-slate-300">{safeString(esc.Turno)} • {safeString(esc.Horario)}</p>
                                            <div className="mt-auto flex justify-between"><span className="text-[10px] font-black uppercase px-4 py-1.5 rounded-full bg-green-100 text-green-800">{safeString(esc.Status_Turno)||'Ativo'}</span><span className="text-primary text-xs font-black">Abrir</span></div>
                                        </div>
                                    ))}
                                    {filteredEscalas.filter(e => safeString(e.Data).includes(selectedDate)).length === 0 && <div className="col-span-full text-center text-gray-400 font-black text-2xl p-12">Ninguém escalado.</div>}
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Ação de Clique no Card (Status e Substituição) */}
                    {selectedPerson && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 backdrop-blur-xl bg-gray-900/60 animate-fade-in" onClick={() => {setSelectedPerson(null); setShowSwapSugg(false)}}>
                            <div className="bg-white dark:bg-slate-800 rounded-[3rem] w-full max-w-lg p-8 shadow-2xl relative border border-white dark:border-slate-700" onClick={e => e.stopPropagation()}>
                                <button onClick={()=>{setSelectedPerson(null); setShowSwapSugg(false)}} className="absolute top-6 right-6 w-10 h-10 bg-gray-100 dark:bg-slate-700 hover:bg-gray-200 dark:hover:bg-slate-600 rounded-full flex justify-center items-center"><i className="ph-bold ph-x"></i></button>
                                
                                <h2 className="text-2xl font-black mb-1 text-gray-900 dark:text-white">{safeString(selectedPerson.Nome_Profissional)}</h2>
                                <p className="text-sm font-bold text-gray-400 mb-8">{safeString(selectedPerson.Setor_Consultorio)} • {safeString(selectedPerson.Horario)}</p>

                                <div className="space-y-4 mb-8">
                                    <h4 className="text-xs font-black uppercase text-gray-400 tracking-widest">Avisar Sistema:</h4>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={()=>{handleStatusChange(selectedPerson, 'Trabalhando'); setSelectedPerson(null);}} className="p-4 rounded-xl border-2 hover:border-green-500 bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800 text-green-700 dark:text-green-400 font-black flex items-center justify-center gap-2 transition"><i className="ph-fill ph-check-circle text-2xl"></i> Voltei</button>
                                        <button onClick={()=>{handleStatusChange(selectedPerson, 'Intervalo'); setSelectedPerson(null);}} className="p-4 rounded-xl border-2 hover:border-orange-500 bg-orange-50 dark:bg-orange-900/20 border-orange-200 dark:border-orange-800 text-orange-700 dark:text-orange-400 font-black flex items-center justify-center gap-2 transition"><i className="ph-fill ph-coffee text-2xl"></i> Fui Lanchar</button>
                                    </div>
                                </div>

                                {canEdit && (
                                    <div className="border-t dark:border-slate-700 pt-6 space-y-3">
                                        <h4 className="text-xs font-black uppercase text-gray-400 tracking-widest mb-2">Ações Administrativas:</h4>
                                        <button onClick={()=>setShowSwapSugg(!showSwapSugg)} className="w-full py-4 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-xl font-black shadow flex justify-center items-center gap-2 hover:scale-[1.02] transition"><i className="ph-bold ph-arrows-left-right"></i> Sugerir Substituto (Trocar)</button>
                                        <button onClick={async()=>{if(confirm('Excluir plantão?')){ await api.deleteRecord('ESCALAS', selectedPerson.ID); onRefresh('ESCALAS'); setSelectedPerson(null); setSelectedDate(null); }}} className="w-full py-4 bg-red-50 dark:bg-red-900/20 text-red-600 rounded-xl font-black transition flex justify-center items-center gap-2"><i className="ph-bold ph-trash"></i> Excluir Plantão</button>
                                    </div>
                                )}

                                {showSwapSugg && canEdit && (
                                    <div className="mt-4 bg-gray-50 dark:bg-slate-900 rounded-2xl p-4 border dark:border-slate-700 animate-fade-in">
                                        <h4 className="text-xs font-black uppercase text-gray-500 mb-3">Colaboradores com as mesmas Competências:</h4>
                                        <div className="space-y-2 max-h-40 overflow-y-auto custom-scrollbar pr-2">
                                            {findSubstitutes(selectedPerson.Nome_Profissional).map((sub, idx) => (
                                                <div key={idx} className="bg-white dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-600 flex justify-between items-center">
                                                    <div>
                                                        <p className="font-black text-sm text-gray-900 dark:text-white">{safeString(sub['Nome Completo'])}</p>
                                                        <p className="text-[10px] font-bold text-gray-400 mt-0.5" title={safeString(sub['Horários Flexíveis'])}>Disponível • {safeString(sub['Horários Flexíveis']).substring(0,25)}...</p>
                                                    </div>
                                                    <button onClick={async()=>{ 
                                                        await api.saveRecord('ESCALAS', { ...selectedPerson, ID: '', Nome_Profissional: safeString(sub['Nome Completo']), Substituindo: safeString(selectedPerson.Nome_Profissional) }, false);
                                                        showToast(`Substituto acionado: ${sub['Nome Completo']}.`); 
                                                        setSelectedPerson(null); setShowSwapSugg(false); 
                                                        onRefresh('ESCALAS');
                                                    }} className="bg-primary text-white text-xs font-black px-3 py-2 rounded-lg hover:bg-blue-700 transition">Acionar</button>
                                                </div>
                                            ))}
                                            {findSubstitutes(selectedPerson.Nome_Profissional).length === 0 && <p className="text-sm font-bold text-gray-400 text-center py-4">Nenhum colaborador compatível livre hoje.</p>}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                    
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 glass-modal" onMouseDown={()=>setIsModalOpen(false)}>
                            <div className="bg-white dark:bg-slate-800 rounded-[3rem] w-full max-w-6xl max-h-[90vh] flex flex-col shadow-2xl animate-pop-in border border-gray-100 dark:border-slate-700" onMouseDown={e=>e.stopPropagation()}>
                                <div className="p-8 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center bg-gray-50/50 dark:bg-slate-900"><h3 className="text-3xl font-black text-gray-900 dark:text-white">Lançamento em Lote</h3><button onClick={() => setIsModalOpen(false)} className="w-12 h-12 bg-white dark:bg-slate-700 rounded-full hover:bg-red-500 hover:text-white shadow-sm text-xl transition"><i className="ph-bold ph-x"></i></button></div>
                                <div className="p-8 flex flex-col lg:flex-row gap-12 overflow-y-auto custom-scrollbar">
                                    <div className="lg:w-1/2">
                                        <h4 className="font-black mb-6 text-xl text-gray-900 dark:text-white">1. Selecione as Datas</h4>
                                        <div className="grid grid-cols-7 gap-2">
                                            {Array(firstDayOfMonth).fill(null).map((_, i) => <div key={`empty-${i}`} />)}
                                            {Array(daysInMonth).fill(null).map((_, i) => {
                                                const day = i + 1; const dStr = `${String(day).padStart(2, '0')}/${String(currentMonth.getMonth() + 1).padStart(2, '0')}/${currentMonth.getFullYear()}`; const sel = datesToSave.includes(dStr);
                                                return <button type="button" key={day} onClick={() => { if(sel) setDatesToSave(datesToSave.filter(x => x !== dStr)); else setDatesToSave([...datesToSave, dStr]); }} className={`w-full aspect-square rounded-2xl font-black text-lg transition-all ${sel ? 'bg-primary text-white shadow-xl scale-110' : 'bg-white dark:bg-slate-800 border-2 border-gray-100 dark:border-slate-700 hover:border-primary shadow-sm text-gray-800 dark:text-white'}`}>{day}</button>
                                            })}
                                        </div>
                                    </div>
                                    <div className="lg:w-1/2">
                                        <h4 className="font-black mb-6 text-xl text-gray-900 dark:text-white">2. Dados do Plantão</h4>
                                        <form id="esc-form" onSubmit={handleSaveBatch} className="space-y-6">
                                            <div><label className="block text-xs font-black text-gray-400 mb-2 uppercase">Profissional</label><select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-custom outline-none focus:ring-2 focus:ring-primary font-black text-gray-900 dark:text-white" value={safeString(formData.Nome_Profissional)} onChange={e => setFormData({...formData, Nome_Profissional: e.target.value})} required><option value="">Selecione...</option>{activeSubTab.includes('Médicos') ? corpoClinico.map((m,i) => <option key={i} value={safeString(m?.Médico)}>{safeString(m?.Médico)}</option>) : usuarios.map((u,i) => <option key={i} value={safeString(u?.['Nome Completo'])}>{safeString(u?.['Nome Completo'])}</option>)}</select></div>
                                            <div className="grid grid-cols-2 gap-6">
                                                <div><label className="block text-xs font-black text-gray-400 mb-2 uppercase">Turno</label><select className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-custom outline-none font-bold text-gray-900 dark:text-white" value={safeString(formData.Turno)} onChange={e => setFormData({...formData, Turno: e.target.value})}><option value="Manhã">Manhã</option><option value="Tarde">Tarde</option><option value="Noite">Noite</option></select></div>
                                                <div><label className="block text-xs font-black text-gray-400 mb-2 uppercase">Horário</label><input type="text" className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-custom outline-none font-bold text-gray-900 dark:text-white" value={safeString(formData.Horario)} onChange={e => setFormData({...formData, Horario: e.target.value})} placeholder="Ex: 08:00 às 18:00" /></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-6">
                                                <div><label className="block text-xs font-black text-gray-400 mb-2 uppercase">Unidade</label><input type="text" className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-custom outline-none font-bold text-gray-900 dark:text-white" value={safeString(formData.Unidade)} onChange={e => setFormData({...formData, Unidade: e.target.value})} placeholder="Sede" /></div>
                                                <div><label className="block text-xs font-black text-gray-400 mb-2 uppercase">Setor / Consultório</label><input type="text" className="w-full px-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-custom outline-none font-bold text-gray-900 dark:text-white" value={safeString(formData.Setor_Consultorio)} onChange={e => setFormData({...formData, Setor_Consultorio: e.target.value})} placeholder="Recepção 1" /></div>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                                <div className="p-6 border-t border-gray-100 dark:border-slate-700 flex justify-end gap-4 bg-gray-50/50 dark:bg-slate-900"><button onClick={() => setIsModalOpen(false)} className="px-10 py-4 font-black text-gray-500 hover:text-gray-800 dark:hover:text-white transition">Cancelar</button><button type="submit" form="esc-form" disabled={loadingAction} className="px-12 py-4 bg-primary text-white font-black rounded-custom shadow-xl hover:-translate-y-1 transition">{loadingAction?'Gravando...':'Gravar Múltiplos'}</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const DataTableGeneric = ({ title, tabName, data, user, onRefresh, showToast }) => {
            const safeData = Array.isArray(data) ? data : [];
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({});
            const [loading, setLoading] = useState(false);
            const [search, setSearch] = useState('');
            const [currentSchema, setCurrentSchema] = useState([]);
            
            let dynamicKeys = ['ID'];
            if (safeData.length > 0 && typeof safeData[0] === 'object' && safeData[0] !== null) dynamicKeys = Object.keys(safeData[0]);
            
            const schema = tabSchemas[tabName] || dynamicKeys || ['ID'];
            const nivelKey = user && typeof user === 'object' ? Object.keys(user).find(k => safeString(k).toLowerCase().includes('acesso')) : null;
            const canEdit = nivelKey && ['admin', 'supervisor', 'supervisão'].some(role => safeString(user[nivelKey]).toLowerCase().includes(role));

            const filteredData = safeData.filter(row => row && typeof row === 'object' && Object.values(row).some(val => safeString(val).toLowerCase().includes(search.toLowerCase())));

            const openModal = (row = null, customSchema = null) => {
                let initial = {}; const s = customSchema || schema;
                s.forEach(col => initial[col] = row ? safeString(row[col]) : '');
                setFormData(initial); setCurrentSchema(s); setIsModalOpen(true);
            };

            const handleSave = async (e) => {
                e.preventDefault(); setLoading(true);
                const res = await api.saveRecord(tabName, formData, !!formData.ID);
                setLoading(false);
                if (res && res.success) { setIsModalOpen(false); onRefresh(tabName); showToast('Salvo com sucesso!'); } else showToast('Erro ao salvar.', 'error');
            };

            const handleDelete = async (id) => {
                if(confirm('Excluir este item permanentemente?')) {
                    const res = await api.deleteRecord(tabName, id);
                    if (res && res.success) { onRefresh(tabName); showToast('Excluído com sucesso!'); }
                }
            };

            if(tabName === 'CONVÊNIOS') return <><ConveniosMatrixView data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} schema={schema} /> {isModalOpen && <ModalForm title="Regra de Convênio" schema={currentSchema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'CORPO CLINICO') return <><CorpoClinicoCards data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} /> {isModalOpen && <ModalForm title="Médico" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'CONTATOS') return <><ContatosViewTabs data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} schema={schema} /> {isModalOpen && <ModalForm title="Contato" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'MURAL_AVISOS') return <><MuralAvisosView data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} /> {isModalOpen && <ModalForm title="Aviso" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'BOLETINS_INFORMATIVOS') return <><BoletinsView data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} /> {isModalOpen && <ModalForm title="Mídia/Informativo" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;
            if(tabName === 'SENHAS E LOGINS GERAIS') return <><SenhasView data={safeData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} schema={schema} /> {isModalOpen && <ModalForm title="Acesso" schema={schema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}</>;

            return (
                <>
                    <DefaultTableView title={title} schema={schema} filteredData={filteredData} canEdit={canEdit} openModal={openModal} handleDelete={handleDelete} search={search} setSearch={setSearch} />
                    {isModalOpen && <ModalForm title={title} schema={currentSchema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}
                </>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('Home');
            const [sheetData, setSheetData] = useState({});
            const [darkMode, setDarkMode] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            
            // Lógica de Login Misto (Equipe vs Firebase)
            const [loginView, setLoginView] = useState('selecao'); // selecao | geral | painel
            const [loginErrorMsg, setLoginErrorMsg] = useState('');
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [isSharedAuth, setIsSharedAuth] = useState(localStorage.getItem('shared_auth') === 'true');

            // ⚠️ SENHA DE ACESSO GERAL PARA COLABORADORES DA CLÍNICA
            const SENHA_ACESSO_GERAL = "Csv@123"; 

            const userFoto = user?.Foto_Perfil_URL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            const userName = user?.['Nome Completo'] || (isSharedAuth ? 'Equipe São Vicente' : 'Usuário');

            const nivelKey = user && typeof user === 'object' ? Object.keys(user).find(k => safeString(k).toLowerCase().includes('acesso')) : null;
            const isAdmin = user && nivelKey && ['admin', 'supervisor', 'supervisão'].some(role => safeString(user[nivelKey]).toLowerCase().includes(role));

            // Detector Inteligente de Internet
            useEffect(() => {
                const handleOnline = () => { setIsOffline(false); showToast('Conexão restabelecida! Sincronizando com a nuvem...', 'success'); };
                const handleOffline = () => { setIsOffline(true); showToast('Rede perdida. Modo leitura ativado (Offline).', 'warning'); };
                window.addEventListener('online', handleOnline); window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); }
            }, []);

            useEffect(() => {
                const unsub = auth?.onAuthStateChanged(async (u) => {
                    if (u) {
                        try {
                            const userDoc = await db.collection('USUARIOS').where('E-mail', '==', u.email).get();
                            if (!userDoc.empty) setUser({ ID: userDoc.docs[0].id, ...userDoc.docs[0].data() });
                            else setUser({ 'E-mail': u.email, 'Nome Completo': u.email.split('@')[0], 'Nível de Acesso': 'Admin' });
                        } catch (err) {
                            setUser({ 'E-mail': u.email, 'Nome Completo': u.email.split('@')[0], 'Nível de Acesso': 'Admin' });
                        }
                    } else {
                        if(isSharedAuth) {
                            setUser({ 'Nome Completo': 'Equipe São Vicente', 'Nível de Acesso': 'Colaborador' });
                        } else {
                            setUser(null);
                        }
                    }
                    setLoading(false);
                });
                return () => unsub && unsub();
            }, [isSharedAuth]);
                    
            const showToast = (msg, type = 'success') => { setToast({ show: true, message: msg, type }); setTimeout(() => setToast(p => ({ ...p, show: false })), 3500); };

            useEffect(() => {
                if (darkMode) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } 
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            }, [darkMode]);

            useEffect(() => {
                const init = async () => {
                    if(!isFirebaseConfigured) return;
                    const allData = await api.fetchAll(); 
                    if(allData && Object.keys(allData).length > 0) {
                        setSheetData(allData);
                        const conf = allData['CONFIGURACOES'] || [];
                        conf.forEach(c => {
                            if(c.Chave === 'cor_primaria') document.documentElement.style.setProperty('--color-primary', c.Valor);
                            if(c.Chave === 'cor_secundaria') document.documentElement.style.setProperty('--color-secondary', c.Valor);
                            if(c.Chave === 'cor_fundo') document.documentElement.style.setProperty('--color-bg', c.Valor);
                        });
                    }
                }; init();
            }, []);

            const loadData = async (tab) => {
                setLoading(true);
                if (tab === 'Home') {
                    const [news, atend, lembretes, mural] = await Promise.all([api.fetch('NOVIDADES_E_EVENTOS'), api.fetch('CONTROLE_ATENDIMENTOS'), api.fetch('LEMBRETES_HORA'), api.fetch('MURAL_AVISOS')]);
                    setSheetData(prev => ({ ...prev, 'NOVIDADES_E_EVENTOS': news, 'CONTROLE_ATENDIMENTOS': atend, 'LEMBRETES_HORA': lembretes, 'MURAL_AVISOS': mural }));
                } else if (tab === 'ESCALAS') {
                    const [escala, medicos, u, cont] = await Promise.all([api.fetch('ESCALAS'), api.fetch('CORPO CLINICO'), api.fetch('USUARIOS'), api.fetch('CONTROLE_ATENDIMENTOS')]);
                    setSheetData(prev => ({ ...prev, 'ESCALAS': escala, 'CORPO CLINICO': medicos, 'USUARIOS': u, 'CONTROLE_ATENDIMENTOS': cont }));
                } else {
                    const data = await api.fetch(tab); setSheetData(prev => ({ ...prev, [tab]: data }));
                }
                setLoading(false);
            };

            if (!user) {
                const handleFirebaseLogin = async (e) => {
                    e.preventDefault(); setLoading(true); setLoginErrorMsg('');
                    const res = await api.login(e.target.email.value, e.target.password.value);
                    if (res && res.success) { setUser(res.user); loadData('Home'); } 
                    else { setLoginErrorMsg(res?.message || 'Erro ao conectar com o servidor.'); }
                    setLoading(false);
                };

                const handleSharedLogin = (e) => {
                    e.preventDefault(); setLoginErrorMsg('');
                    if (e.target.shared_password.value === SENHA_ACESSO_GERAL) {
                        localStorage.setItem('shared_auth', 'true');
                        setIsSharedAuth(true);
                        setUser({ 'Nome Completo': 'Equipe São Vicente', 'Nível de Acesso': 'Colaborador' });
                        loadData('Home');
                    } else { setLoginErrorMsg('Senha de acesso geral incorreta.'); }
                };

                return (
                    <div className="min-h-screen bg-medical dark:bg-slate-900 flex flex-col items-center justify-center p-4">
                        {isOffline && <div className="mb-6 bg-red-600 text-white px-6 py-2 rounded-full font-bold shadow-lg animate-pulse flex items-center gap-2"><i className="ph-bold ph-wifi-slash"></i> Sem Internet. O login pode falhar se não estiver em cache.</div>}
                        <div className="bg-white dark:bg-slate-800 rounded-[3rem] shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col md:flex-row animate-fade-in border border-gray-100 dark:border-slate-700">
                            <div className="md:w-5/12 bg-gradient-to-br from-primary to-blue-800 text-white p-12 flex flex-col justify-center relative">
                                <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                                <div className="relative z-10 text-center">
                                    <div className="w-28 h-28 mx-auto bg-white/10 rounded-[2rem] flex items-center justify-center mb-6 backdrop-blur-sm shadow-xl"><i className="ph-fill ph-heartbeat text-7xl"></i></div>
                                    <h1 className="text-4xl font-black mb-4">São Vicente</h1>
                                    <p className="text-blue-100 font-medium text-sm">Portal interno de comunicação, escalas e processos da clínica.</p>
                                </div>
                            </div>
                            <div className="md:w-7/12 p-12 bg-white dark:bg-slate-800 flex flex-col justify-center">
                                {loginErrorMsg && <div className="mb-6 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 p-4 rounded-xl flex gap-3 items-start animate-pop-in"><i className="ph-fill ph-warning-circle text-red-600 dark:text-red-400 text-xl shrink-0 mt-0.5"></i><p className="text-sm font-bold text-red-800 dark:text-red-200 leading-tight">{loginErrorMsg}</p></div>}
                                {loginView === 'selecao' && (
                                    <div className="space-y-6 animate-fade-in">
                                        <h2 className="text-2xl font-black text-gray-800 dark:text-white mb-8">Selecione seu acesso:</h2>
                                        <button onClick={()=>setLoginView('geral')} className="w-full bg-blue-50 hover:bg-primary dark:bg-slate-700 dark:hover:bg-primary group p-6 rounded-2xl border-2 border-blue-100 dark:border-slate-600 hover:border-primary transition flex items-center gap-6 text-left">
                                            <div className="w-16 h-16 rounded-xl bg-white dark:bg-slate-800 text-primary flex justify-center items-center shrink-0 shadow-sm"><i className="ph-fill ph-users text-3xl"></i></div>
                                            <div><h3 className="font-black text-xl text-gray-900 dark:text-white group-hover:text-white transition">Acesso Equipe</h3><p className="text-sm text-gray-500 dark:text-gray-400 group-hover:text-blue-100 transition mt-1">Visualização de escalas, ramais e consultas.</p></div>
                                        </button>
                                        <button onClick={()=>setLoginView('painel')} className="w-full bg-orange-50 hover:bg-secondary dark:bg-slate-700 dark:hover:bg-secondary group p-6 rounded-2xl border-2 border-orange-100 dark:border-slate-600 hover:border-secondary transition flex items-center gap-6 text-left">
                                            <div className="w-16 h-16 rounded-xl bg-white dark:bg-slate-800 text-secondary flex justify-center items-center shrink-0 shadow-sm"><i className="ph-fill ph-shield-star text-3xl"></i></div>
                                            <div><h3 className="font-black text-xl text-gray-900 dark:text-white group-hover:text-white transition">Acesso Supervisor</h3><p className="text-sm text-gray-500 dark:text-gray-400 group-hover:text-orange-100 transition mt-1">Edição de dados e gestão de equipe.</p></div>
                                        </button>
                                        <div className="pt-6 text-center"><button onClick={()=>setLoginView('painel')} className="text-xs font-bold text-gray-400 hover:text-primary transition underline decoration-dashed underline-offset-4">Acesso Administrador Restrito</button></div>
                                    </div>
                                )}
                                {loginView === 'geral' && (
                                    <form onSubmit={handleSharedLogin} className="space-y-6 animate-fade-in">
                                        <button type="button" onClick={()=>{setLoginView('selecao'); setLoginErrorMsg('');}} className="text-gray-400 hover:text-primary flex items-center gap-2 mb-6 font-bold text-sm"><i className="ph-bold ph-arrow-left"></i> Voltar</button>
                                        <h2 className="text-2xl font-black text-gray-800 dark:text-white mb-2">Acesso da Equipe</h2>
                                        <p className="text-sm text-gray-500 mb-8">Digite a senha geral fornecida pela coordenação.</p>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Senha de Acesso Único</label><div className="relative"><i className="ph-fill ph-lock-key absolute left-5 top-4 text-gray-400 text-xl"></i><input name="shared_password" type="password" className="w-full pl-14 pr-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-100 dark:border-slate-700 rounded-custom outline-none focus:ring-2 focus:ring-primary font-bold text-gray-900 dark:text-white transition" placeholder="Sua senha..." required /></div></div>
                                        <button type="submit" className="w-full bg-primary hover:opacity-90 text-white font-black py-5 rounded-custom shadow-xl shadow-primary/30 transition transform hover:-translate-y-1">Entrar no Portal</button>
                                    </form>
                                )}
                                {loginView === 'painel' && (
                                    <form onSubmit={handleFirebaseLogin} className="space-y-6 animate-fade-in">
                                        <button type="button" onClick={()=>{setLoginView('selecao'); setLoginErrorMsg('');}} className="text-gray-400 hover:text-primary flex items-center gap-2 mb-6 font-bold text-sm"><i className="ph-bold ph-arrow-left"></i> Voltar</button>
                                        <h2 className="text-2xl font-black text-gray-800 dark:text-white mb-2">Acesso Gestão</h2>
                                        <p className="text-sm text-gray-500 mb-8">Faça login com suas credenciais do painel.</p>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">E-mail</label><div className="relative"><i className="ph-fill ph-user absolute left-5 top-4 text-gray-400 text-xl"></i><input name="email" type="email" className="w-full pl-14 pr-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-100 dark:border-slate-700 rounded-custom outline-none focus:ring-2 focus:ring-primary font-bold text-gray-900 dark:text-white transition" required /></div></div>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Senha</label><div className="relative"><i className="ph-fill ph-lock-key absolute left-5 top-4 text-gray-400 text-xl"></i><input name="password" type="password" className="w-full pl-14 pr-5 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-100 dark:border-slate-700 rounded-custom outline-none focus:ring-2 focus:ring-primary font-bold text-gray-900 dark:text-white transition" required /></div></div>
                                        <button type="submit" disabled={loading} className="w-full bg-secondary hover:opacity-90 text-white font-black py-5 rounded-custom shadow-xl shadow-secondary/30 transition transform hover:-translate-y-1">{loading ? 'Conectando...' : 'Acessar Gestão'}</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            const menus = [
                { id: 'Home', icon: 'ph-house', label: 'Dashboard Inicial' },
                { id: 'MURAL_AVISOS', icon: 'ph-presentation-chart', label: 'Mural de Avisos' },
                { id: 'BOLETINS_INFORMATIVOS', icon: 'ph-newspaper', label: 'Boletins e Mídia' },
                { id: 'ESCALAS', icon: 'ph-calendar-check', label: 'Escalas e Plantões' },
                { id: 'CONVÊNIOS', icon: 'ph-file-text', label: 'Matriz de Convênios' },
                { id: 'CORPO CLINICO', icon: 'ph-stethoscope', label: 'Corpo Clínico' },
                { id: 'CONTATOS', icon: 'ph-address-book', label: 'Contatos Rápidos' },
                { id: 'CHAT_MENSAGENS', icon: 'ph-chat-circle-dots', label: 'Chat Interno' },
                { id: 'EXAMES DE IMAGEM', icon: 'ph-bone', label: 'Exames de Imagem' },
                { id: 'EXAMES DE IMAGEM E OUTROS', icon: 'ph-files', label: 'Exames e Laudos' },
                { id: 'CONSULTA E PROCEDIMENTOS', icon: 'ph-first-aid-kit', label: 'Consultas' },
                { id: 'EXAMES LABORATORIAIS', icon: 'ph-flask', label: 'Laboratório' },
                { id: 'INSTITUTOS', icon: 'ph-buildings', label: 'Institutos' },
                { id: 'REMOÇÕES', icon: 'ph-car', label: 'Remoções' },
                { id: 'SENHAS E LOGINS GERAIS', icon: 'ph-lock-key', label: 'Senhas de Sistemas' }
            ];
            const adminMenus = [ { id: 'CONTROLE_ATENDIMENTOS', icon: 'ph-chart-line-up', label: 'Metas Unimed' }, { id: 'USUARIOS', icon: 'ph-users', label: 'Colaboradores' }, { id: 'DESIGN_INTERFACE', icon: 'ph-magic-wand', label: 'Design de Interface' }, { id: 'LEMBRETES_HORA', icon: 'ph-clock', label: 'Avisos do Relógio' } ];

            const foundMenu = menus.concat(adminMenus).find(m => m.id === activeTab);
            const titleTab = foundMenu ? foundMenu.label : activeTab;

            return (
                <div className="min-h-screen flex flex-col md:flex-row overflow-hidden relative selection:bg-primary selection:text-white">
                    {/* AVISO OFFLINE SUPERIOR */}
                    {isOffline && <div className="absolute top-0 inset-x-0 z-[99999] bg-red-600 text-white text-xs font-black py-1.5 flex justify-center items-center gap-2 shadow-md animate-fade-in"><i className="ph-bold ph-wifi-slash text-base"></i> Sem Conexão: O portal está operando com dados em cache local.</div>}

                    {toast.show && <div className={`fixed bottom-8 right-8 z-[9999] px-8 py-5 rounded-custom shadow-2xl text-white font-black text-lg animate-slide-up bg-green-500`}><i className="ph-bold ph-check-circle text-2xl"></i> {toast.message}</div>}

                    <aside className="w-80 bg-white dark:bg-slate-800 border-r border-gray-100 dark:border-slate-700 flex flex-col h-screen shrink-0 shadow-2xl z-30 transition-colors">
                        <div className="p-8 flex items-center border-b bg-gray-50/50 cursor-pointer" onClick={()=>{setActiveTab('Home'); loadData('Home');}}>
                            <div className="bg-primary text-white p-3 rounded-2xl mr-3"><i className="ph-fill ph-heartbeat text-3xl"></i></div>
                            <div><h1 className="text-2xl font-black leading-none">Portal</h1><span className="text-[10px] font-black text-primary uppercase">São Vicente</span></div>
                        </div>
                        <div className="p-6 border-b border-gray-50 dark:border-slate-700 flex items-center gap-4">
                            {userFoto ? <img src={formatImageUrl(userFoto)} className="w-14 h-14 rounded-custom object-cover shadow-md shrink-0 border-2 border-white dark:border-slate-700" alt="Avatar" /> : <div className="w-14 h-14 rounded-custom bg-gradient-to-tr from-secondary to-orange-400 flex items-center justify-center text-white font-black text-2xl shadow-md shrink-0">{safeString(userName || 'U').charAt(0).toUpperCase()}</div>}
                            <div className="flex-1 overflow-hidden">
                                <p className="text-base font-black truncate text-gray-900 dark:text-white">{userName}</p>
                                <p className="text-[10px] font-black text-primary bg-primary/10 px-2 py-1 rounded-md inline-block mt-1 uppercase tracking-widest">{isAdmin?'Admin':'Colaborador'}</p>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-1 custom-scrollbar pb-8 mt-4 md:mt-0">
                            <div className="px-4 mb-2 mt-2 text-[10px] font-black text-gray-400 uppercase">Menu</div>
                            {menus.map(m => <button key={m.id} onClick={()=>{setActiveTab(m.id); loadData(m.id);}} className={`w-full flex items-center gap-4 px-5 py-3 rounded-custom text-sm font-bold transition-all ${activeTab===m.id?'bg-primary text-white shadow-xl scale-[1.02]':'text-gray-500 hover:bg-gray-100'}`}><i className={`ph-fill ${m.icon} text-xl`}></i> {m.label}</button>)}
                            
                            {isAdmin && (
                                <>
                                    <div className="px-4 mt-6 mb-2 text-[10px] font-black text-gray-400 uppercase">Admin</div>
                                    {adminMenus.map(m => <button key={m.id} onClick={()=>{setActiveTab(m.id); loadData(m.id);}} className={`w-full flex items-center gap-4 px-5 py-3 rounded-custom text-sm font-bold transition-all ${activeTab===m.id?'bg-gray-900 text-white shadow-xl scale-[1.02]':'text-gray-500 hover:bg-gray-100'}`}><i className={`ph-fill ${m.icon} text-xl`}></i> {m.label}</button>)}
                                </>
                            )}
                            <button onClick={()=>{auth?.signOut(); localStorage.removeItem('shared_auth'); setIsSharedAuth(false); setUser(null);}} className="w-full flex items-center gap-4 px-5 py-3 rounded-custom text-sm font-bold text-red-600 hover:bg-red-50 mt-8"><i className="ph-fill ph-sign-out text-xl"></i> Sair</button>
                        </div>
                    </aside>

                    <main className="flex-1 h-screen overflow-y-auto relative custom-scrollbar p-6 md:p-10 pt-10">
                        <ErrorBoundary>
                            {loading && <div className="fixed inset-0 bg-white/70 backdrop-blur z-50 flex items-center justify-center"><div className="animate-spin h-12 w-12 border-4 border-t-primary rounded-full"></div></div>}

                            {activeTab === 'Home' && !loading && (
                                <div className="space-y-12 animate-fade-in max-w-[1400px] mx-auto">
                                    <ClockWidget lembretesData={sheetData['LEMBRETES_HORA']} />
                                    <div>
                                        <h3 className="text-3xl font-black mb-8">Acesso Rápido</h3>
                                        <div className="grid grid-cols-2 md:grid-cols-6 gap-6">
                                            {[ { l: 'Mural', i: 'ph-presentation-chart', bg:'bg-blue-50', c:'text-blue-600', t: 'MURAL_AVISOS' }, { l: 'Painel', i: 'ph-kanban', bg:'bg-orange-50', c:'text-orange-600', t: 'ESCALAS' }, { l: 'Boletins', i: 'ph-newspaper', bg:'bg-purple-50', c:'text-purple-600', t: 'BOLETINS_INFORMATIVOS' }, { l: 'Consultas', i: 'ph-stethoscope', bg:'bg-blue-50', c:'text-blue-600', t: 'CONSULTA E PROCEDIMENTOS' }, { l: 'Imagem', i: 'ph-bone', bg:'bg-green-50', c:'text-green-600', t: 'EXAMES DE IMAGEM' }, { l: 'Senhas', i: 'ph-lock-key', bg:'bg-red-50', c:'text-red-600', t: 'SENHAS E LOGINS GERAIS' } ].map((d, i) => (
                                                <button key={i} onClick={()=>{setActiveTab(d.t);loadData(d.t)}} className={`${d.bg} ${d.c} p-6 rounded-[2rem] flex flex-col items-center justify-center gap-4 card-hover shadow-sm`}>
                                                    <i className={`ph-fill ${d.i} text-4xl`}></i><span className="font-black text-xs text-center uppercase tracking-widest">{d.l}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'CHAT_MENSAGENS' && !loading && <ChatModerno chatData={sheetData['CHAT_MENSAGENS']} user={user} onSaveChat={api.saveRecord} onRefresh={()=>loadData('CHAT_MENSAGENS')} />}
                            {activeTab === 'ESCALAS' && !loading && <EscalasContainer sheetData={sheetData} user={user} onRefresh={()=>loadData('ESCALAS')} showToast={showToast} />}
                            {activeTab === 'DESIGN_INTERFACE' && !loading && <DesignInterfacePanel sheetData={sheetData} onRefresh={()=>loadData('CONFIGURACOES')} showToast={showToast} />}

                            {activeTab !== 'Home' && activeTab !== 'CHAT_MENSAGENS' && activeTab !== 'ESCALAS' && activeTab !== 'DESIGN_INTERFACE' && !loading && (
                                <DataTableGeneric title={titleTab} tabName={activeTab} data={sheetData[activeTab] || []} user={user} onRefresh={()=>loadData(activeTab)} showToast={showToast} />
                            )}
                        </ErrorBoundary>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
