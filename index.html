                        <div className="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                            <div className="relative flex-1 sm:w-72"><i className="ph-bold ph-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i><input type="text" placeholder="Pesquisar..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-full outline-none focus:ring-2 focus:ring-primary font-bold text-sm dark:text-white shadow-inner" /></div>
                            {canEdit && <button onClick={() => openModal(null, schema)} className="bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-bold px-8 py-3 rounded-full hover:scale-105 transition text-sm flex items-center justify-center gap-2 shadow-lg"><i className="ph-bold ph-plus text-lg"></i> Novo Item</button>}
                        </div>
                    </div>
                    <div className="overflow-x-auto p-4 custom-scrollbar">
                        <table className="w-full text-left border-collapse min-w-[800px]">
                            <thead><tr className="text-gray-400 text-[10px] uppercase tracking-widest border-b-2 dark:border-slate-700">{schema.filter(c=>c!=='ID').map((col, i) => <th key={i} className="p-4 font-black">{col}</th>)}{canEdit && <th className="p-4 font-black text-right">Ações</th>}</tr></thead>
                            <tbody className="text-sm font-bold dark:text-slate-200">
                                {filteredData.length === 0 ? <tr><td colSpan="100%" className="text-center p-16 text-gray-400 font-black border-2 border-dashed dark:border-slate-700 rounded-2xl m-4 block">Nenhum dado cadastrado.</td></tr> : 
                                filteredData.map((row, i) => (
                                    <tr key={i} className="hover:bg-blue-50/50 dark:hover:bg-slate-700/50 border-b dark:border-slate-700 group transition">
                                        {schema.filter(c=>c!=='ID').map((col, j) => {
                                            const val = safeString(row[col]); const cl = col.toLowerCase();
                                            return <td key={j} className="p-4 whitespace-nowrap">{cl.includes('url')||cl.includes('foto')||cl.includes('imagem')?(val?<img src={formatImageUrl(val)} className="h-12 w-12 object-cover rounded-xl border dark:border-slate-600 shadow-sm"/>:<div className="h-12 w-12 bg-gray-100 dark:bg-slate-700 rounded-xl flex items-center justify-center text-gray-300"><i className="ph-fill ph-image text-xl"></i></div>):cl.includes('senha')?'••••••••':val==='Sim'||val==='Ativo'?<span className="bg-green-100 text-green-800 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest">{val}</span>:val==='Não'||val==='Inativo'?<span className="bg-red-100 text-red-800 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest">{val}</span>:val||'-'}</td>
                                        })}
                                        {canEdit && <td className="p-4 flex justify-end gap-2 opacity-50 group-hover:opacity-100 transition"><button onClick={()=>openModal(row, schema)} className="text-blue-600 bg-blue-50 dark:bg-slate-700 p-2.5 rounded-xl hover:bg-blue-600 hover:text-white shadow-sm transition hover:scale-110"><i className="ph-bold ph-pencil-simple text-lg"></i></button><button onClick={()=>handleDelete(row.ID)} className="text-red-600 bg-red-50 dark:bg-slate-700 p-2.5 rounded-xl hover:bg-red-600 hover:text-white shadow-sm transition hover:scale-110"><i className="ph-bold ph-trash text-lg"></i></button></td>}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {isModalOpen && <ModalForm title={title} schema={currentSchema} formData={formData} setFormData={setFormData} onSave={handleSave} onClose={()=>setIsModalOpen(false)} loading={loading}/>}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null); 
            const [loading, setLoading] = useState(true); 
            const [activeTab, setActiveTab] = useState('Home'); 
            const [sheetData, setSheetData] = useState({}); 
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            const [loginView, setLoginView] = useState('selecao'); 
            const [loginErrorMsg, setLoginErrorMsg] = useState(''); 
            const [isSharedAuth, setIsSharedAuth] = useState(localStorage.getItem('shared_auth') === 'true');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            // SUA SENHA GERAL DA EQUIPE
            const SENHA_ACESSO_GERAL = "sao.vicente2026"; 

            const userFoto = user?.Foto_Perfil_URL;
            const userName = user?.['Nome Completo'] || (isSharedAuth ? 'Equipe São Vicente' : 'Usuário');
            const nivelKey = user && typeof user === 'object' ? Object.keys(user).find(k => safeString(k).toLowerCase().includes('acesso')) : null;
            const isAdmin = user && nivelKey && ['admin', 'supervisor', 'supervisão'].some(role => safeString(user[nivelKey]).toLowerCase().includes(role));

            useEffect(() => {
                const unsub = auth?.onAuthStateChanged(async (u) => {
                    if (u && !isSharedAuth) {
                        try {
                            const userDoc = await db.collection('USUARIOS').where('E-mail', '==', u.email).get();
                            if (!userDoc.empty) setUser({ ID: userDoc.docs[0].id, ...userDoc.docs[0].data() });
                            else setUser({ 'E-mail': u.email, 'Nome Completo': u.email.split('@')[0], 'Nível de Acesso': 'Colaborador' });
                        } catch (err) { setUser({ 'E-mail': u.email, 'Nome Completo': (u.email||'').split('@')[0] || 'Usuário', 'Nível de Acesso': 'Colaborador' }); }
                    } else {
                        if(isSharedAuth) setUser({ 'Nome Completo': 'Equipe São Vicente', 'Nível de Acesso': 'Colaborador' });
                        else setUser(null);
                    }
                    setLoading(false);
                });
                return () => unsub && unsub();
            }, [isSharedAuth]);
                    
            const showToast = (msg, type = 'success') => { setToast({ show: true, message: msg, type }); setTimeout(() => setToast(p => ({ ...p, show: false })), 3500); };
            const [darkMode, setDarkMode] = useState(false);
            useEffect(() => { if (darkMode) { document.documentElement.classList.add('dark'); } else { document.documentElement.classList.remove('dark'); } }, [darkMode]);

            useEffect(() => { 
                const init = async () => { 
                    if(db){ 
                        const allData = await api.fetchAll(); 
                        if(allData && Object.keys(allData).length > 0) setSheetData(allData); 
                    } 
                }; 
                init(); 
            }, []);

            const loadData = async (tab) => {
                setLoading(true);
                if (tab === 'Home') {
                    const [news, atend, lembretes, mural] = await Promise.all([api.fetch('NOVIDADES_E_EVENTOS'), api.fetch('CONTROLE_ATENDIMENTOS'), api.fetch('LEMBRETES_HORA'), api.fetch('MURAL_AVISOS')]);
                    setSheetData(prev => ({ ...prev, 'NOVIDADES_E_EVENTOS': news, 'CONTROLE_ATENDIMENTOS': atend, 'LEMBRETES_HORA': lembretes, 'MURAL_AVISOS': mural }));
                } else if (tab === 'ESCALAS') {
                    const [escala, medicos, u, cont] = await Promise.all([api.fetch('ESCALAS'), api.fetch('CORPO CLINICO'), api.fetch('USUARIOS'), api.fetch('CONTROLE_ATENDIMENTOS')]);
                    setSheetData(prev => ({ ...prev, 'ESCALAS': escala, 'CORPO CLINICO': medicos, 'USUARIOS': u, 'CONTROLE_ATENDIMENTOS': cont }));
                } else {
                    const data = await api.fetch(tab); setSheetData(prev => ({ ...prev, [tab]: data }));
                }
                setLoading(false);
            };

            if (!user) {
                const handleFirebaseLogin = async (e) => {
                    e.preventDefault(); setLoading(true); setLoginErrorMsg(''); localStorage.setItem('shared_auth', 'false'); setIsSharedAuth(false);
                    const res = await api.login(e.target.email.value, e.target.password.value);
                    if (res && res.success) { setUser(res.user); loadData('Home'); } else { setLoginErrorMsg(res?.message || 'Erro ao conectar.'); }
                    setLoading(false);
                };

                const handleSharedLogin = async (e) => {
                    e.preventDefault(); setLoginErrorMsg(''); setLoading(true);
                    if (e.target.shared_password.value === SENHA_ACESSO_GERAL) {
                        const res = await api.login('tabela@csv.com', 'csv@123'); // Bypass invisível via banco de dados
                        if (res && res.success) {
                            localStorage.setItem('shared_auth', 'true'); setIsSharedAuth(true); setUser(res.user); loadData('Home');
                        } else {
                            localStorage.setItem('shared_auth', 'true'); setIsSharedAuth(true); setUser({ 'Nome Completo': 'Equipe São Vicente', 'Nível de Acesso': 'Colaborador' }); loadData('Home');
                        }
                    } else { setLoginErrorMsg('Senha incorreta.'); }
                    setLoading(false);
                };

                return (
                    <div className="min-h-screen bg-blue-50 dark:bg-slate-900 flex flex-col items-center justify-center p-4">
                        <div className="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[3rem] shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col md:flex-row border dark:border-slate-700 animate-fade-in">
                            <div className="md:w-5/12 bg-gradient-to-br from-primary to-blue-800 text-white p-10 flex flex-col justify-center relative">
                                <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                                <div className="relative z-10 text-center">
                                    <div className="w-24 h-24 mx-auto bg-white/10 rounded-3xl flex items-center justify-center mb-6 shadow-xl border border-white/20"><i className="ph-fill ph-heartbeat text-6xl animate-pulse-fast"></i></div>
                                    <h1 className="text-4xl font-black mb-2 tracking-tight">São Vicente</h1><p className="text-blue-200 text-sm font-bold">Portal Interno Inteligente</p>
                                </div>
                            </div>
                            <div className="md:w-7/12 p-8 md:p-12 bg-white dark:bg-slate-800 flex flex-col justify-center">
                                {loginErrorMsg && <div className="mb-6 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 p-4 rounded-2xl flex gap-3 animate-pop-in"><i className="ph-fill ph-warning-circle text-red-600 text-xl"></i><p className="text-sm font-bold text-red-800 dark:text-red-200">{loginErrorMsg}</p></div>}
                                
                                {loginView === 'selecao' && (
                                    <div className="space-y-4 animate-fade-in">
                                        <h2 className="text-2xl font-black text-gray-800 dark:text-white mb-8 text-center md:text-left">Selecione seu acesso:</h2>
                                        <button onClick={()=>setLoginView('geral')} className="w-full bg-blue-50 dark:bg-slate-700 hover:bg-primary dark:hover:bg-primary group p-5 rounded-3xl border-2 border-blue-100 dark:border-slate-600 hover:border-primary transition-all flex items-center gap-5 text-left shadow-sm hover:shadow-xl hover:-translate-y-1">
                                            <div className="w-16 h-16 rounded-2xl bg-white dark:bg-slate-800 text-primary flex justify-center items-center shrink-0 shadow-sm group-hover:scale-110 transition"><i className="ph-fill ph-users text-3xl"></i></div>
                                            <div><h3 className="font-black text-lg text-gray-900 dark:text-white group-hover:text-white transition">Equipe / Colaboradores</h3><p className="text-sm text-gray-500 dark:text-gray-400 group-hover:text-blue-100 mt-1 font-bold">Escalas, ramais, guias e consultas.</p></div>
                                        </button>
                                        <button onClick={()=>setLoginView('supervisor')} className="w-full bg-orange-50 dark:bg-slate-700 hover:bg-secondary dark:hover:bg-secondary group p-5 rounded-3xl border-2 border-orange-100 dark:border-slate-600 hover:border-secondary transition-all flex items-center gap-5 text-left shadow-sm hover:shadow-xl hover:-translate-y-1">
                                            <div className="w-16 h-16 rounded-2xl bg-white dark:bg-slate-800 text-secondary flex justify-center items-center shrink-0 shadow-sm group-hover:scale-110 transition"><i className="ph-fill ph-shield-star text-3xl"></i></div>
                                            <div><h3 className="font-black text-lg text-gray-900 dark:text-white group-hover:text-white transition">Supervisão / Gestão</h3><p className="text-sm text-gray-500 dark:text-gray-400 group-hover:text-orange-100 mt-1 font-bold">Edição de dados e controle da equipe.</p></div>
                                        </button>
                                        <div className="pt-4 text-center"><button onClick={()=>setLoginView('admin')} className="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-primary transition underline decoration-dashed">Acesso Administrativo</button></div>
                                    </div>
                                )}
                                
                                {loginView === 'geral' && (
                                    <form onSubmit={handleSharedLogin} className="space-y-6 animate-fade-in">
                                        <button type="button" onClick={()=>{setLoginView('selecao'); setLoginErrorMsg('');}} className="text-gray-400 hover:text-primary flex items-center gap-2 mb-6 font-bold text-sm bg-gray-50 dark:bg-slate-700 px-4 py-2 rounded-full w-max transition"><i className="ph-bold ph-arrow-left"></i> Voltar</button>
                                        <h2 className="text-3xl font-black text-gray-800 dark:text-white mb-2">Acesso da Equipe</h2><p className="text-sm text-gray-500 font-bold mb-8">Digite a senha geral fornecida.</p>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Senha Única</label><div className="relative"><i className="ph-fill ph-lock-key absolute left-6 top-4.5 text-gray-400 text-xl"></i><input name="shared_password" type="password" className="w-full pl-16 pr-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-600 rounded-full outline-none focus:ring-2 focus:ring-primary font-black text-gray-900 dark:text-white transition shadow-inner" placeholder="Sua senha..." required /></div></div>
                                        <button type="submit" disabled={loading} className="w-full bg-primary text-white font-black py-4 md:py-5 rounded-full shadow-xl hover:-translate-y-1 transition transform flex justify-center items-center gap-2 text-lg">{loading?<i className="ph animate-spin ph-spinner"></i>:<i className="ph-bold ph-sign-in"></i>} {loading?'Entrando...':'Entrar no Portal'}</button>
                                    </form>
                                )}

                                {(loginView === 'supervisor' || loginView === 'admin') && (
                                    <form onSubmit={handleFirebaseLogin} className="space-y-6 animate-fade-in">
                                        <button type="button" onClick={()=>{setLoginView('selecao'); setLoginErrorMsg('');}} className="text-gray-400 hover:text-primary flex items-center gap-2 mb-4 font-bold text-sm bg-gray-50 dark:bg-slate-700 px-4 py-2 rounded-full w-max transition"><i className="ph-bold ph-arrow-left"></i> Voltar</button>
                                        <h2 className="text-3xl font-black text-gray-800 dark:text-white mb-1">Acesso {loginView === 'admin' ? 'Admin' : 'Gestão'}</h2><p className="text-sm text-gray-500 font-bold mb-8">Faça login com suas credenciais.</p>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">E-mail</label><div className="relative"><i className="ph-fill ph-user absolute left-6 top-4.5 text-gray-400 text-xl"></i><input name="email" type="email" className="w-full pl-16 pr-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-600 rounded-full outline-none focus:border-primary font-bold text-gray-900 dark:text-white transition shadow-inner" required /></div></div>
                                        <div><label className="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Senha</label><div className="relative"><i className="ph-fill ph-lock-key absolute left-6 top-4.5 text-gray-400 text-xl"></i><input name="password" type="password" className="w-full pl-16 pr-6 py-4 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-600 rounded-full outline-none focus:border-primary font-bold text-gray-900 dark:text-white transition shadow-inner" required /></div></div>
                                        <button type="submit" disabled={loading} className={`w-full ${loginView === 'admin' ? 'bg-gray-900' : 'bg-secondary'} text-white font-black py-4 md:py-5 rounded-full shadow-xl hover:-translate-y-1 transition transform flex justify-center items-center gap-2 text-lg`}>{loading?<i className="ph animate-spin ph-spinner"></i>:<i className="ph-bold ph-shield-check"></i>} {loading ? 'Conectando...' : 'Acessar Painel'}</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            const menus = [
                { id: 'Home', icon: 'ph-house', label: 'Dashboard Inicial' },
                { id: 'MURAL_AVISOS', icon: 'ph-presentation-chart', label: 'Mural de Avisos' },
                { id: 'BOLETINS_INFORMATIVOS', icon: 'ph-newspaper', label: 'Boletins e Mídia' },
                { id: 'ESCALAS', icon: 'ph-calendar-check', label: 'Escalas e Plantões' },
                { id: 'CONVÊNIOS', icon: 'ph-file-text', label: 'Matriz de Convênios' },
                { id: 'CORPO CLINICO', icon: 'ph-stethoscope', label: 'Corpo Clínico' },
                { id: 'CONTATOS', icon: 'ph-address-book', label: 'Contatos Rápidos' },
                { id: 'CHAT_MENSAGENS', icon: 'ph-chat-circle-dots', label: 'Chat Interno' },
                { id: 'EXAMES DE IMAGEM', icon: 'ph-bone', label: 'Exames de Imagem' },
                { id: 'EXAMES DE IMAGEM E OUTROS', icon: 'ph-files', label: 'Exames e Laudos' },
                { id: 'CONSULTA E PROCEDIMENTOS', icon: 'ph-first-aid-kit', label: 'Consultas' },
                { id: 'EXAMES LABORATORIAIS', icon: 'ph-flask', label: 'Laboratório' },
                { id: 'INSTITUTOS', icon: 'ph-buildings', label: 'Institutos' },
                { id: 'REMOÇÕES', icon: 'ph-car', label: 'Remoções' },
                { id: 'SENHAS E LOGINS GERAIS', icon: 'ph-lock-key', label: 'Senhas de Sistemas' }
            ];
            const adminMenus = [ { id: 'CONTROLE_ATENDIMENTOS', icon: 'ph-chart-line-up', label: 'Metas Unimed' }, { id: 'USUARIOS', icon: 'ph-users', label: 'Equipe e Cadastros' }, { id: 'LEMBRETES_HORA', icon: 'ph-clock', label: 'Avisos Relógio' } ];

            const foundMenu = menus.concat(adminMenus).find(m => m.id === activeTab);
            const titleTab = foundMenu ? foundMenu.label : activeTab;

            return (
                <div className={`min-h-screen flex flex-col md:flex-row overflow-hidden relative selection:bg-primary selection:text-white ${darkMode?'dark bg-slate-900':'bg-gray-50'}`}>
                    {toast.show && <div className={`fixed bottom-4 md:bottom-8 right-4 md:right-8 z-[9999] px-6 py-4 rounded-2xl shadow-2xl text-white font-black text-sm animate-slide-up flex items-center gap-2 ${toast.type==='error'?'bg-red-500':'bg-green-500'}`}><i className={`ph-bold ${toast.type==='error'?'ph-warning-circle':'ph-check-circle'} text-xl`}></i> {toast.message}</div>}

                    <div className="md:hidden bg-primary text-white p-4 flex justify-between items-center z-40 shadow-lg relative">
                        <div className="flex items-center gap-2 font-black text-xl"><i className="ph-fill ph-heartbeat text-2xl"></i> Portal SV</div>
                        <div className="flex gap-2">
                            <button onClick={()=>setDarkMode(!darkMode)} className="text-2xl p-2 bg-white/10 rounded-xl"><i className={`ph-fill ${darkMode ? 'ph-sun' : 'ph-moon'}`}></i></button>
                            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-3xl p-2 bg-white/10 rounded-xl"><i className={`ph-bold ${isMobileMenuOpen ? 'ph-x' : 'ph-list'}`}></i></button>
                        </div>
                    </div>

                    {isMobileMenuOpen && <div className="fixed inset-0 bg-black/60 z-40 md:hidden backdrop-blur-sm" onClick={() => setIsMobileMenuOpen(false)}></div>}

                    <aside className={`fixed inset-y-0 left-0 w-72 md:w-80 bg-white dark:bg-slate-800 border-r dark:border-slate-700 flex flex-col h-screen shrink-0 shadow-2xl z-50 transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 transition-transform duration-300 ease-in-out`}>
                        <div className="p-8 flex items-center justify-between border-b dark:border-slate-700 cursor-pointer hover:bg-gray-50 dark:hover:bg-slate-900 transition" onClick={()=>{setActiveTab('Home'); setIsMobileMenuOpen(false);}}>
                            <div className="flex items-center"><div className="bg-primary text-white p-3 rounded-2xl mr-4 shadow-md"><i className="ph-fill ph-heartbeat text-3xl animate-pulse-fast"></i></div><div><h1 className="text-2xl font-black leading-none dark:text-white">Portal</h1><span className="text-[10px] font-black text-primary uppercase tracking-widest">São Vicente</span></div></div>
                            <button onClick={(e)=>{e.stopPropagation(); setDarkMode(!darkMode)}} className="hidden md:flex text-gray-400 hover:text-primary text-xl bg-gray-100 dark:bg-slate-700 p-3 rounded-xl transition hover:scale-110"><i className={`ph-fill ${darkMode ? 'ph-sun' : 'ph-moon'}`}></i></button>
                        </div>
                        <div className="p-6 border-b dark:border-slate-700 flex items-center gap-4 bg-gray-50/50 dark:bg-slate-900/50">
                            {userFoto ? <img src={formatImageUrl(userFoto)} className="w-12 h-12 rounded-xl object-cover shadow-sm border-2 border-white dark:border-slate-600" /> : <div className="w-12 h-12 rounded-xl bg-gradient-to-tr from-secondary to-orange-400 flex items-center justify-center text-white font-black text-xl shadow-md">{safeString(userName || 'U').charAt(0).toUpperCase()}</div>}
                            <div className="flex-1 overflow-hidden">
                                <p className="text-sm font-black truncate dark:text-white">{userName}</p>
                                <p className="text-[9px] font-black text-primary bg-primary/10 px-2 py-1 rounded mt-1 uppercase tracking-widest w-max">{isAdmin?'Gestão/Admin':'Equipe'}</p>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-1.5 custom-scrollbar pb-8">
                            <div className="px-4 mb-3 mt-2 text-[9px] font-black text-gray-400 uppercase tracking-widest">Menu Principal</div>
                            {menus.map(m => <button key={m.id} onClick={()=>{setActiveTab(m.id); loadData(m.id); setIsMobileMenuOpen(false);}} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl text-sm font-black transition-all ${activeTab===m.id?'bg-primary text-white shadow-lg md:scale-[1.02] translate-x-1':'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-slate-700'}`}><i className={`ph-fill ${m.icon} text-xl`}></i> {m.label}</button>)}
                            
                            {isAdmin && (
                                <>
                                    <div className="px-4 mt-8 mb-3 text-[9px] font-black text-gray-400 uppercase tracking-widest">Avançado</div>
                                    {adminMenus.map(m => <button key={m.id} onClick={()=>{setActiveTab(m.id); loadData(m.id); setIsMobileMenuOpen(false);}} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl text-sm font-black transition-all ${activeTab===m.id?'bg-gray-900 dark:bg-white dark:text-gray-900 text-white shadow-lg md:scale-[1.02] translate-x-1':'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-slate-700'}`}><i className={`ph-fill ${m.icon} text-xl`}></i> {m.label}</button>)}
                                </>
                            )}
                            <button onClick={()=>{auth?.signOut(); localStorage.removeItem('shared_auth'); setIsSharedAuth(false); setUser(null);}} className="w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-sm font-black text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 mt-8 transition"><i className="ph-fill ph-sign-out text-xl"></i> Encerrar Sessão</button>
                        </div>
                    </aside>

                    <main className="flex-1 h-[calc(100vh-76px)] md:h-screen overflow-y-auto relative custom-scrollbar p-4 md:p-10 pt-6 md:pt-10">
                        <ErrorBoundary>
                            {loading && <div className="fixed inset-0 bg-white/70 dark:bg-slate-900/70 backdrop-blur z-40 flex items-center justify-center"><div className="w-14 h-14 border-4 border-primary border-t-transparent rounded-full animate-spin shadow-2xl"></div></div>}

                            {activeTab === 'Home' && !loading && Array.isArray(sheetData['CONTROLE_ATENDIMENTOS']) && sheetData['CONTROLE_ATENDIMENTOS'].filter(a => Number(a.Limite_Max||0) > 0 && (Number(a.Qtd_Atual||0)/Number(a.Limite_Max||1)) >= 0.9).length > 0 && (
                                <div className="max-w-[1400px] mx-auto bg-red-600 rounded-[2rem] p-6 md:p-8 text-white shadow-2xl shadow-red-900/30 mb-8 animate-pop-in relative overflow-hidden border-4 border-red-700">
                                    <i className="ph-fill ph-warning-circle absolute -right-10 -bottom-10 text-[10rem] opacity-20"></i>
                                    <div className="relative z-10">
                                        <h3 className="text-2xl md:text-3xl font-black mb-6 flex items-center gap-3"><i className="ph-fill ph-bell-ringing animate-pulse"></i> Alerta Crítico: Limites Unimed</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            {sheetData['CONTROLE_ATENDIMENTOS'].filter(a => Number(a.Limite_Max||0) > 0 && (Number(a.Qtd_Atual||0)/Number(a.Limite_Max||1)) >= 0.9).map((a, i) => {
                                                const qtd = Number(a.Qtd_Atual || 0); const max = Number(a.Limite_Max || 1); const perc = (qtd / max) * 100;
                                                return (
                                                    <div key={i} className="bg-white/10 p-6 rounded-3xl border border-white/20 backdrop-blur-sm">
                                                        <span className="font-black text-xl block mb-4">{safeString(a.Profissional)}</span>
                                                        <div className="w-full bg-black/20 rounded-full h-3 mb-4 overflow-hidden"><div className="h-3 rounded-full bg-white shadow-[0_0_10px_white]" style={{width: `${Math.min(perc, 100)}%`}}></div></div>
                                                        <p className="text-4xl font-black leading-none">{qtd} <span className="text-lg opacity-70">/ {max}</span></p>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'Home' && !loading && (
                                <div className="space-y-8 animate-fade-in max-w-[1400px] mx-auto">
                                    <ClockWidget lembretesData={sheetData['LEMBRETES_HORA']} />
                                    <div>
                                        <h3 className="text-xl md:text-2xl font-black mb-6 text-gray-900 dark:text-white px-2">Acesso Rápido</h3>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4 md:gap-6">
                                            {[ { l: 'Mural', i: 'ph-presentation-chart', bg:'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400', t: 'MURAL_AVISOS' }, { l: 'Painel', i: 'ph-kanban', bg:'bg-orange-50 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400', t: 'ESCALAS' }, { l: 'Boletins', i: 'ph-newspaper', bg:'bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400', t: 'BOLETINS_INFORMATIVOS' }, { l: 'Consultas', i: 'ph-stethoscope', bg:'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400', t: 'CONSULTA E PROCEDIMENTOS' }, { l: 'Imagem', i: 'ph-bone', bg:'bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400', t: 'EXAMES DE IMAGEM' }, { l: 'Senhas', i: 'ph-lock-key', bg:'bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400', t: 'SENHAS E LOGINS GERAIS' } ].map((d, i) => (
                                                <button key={i} onClick={()=>{setActiveTab(d.t);loadData(d.t)}} className={`${d.bg} p-5 md:p-8 rounded-[1.5rem] md:rounded-[2rem] flex flex-col items-center justify-center gap-4 card-hover shadow-sm border border-transparent dark:border-slate-700`}>
                                                    <i className={`ph-fill ${d.i} text-4xl md:text-5xl drop-shadow-sm`}></i><span className="font-black text-[10px] md:text-xs text-center uppercase tracking-widest">{d.l}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'CHAT_MENSAGENS' && !loading && <ChatModerno chatData={sheetData['CHAT_MENSAGENS']} user={user} onSaveChat={api.saveRecord} onRefresh={()=>loadData('CHAT_MENSAGENS')} />}
                            {activeTab === 'ESCALAS' && !loading && <EscalasContainer sheetData={sheetData} user={user} onRefresh={()=>loadData('ESCALAS')} showToast={showToast} />}

                            {activeTab !== 'Home' && activeTab !== 'CHAT_MENSAGENS' && activeTab !== 'ESCALAS' && !loading && (
                                <DataTableGeneric title={titleTab} tabName={activeTab} data={sheetData[activeTab] || []} user={user} onRefresh={()=>loadData(activeTab)} showToast={showToast} />
                            )}
                        </ErrorBoundary>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
